body:
  text: 書纂言卷一元吳澄撰書者史之所紀録也從聿從者聿古筆字以筆畫成文字載之簡册曰書者諧聲伏羲始畫八卦黃帝時蒼頡始制文字凡通文字能書者謂之史人君左右有史以書其言動堯舜以前世質事簡莫可考詳孔子斷自堯舜以後史所紀録定為虞夏商周四代之書初蓋百篇遭秦焚滅挾書有禁漢興禁猶未除舊學之士皆已老死文帝時詔求天下能治書者惟有濟南伏生一人年九十餘遣掌故眺錯即其家傳受僅得二十八篇武帝時河內女子獻偽泰誓一篇得附二十八篇之列元成間東萊張霸作偽舜典等二十四篇其書不行東晉豫章內史梅賾增多伏生書二十五篇又於二十八篇內分出五篇共五十八篇上送於官遂與漢儒歐陽氏大小夏侯氏三家所治伏生之書並唐初尊信承用命儒臣為五十八篇作疏因此大顯而三家之書廢今澄所注止以伏生二十八篇之經為正虞書虞舜氏因以為有天下之號虞書虞史所記也堯典堯唐帝名典説文云册在兀上尊閣之也載事於簡册庋而藏之書府以傳永久故曰典以其所載可為常法故又訓常此篇蓋舜崩之後虞史紀舜之行事然以舜徴庸攝位皆在堯時故追紀堯之行事以該初終一篇並載二帝之事不名舜典而曰堯典者統于尊也伏生書此篇止名堯典梅賾始分慎徽五典以下為舜典陳振孫曰孟子所引二十有八載放勳乃徂落之文曰堯典則知古無舜典也曰若稽古帝堯曰放勳欽明文思安安允恭克讓光被四表格于上下曰粵越通唐以前隸書本曰作粵曰若者發語辭猶周書越若來三月也稽考也放勳堯號放至也猶放乎四海之放勳功也言堯之功勳無所不至也羲農黃帝數聖人皆有功於生民而堯之功大孔子稱堯巍巍乎其有成功故堯崩之後以放勳號之也史將敘堯事先言考古之帝堯沒而號曰放勳者其德如下文所云也欽仁敬也明聖智也文身儀之外著思心官之中主安安自然而然無所勉強也允信也恭莊肅也克能也讓謙遜也常人偽恭而不實欲讓而不能堯信疑信作性之者是以信恭能讓也光德盛而有光輝也被及也四四方也表外格至上天下地也言盛德光輝充滿六合極其廣逺也克明俊德以親九族九族既睦平章百姓百姓昭明協和萬邦黎民於變時雍明明之也俊大也聖人氣清質美性之全體無所汚壞故其德之大非常人所及也以用也親愛之也九族髙祖至玄孫之親也既盡睦和也平均齊普遍之意章亦明之也平章謂均齊普遍無一不眀之也下文平秩平在倣此百姓畿內之民昭明能明其明德也協合也和和之使不乖戾也協和合諸侯而皆和之也萬邦天下諸侯之國黎黑也謂黑首之民於歎辭變變化時是雍和也堯能自明其大德推以齊家治國平天下而家齊國治天下平也乃命羲和欽若昊天厯象日月星辰敬授人時羲和重黎之後司天之官也若順也昊廣大也厯以推算度數氣朔象以窺測躔次晷景日陽精一日繞地一匝月隂精一月與日一會星二十八宿及衆經星東七宿角亢氐房心尾箕北七宿斗牛女虛危室壁西七宿奎婁胃昴畢觜參南七宿井鬼栁星張翼軫東七宿象龍西七宿象虎皆南首而北尾北七宿象龜蛇南七宿象鳥皆西首而東尾辰天之壤無星處皆是而因日月所會分為十二次會于辰曰壽星卯曰大火寅曰析木丑曰星紀子曰玄枵亥曰娵訾戌曰降婁酉曰大梁申曰實沈未曰鶉首午曰鶉火已曰鶉尾授謂頒布于有司俾遵而行之也人時謂耕穫𧖟績之候凡民事早晚所關如下文東作南訛西成朔易之節候也孔疏曰據堯身而言用臣故云乃命非時雍之後方始命之程子曰克明俊德至時雍言治身以至平天下治之道也乃命羲和至咸熙言分職順時事則治之法也而事之最大最先在天道時令萬事無一不體于此故先詳載其事聖人治天下惟此二端作典者述堯之治盡于此矣分命羲仲宅嵎夷曰暘谷寅賔出日平秩東作日中星鳥以殷仲春厥民析鳥獸孶尾分別也宅居也或曰度也嵎夷東裔之地禹貢屬青州暘明也日出而天下明故曰暘谷寅敬賔迎也出日初出之日也于東方迎日之出而識其景出卯中則為春分也平秩一切皆秩也東謂立春以後東方木王之時作發生也一一次序春時萬物發生之節候也日晝之晷也中猶半也日與夜平分而得其半也星謂中星初昏時見于南方正午之位者也鳥南方朱鳥之星其辰鶉火其宿則星也殷中也仲春之中謂春分也厥其也析分也老壯分析而居壯者出就田廬老者留居邑宅也孶乳化也尾交接也為將乳化而交接也申命羲叔宅南交平秩南訛敬致日永星火以正仲夏厥民因鳥獸希革申重也南交南裔交址之地南謂立夏以後南方火王之時訛化也一一次序夏時萬物化育之節候也致推極也周官冬夏致日是也於南方推極日中之景至午中而短極則為夏至也火東方蒼龍之星其辰大火其宿房心也正謂陽至此極得陽之正仲夏之正謂夏至也因孔注謂老弱因就在田之丁壯以助農是也希疏也革皮膚也膚革希疏猶眺錯言疏理也分命和仲宅西曰昧谷寅餞納日平秩西成宵中星虛以殷仲秋厥民夷鳥獸毛毨西西裔之地漢志天水郡有西縣昧暗也日入而天下暗故曰昧谷餞送也納日方入之日也於西方送日之入而識其景入酉中則為秋分也西謂立秋以後西方金王之時成收熟也一一次序秋時萬物收熟之節候也宵夜之晷也中者夜與日平分而得其半也虛北方玄武之星其辰玄枵宿則虛也仲秋之中謂秋分也夷平也老壯平分老者歸邑而壯者在田也毛毨毛落更生潤澤鮮好也申命和叔宅朔方曰幽都平在朔易日短星昴以正仲冬厥民隩鳥獸氄毛朔方北裔之地北謂之朔者取月朔之義前月之終後月之始明盡而復生謂朔北方隂盡于中陽起于中亦猶月之朔也日行至此淪于地中萬象幽冥故曰幽都在存察之意朔謂立冬以後朔方水王之時易改更之也一一詳察冬時嵗物改更之節候也冬不言秩而言在終始之交冝詳察也日短晝晷最短也音留星在天之酉位字從丣舊音卯者非西方白虎之星其辰大梁宿則昴也隂至此極得隂之正仲冬之正謂冬至也隩隈也老壯皆居邑宅就隈隩溫暖之處以避寒也氄毛細毛也毛理細密猶眺錯言密理也乃命總命羲和也就羲和之內分别之羲掌春夏和掌秋冬故言分命又就羲之內和之內重分之既命其仲復命其叔故言申命堯命四時之官明天時以授人時而其要在於度日景日晷驗初昏中星以定二分二至而已蓋分至定則四時之節候皆不差矣蘇氏曰嵎夷南交西朔方乃四極之地以日景定分至而後厯可起必驗之四極非常宅也朱子曰推測日景之處寅賔是賔其出寅餞是餞其入敬致是致其中北方無日故不説東作南訛西成朔易謂節候也林氏曰仲春日在卯入酉昏時鶉火見晝五十刻夜五十刻是為春分之氣仲夏日在星入辛初昏大火見晝六十刻夜四十刻是為夏至之氣仲秋日在心入酉初昏虛星見晝五十刻夜五十刻是為秋分之氣仲冬日在虛入申初昏昴星見晝四十刻夜六十刻是為冬至之氣馬氏曰星鳥以象言星火以次言虛昴以宿言互相備也朱子曰堯時冬至日在虛昏中昴月令冬至日在斗昏中壁中星古今不同者蓋天有三百六十五度四分度之一而有餘嵗有三百六十五日四分日之一而不足天平運而舒日內轉而縮天漸差而西嵗漸差而東唐一行所謂嵗差者是也古厯簡易未立差法但隨時占候修改以與天合東晉虞喜始以天為天以嵗為嵗乃立差法以追其變約以五十年退一度何承天以為大過乃倍其年而又不及至隋劉焯取二家中數為七十五年蓋近之而未精密也澄案唐開元大衍厯以八十三年差一度宋紀元厯以七十八年差一度然久亦與天違今授時厯不立差法但日夜占候以求合於天帝曰咨汝羲暨和期三百有六旬有六日以閏月定四時成嵗咨者嗟嘆而命之也暨及也期猶周也前冬至距後冬至周匝一嵗也有又通旬十日也三百六旬有六日者一嵗三百六十五日四分日之一微弱而交次年節氣也不言五日四分日之一而言六日舉成數也閏月者氣盈朔虛所積之餘日也天周圍三百六十五度四分度之一其行至健繞地左旋一日一周而又過一度日行少遲繞地左旋一日適得一周而不過比之天則為不及一度月行尤遲繞地左旋一日將近一周而不及比之天則為不及十三度十九分度之七若依四分厯法分一日為九百四十分則日之行積三百六十五日二百三十五分而與天會是為一嵗之氣月之行積二十九日四百九十九分而與日會是為一月之朔一嵗十二朔通計三百五十四日三百四十八分一嵗有十二月一月有三十日積日凡三百六十者一嵗之正數也日與天一會而過三百六十之數故多五日二百三十五分謂之氣盈月與日十二會而不及三百六十之數故少五日五百九十二分謂之朔虛合氣盈朔虛之積一嵗得十日八百二十七分二嵗得二十一日七百一十四分三嵗得三十二日六百有一分以二十九日四百九十九分置第一閏尚餘三日百有二分四嵗并上所餘得十三日九百二十九分五嵗得二十四日八百一十六分六嵗得三十五日七百有三分置第二閏尚餘六日二百有四分七嵗并上所餘得十七日九十一分八嵗得二十七日九百一十八分九嵗得三十八日八百有五分置第三閏尚餘九日三百有六分十嵗并上所餘得二十日一百九十三分十一嵗得三十一日八十分置第四閏尚餘一日五百二十一分十二嵗并上所餘得十二日四百有八分十三嵗得二十三日二百九十五分十四嵗得三十四日一百八十二分置第五閏尚餘四日六百二十三分十五嵗并上所餘得十五日五百一十分十六嵗得二十六日三百九十七分十七嵗得三十七日二百八十四分置第六閏尚餘七日七百二十五分十八嵗并上所餘得十八日六百一十二分十九嵗得二十九日四百九十九分置第七閏無餘是為一章失一閏則春之季月入夏夏之季月入秋秋之季月入冬冬之季月入春失二閏則春之仲季入夏夏之仲季入秋秋之仲季入冬冬之仲季入春失三閏則春皆入夏夏皆入秋秋皆入冬冬皆入春而四時不定四時不定則嵗首非嵗首嵗終非嵗終而嵗不成故必置閏月以定四時然後能成嵗也今案一日分為九百四十分者蓋以史記所載顓頊四分厯為準漢三統厯則一日為千五百三十九分唐開元大衍厯則一日為三千四十分其氣盈朔虛分數各不同每改一厯又變一法訖不得其至當考之厯代史志可見兹不備陳及宋紀元厯則一日萬分至今承用雖其分愈細然其數整齊難與天合西山蔡氏祖述邵子元會運世嵗月日辰之例以一辰為三十分一分為十二釐一釐為三十毫一毫為十二絲一辰計十二萬九千六百絲一日計百五十五萬五千二百絲每嵗氣盈朔虛共十日一百三十六萬絲澄嘗即其法推算與古差殊乃知其説甚美其術則疏猶欲因之再為更定以追古合天而未之能也尚將有俟于哲人允釐百工庶績咸熙釐析而治之也百工百官之事如工人然一工掌一事也庶衆也績積其功之成也咸皆也熙光明廣大也吕氏曰二句乃史記堯之治非堯之言澄謂此章自乃命以下記堯命官之事然特詳于司天時之一官此一節上句總言治人事之官下句則言其效也此第一章堯在位之事帝曰疇咨若時登庸放齊曰胤子朱啓明帝曰吁嚚訟可乎疇誰也疇咨謂誰可咨命者若時謂順是猶言稱此也登庸謂登進于百僚之上而用之蓋百揆之職也放齊臣名胤嗣也朱堯嗣子名啓開也言其心識開明稱是登庸之職也吁者嘆其不然之辭嚚口多言不忠信也訟爭辨也朱蓋以其開明之才用之于不善故為嚚訟堯至公至明知其子之惡而不然放齊所舉也帝曰疇咨若豫采歡兜曰都共工方鳩僝功帝曰吁靜言庸違象恭滔天采事也任事之臣為百揆之副登庸者舉其綱任事者治其目也歡兜臣名共工官名蓋古之世官族也方且鳩聚僝見也能成其事曰功言方且鳩聚而見其功可稱今任事之職也靜言庸違謂間居無事之時則能言及至用之則違背其言也象恭貌恭而心不然也滔天蓋因下文有此二字而誤二字當是中心傲狠之意帝曰咨四嶽湯湯洪水方割蕩蕩懷山襄陵浩浩滔天下民其咨有能俾乂僉曰於鯀哉帝曰吁咈哉方命圮族嶽曰異哉試可乃已帝曰往欽哉九載績用弗成四嶽官名一人而總四嶽諸侯之事也湯湯水盛貌洪大也孟子曰水逆行謂之洚水洚水者洪水也蓋下流不泄泛濫上涌而逆行也割害也蕩蕩廣貌懷包其四傍也襄駕出其上也大阜曰陵浩浩大貌滔漫也極言其大勢若漫天也下民居處卑下之民也咨嗟怨也能者謂其才足以辦此事俾使乂治也僉衆共之辭鯀崇伯名先言於者嘆美其才而薦之也咈者甚不然之辭方逆也命上之令也言恣已自專違逆上命也圯敗族類也言與衆不和傷害同類也鯀之不可用者以此楚辭言鯀悻直方命圯族之證也嶽曰四嶽獨言也異置也已也試嘗而驗之也言鯀不可用則已之哉或姑試其可見其不可乃已之也蓋當時治水之才亦未有能過于鯀者故四嶽之意欲堯且試之也於是遣鯀往治水而戒以欽者凡事不可不敬况治水之事任大責重乎帝朝用人三載一考其績九載則三考矣成猶完也禮記言禹修鯀之功則鯀之治水非無小小之功但至於三考而其功不成完耳卲子皇極經世書帝堯六十一載命鯀治水六十九載其績弗成或疑績用弗成蓋在舜既徵庸之後史言之于此以終上事也朱子曰自疇咨若時登庸以下皆為禪位設也一舉而放齊舉胤子再舉而歡兜舉共工三舉而四嶽舉鯀皆不得其人故卒以天下授舜陳氏曰朱共鯀皆有過人之才堯獨察其非賢蓋世大姦舉不能欺史備載之以表堯知人之明以示萬世人主擇人之法帝曰咨四嶽朕在位七十載汝能庸命巽朕位嶽曰否德忝帝位曰明明揚側陋師錫帝曰有鰥在下曰虞舜帝曰俞豫聞如何嶽曰瞽子父頑母嚚象傲克諧以孝蒸蒸乂不格姦帝曰我其試哉朕我也古者上下得通稱朕至秦定為天子之稱案史記堯年十六自唐侯為天子在位七十載則年八十六矣巽遜通堯嗣子丹朱既不肖羣臣又多不稱當時百揆虛職在朝之臣四嶽獨尊居是官者必世族重臣才德出于羣臣之上故堯欲以天下授人而先語四嶽謂汝能用我之命今巽我之位于汝也否不通忝辱也四嶽謂己不德不足以當帝位之重受之適為辱耳故辭而不受也曰者堯言也明明普照精察之意重言二字猶前言安安也揚舉也側陋偏僻之處也四嶽既辭堯使之舉人自代謂在朝無其人則明明揚偏僻微賤之人也師衆錫與也師錫帝曰緣四嶽未對而衆臣先與帝言也鰥無妻也在下在民間未仕也虞氏舜名也俞應許也豫聞者我亦嘗聞是人也如何者復問其人之詳也瞽無目也舜父號瞽瞍頑心無知覺也母舜後母也象舜異母弟名傲倨慢也諧和也孝善事父母而推之為友悌也蒸進也如火氣之蒸而上也姦惡而為亂也堯問舜之為人如何四嶽乃獨對謂舜乃瞽者之子父既頑母又嚚弟又傲而舜能諧和以孝使進進于治而不至於為大惡也其者將然之辭四嶽既詳言舜之為人堯謂我將以事試之也試之之目見下文女于時觀厥刑于二女釐降二女于媯汭嬪于虞帝曰欽哉女以女與人也刑儀法也二女堯二女娥皇女英也堯以二女女舜于是娥皇為妻女英為妾而觀舜所以示儀法于妻妾者此史臣述堯試舜之意釐理也降下也媯水名在今河東縣出厯山入河內汭兩水合流之內也媯汭舜所居之地嬪婦也謂堯治裝下嫁二女于媯水之內使為婦于虞氏之家也此史臣述堯嫁女之事欽哉堯戒二女之辭即禮所謂往之女家必敬必戒者周子曰治天下有則家之謂也家難而天下易家親而天下踈也堯所以釐降二女于媯汭舜可禪乎吾兹試矣案此一節堯試舜以齊家之事慎徽五典五典克從納于百揆百揆時敘賔于四門四門穆穆納于大麓烈風雷雨弗迷帝曰格汝舜詢事考言乃言砥可績三載汝陟帝位舜讓于德弗嗣慎謹也徽以繩糾約之意五典父子君臣夫婦長幼朋友五者之常道也蓋使為司徒之官從順也左氏所謂無違教是也此試之以教萬民之事也納入居其位也百揆揆度百事之官猶周之冢宰也敘各循倫次也左氏所謂無廢事是也此試之以總百官之事也四門四方之門諸侯各以方至而使主焉故曰賔蓋使兼四嶽之職穆穆敬也左氏所謂無凶人是也此試之以臨諸侯之事也麓山足也烈迅也迷錯也記曰因名山升中于天堯使舜主祭將升大山方入于其麓而偶遭烈風雷雨衆懼失常舜行獨不迷錯遇非常之變而不為動非固聰明誠智確乎不亂者不能也易震驚百里不喪匕鬯近之此試之以攝祭主之事也格來詢訪乃汝砥致陟升也讓辭遜也堯謂詢舜行事而考所言則見汝之言致之可以有功于今三年矣汝宜升帝位舜謙遜辭避以其德不能嗣堯也案此一節堯試舜以治國之事此第二章堯禪位之事正月上日受終于文祖正長也正月長於諸月上日此月上旬之日蓋堯在位七十有三載之正月朔日也文祖堯始祖之廟舜以此年正月朔朝於文祖之廟堯於是終帝位之事而舜受之也在璿璣玉衡以齊七政璿美珠璣衡皆觀天之器以璿飾璣所以象天也有機運轉故曰璣以玉為管所以窺天也橫設於璣故曰衡齊者測驗推步之不差也七政日月五星也其行或遲或速各有限節度數如國家之政然故曰七政常星為天定體者謂之經七政與天各行者謂之緯故必察於璣衡之器以齊其行度堯之命官先命羲和舜之攝位先齊七政蓋治厯明時君道所當先也璣衡之制蓋如後世之渾天儀云自古言天者三家曰宣夜曰周髀曰渾天宣夜無師説不知其何如周髀之説謂天似覆盆斗極為中中髙四邉下日月旁行繞之蔡雍以為考驗天象多所違失渾天之説謂天渾渾然圓如彈丸地居其中如鳥卵中黃天包地外半覆地上半在地下地上見者百八十二度半強地下不見者亦百八十二度半強其南北兩端樞紐不移處為極北極出地上三十六度南極入地下三十六度其天體經星與日月五緯斜而回轉北極之南五十五度當嵩髙之上正為天中又其南十二度為夏至之日道又其南二十四度為春秋分之日道又其南二十四度為冬至之日道南下去地三十一度而已夏至之日北去極六十七度春秋分之日去極九十一度冬至之日去極北一十五度此其大率也古者觀天之器其法無傳漢武帝時洛下閎始經營之鮮于妄人又量度之宣帝時耿夀昌以銅鑄為天象劉宋時錢樂以銅鑄為渾天儀厯代相因由唐至宋漸加精緻為儀三重其外第一重曰六合儀平置黑單環名地平環上列壬子癸丑艮寅甲卯乙辰巽已丙午丁未坤申庚酉辛戌乾亥二十四字一名隂渾一名單橫規一名隂緯單環北地面四方四緯之象也又側立黑雙環名天經環橫刻二極相去度數直跨地平環相銜於子午半出地上半入地下子以上出地平三十六度為北極樞孔午以下入地平三十六度為南極樞孔一名外雙規一名陽經雙規此天脊從布之象也又斜倚赤單環名天緯環互刻赤道周天宿度上下與天經環相銜去南北極各九十一度少弱東西與地平環相銜當卯酉之位此天腰橫繞之象也三環表裏相結不動上下四方之定位於是可考故曰六合其內第二重曰三辰儀側立黑雙環亦刻去極度數制如天經黑雙環在內而差小但彼不可動而此銜附黃赤二環以轉動爾其赤道環則為赤單環亦刻宿度制如天緯赤單環在內而差小上下與三辰雙環相銜去南北極各九十一度少弱其黃道環則為黃單環亦刻宿度上下亦與三辰黑雙環相銜而南出赤道環二十四度弱北入赤道環二十四度弱東西與赤道環相銜在環上所刻卯酉春秋二分之處又為白單環承其交鎖定黃赤二環使不傾墊或不用下設機輪以水激之可省人運亦或不用日月星辰之運行於是可考故曰三辰又其內第三重曰四遊儀亦為黑雙環制如三辰儀之黑雙環在內而又小以揭直距直距者銅板二從置於四遊儀內上屬北極下屬南極而橫夾望筒於其腰中內面為小孔以受望筒腰中之小軸望筒者古所謂玉衡也一名窺筒一名窺管一名橫簫其筒中空兩端各為方掩方掩中各開圓孔以俟仰窺腰中兩面各為小軸以貫直距腰中之小孔東西既得隨環運轉南北又可隨處低昂故曰四遊第一重六合天經雙環銜附地平天緯二單環第二重三辰雙環銜附黃赤道二單環第三重四遊雙環銜附直距與望筒六合之規大於三辰三辰之規大於四遊雙環雙鑄一樣二合而為一故厚可貫管軸單環單鑄故薄其六合天經雙環南北二極之處有孔銜軸以穿三辰四遊二雙環於內軸如管虛中其外有臍兩層以間隔三辰四遊之位次其尺度則地平單環徑八尺濶五寸厚一寸半天經雙環徑八尺濶五寸厚八分兩環合一寸六分天緯單環徑七尺八寸一分濶九分厚五分三辰雙環徑七尺四寸八分濶一寸八分厚七分兩環合一寸四分黃赤二道單環徑七尺二寸八分濶九分厚六分四遊雙環徑六尺二寸八分濶一寸八分厚八分半兩環合一寸七分直距二長各如四遊環內徑濶一寸六分厚八分望筒長隨直距方一寸六分兩端方掩方一寸七分中間圓孔徑七分半地平之下檠以龍柱四各髙七尺七寸植于水槽上一名水趺或名水平其臺為十字或為方井中鑿水道相通行水以激機輪沈括曰舊法規環一面刻周天度一面加銀丁蓋以夜候天晦不可目察則以手切之也古人以璿飾璣疑亦為此肆類于上帝禋于六宗望于山川遍于羣神肆遂也類禋望皆祭名郊者祭昊天之常祀非常祭而祭告于天其禮依郊祀為之故曰類精意以享曰禋宗尊也所尊祀者有六曰日曰月曰星曰四時曰寒暑曰水旱逺望而祭之曰望山川名山大川遍周遍也羣神者天神自六宗之外地示自山川之外以次神示皆祭之也言受終觀象之後即祭祀上下神示以攝位告也輯五瑞既月乃日覲四嶽羣牧班瑞于羣后輯斂也瑞玉也周官典瑞公執桓圭侯執信圭伯執躬圭子執穀璧男執蒲璧執之以為符信故曰瑞既月盡此月也覲見也四嶽在朝之臣統羣牧者羣牧九州之伯統諸侯者班分也羣后衆國君也程子曰輯五瑞徵五等諸侯也此上皆正月事盡此月則四方諸侯有至者逺近不同至有先後故每日接見嶽牧率諸侯以見見者分還所輯之瑞與之使之歸國也陳氏曰自正月上日至此述攝位初事嵗二月東巡守至于岱宗柴望秩于山川肆覲東后五玉三帛二生一死贄協時月正日同律度量衡修五禮如五器卒乃復五月南巡守至于南嶽如岱禮八月西巡守至于西嶽如初十有一月朔巡守至于北嶽如西禮歸格于藝祖用特嵗二月當巡守之年之二月也巡守行視諸侯所守之土也岱宗東嶽泰山也柴燔柴祭天也望望祭山川也秩者品等其尊卑先後之次序一一皆祭之也東后東方諸侯也五玉即五等諸侯所執之瑞玉也三帛諸侯世子執纁公之孤執玄附庸之君執黃二生卿執羔大夫執鴈一死士執雉五玉三帛二生一死諸國君臣所以為贄而見者時謂嵗之四時月謂月之大小日謂每嵗每月之積日諸侯之國皆稟天子正朔嵗月日有不合者則協而正之以節氣定四時所以正一嵗之日以晦朔定大小所以正一月之日時日協則日正也律謂十二律黃鍾太簇姑洗𬎼賔夷則無射六陽律為律大吕夾鍾仲吕林鍾南吕應鍾六隂律為吕凡十二管皆空圍九分有竒徑三分而黃鍾之長九寸大吕以下律吕相間以次而短至應鍾而極以之制樂而節聲音則長者聲下而重濁短者聲髙而輕清以之審度而度長短則九十分黃鍾之長其一為一分十分為寸十寸為尺十尺為丈十丈為引以之審量而量多少則黃鍾之管容千二百黍為籥十籥為合十合為升十升為斗十斗為斛以之平衡而權輕重則黃鍾之籥所容千二百黍其重十二銖兩籥則二十四銖為兩十六兩為斤三十斤為鈞四鈞為石諸侯之國皆遵天子法制四器有不一者則審而同之度量衡其起於律律同則度量衡亦同也修完整之也五禮吉凶軍賔嘉之禮其有廢缺者則完整之也如猶同也五器即五禮之器蓋猶周官所謂同數器也卒終畢也復回還也此數事皆畢則回還而他向也二月東五月南八月西十有一月北各以其方所屬之時也南嶽衡山西嶽華山北嶽恆山如岱禮如初如西禮謂祭秩覲見協正同修等事皆如東巡守之禮也歸巡守既畢而歸至於國也格至也至其廟而告祭也藝祖疑即文祖或云文祖之所自出也王制曰歸格于祖禰古者君行必告于祖禰歸又至其廟而告蓋孝子不忍死其親出告反面之義也程子曰言藝祖舉尊爾實皆告也但止就祖廟共用一牛不如時祭各于其廟也文中子曰舜一嵗而巡四嶽國不費而民不勞何也儀衛少而徴求寡也林氏曰漢武帝元朔初東巡海上還封泰山並北海之碣石厯朔方九原以至甘泉武帝儀衛徵求多矣八月之間尚行一萬八千里則舜一嵗而巡四嶽可知也五載一巡守羣后四朝鄭氏曰巡守之年諸侯各朝于方嶽其間四年則諸侯來朝于京師蔡氏曰五載之內天子巡守者一諸侯來朝者四蓋巡守之明年東方諸侯來朝又明年南方諸侯來朝又明年西方諸侯來朝又明年北方諸侯來朝又明年則天子復巡守天子諸侯雖有尊卑而一往一來禮無不答是以上下交通而逺近協和也敷奏以言明試以功車服以庸敷廣布也奏進也車服謂命之仕而賜以車服也周官一命受則再命受服三命受器蓋因古制也此承上文言諸侯貢士於天子者先廣進之以言復明試之以功必施之於事功如其言而後用之也肇十有二州封十有二山濬川肇始也古者中國之地為九州冀兖青徐揚荆豫梁雍禹治水作貢亦因其舊大河以北為冀州而帝都在焉禹既作貢之後舜以冀青地太廣始分冀東恆山之地為并州東北醫無閭之地為幽州又分青之東北遼東等處為營州而冀州止有河內之地今河東一路是也然舜既分十二州而商時但言九圍九有周官職方氏亦止列九州有揚青荆豫兖雍幽冀并而無徐梁營則十二州蓋不甚久或謂禹即位後復合為九然未有考也封表也每州表識一山以為一州之鎮如職方氏言揚州其山鎮曰會稽之類濬川濬導十二州之川也山言十二蓋一州止封一山而餘山不封濬川不言十二則川無大小皆濬也曽氏曰冀之北邉與狄接故分正北為幽西北為并東北為營陳氏曰既分此三州然後冀中立於諸州之內故三代後復為九州而幽并不革象以典刑流宥五刑鞭作官刑撲作教刑金作贖刑眚災肆赦怙終賊刑欽哉欽哉惟刑之恤哉象圖所用五刑之象以示人所謂唐虞畫衣冠而民不犯也周官懸刑象之法于象魏使萬民觀之蓋亦由是典刑謂墨劓剕宫大辟五等重刑典章所載之常法也流謂徙之逺方若水之流去然宥寬之也五刑即典刑鞭木末垂革官刑官府之刑撲夏楚二物教刑教學之刑也金赤金銅也贖贖其罪也古者贖罪用銅漢及後魏用黃金唐宋復用銅蓋寇賊姦宄之大惡冝服五等之重刑但聖人至仁不忍輕用故圖象以示使之知畏而不敢犯如此而猶有犯者乃不得已而刑之也五者之刑至重然苟其罪之可疑與夫不當施刑之人則以五流之法宥之至於官府學校之間或有慢令違令者既不可待以五刑又不可無以懲戒故設鞭撲之輕刑使之知愧而不欲犯周官條狼氏掌執鞭以趨辟誓大夫曰敢不關鞭五百儀禮鄉射記楚撲長如笴射者有過則撻之即此官刑教刑也二者之刑雖輕然苟其情之可矜與夫不堪受刑之人則以罰金之法贖之此五句者有重有輕各有攸當法之正也眚過誤也災殃禍也肆縱之也赦除釋也怙恃也終不悛也賊以寇賊治之也承上文而言所犯輕刑之可矜者雖在罰贖之法例然或其人因過誤致災而麗於刑則又不令罰贖而直縱肆以赦之所犯重刑之可疑者雖在議宥之科然或其人因怙恃不悛而麗于刑則又不令議宥而如寇賊以刑之此二句者或由重而即輕或由輕而即重蓋用法之權衡法外意也通前後七句聖人立法制刑之本末具矣而主之以敬慎重詳審常以慈祥惻怛之意行乎其中故曰欽哉欽哉惟刑之恤哉恤謂憐憫之也程子曰史記載舜制刑之法重明舜之意言敬謹哀矜之至朱子曰古所謂贖刑者贖鞭撲五刑有流宥而無金贖周官亦無其文至吕刑乃有五等之罰疑穆王始制之非先王之法也流共工于幽州放歡兜于崇山竄三苖于三危殛鯀于羽山四罪而天下咸服流即流宥五刑之流放竄殛亦流也放棄置於此不得他適竄捕匿於此如穴中鼠三苗國名在江南荆揚之間恃險為亂竄者竄其君也殛謂待死于此以終其身流放竄殛四者陳氏謂有重輕如今世編管羈管安置居住之類澄謂罪既重輕則地冝有逺近幽州北裔崇山南裔不知的在何處三危在雍州羽山在徐州今以四凶之罪論之後篇於共工言畏於歡兜言憂於有苖言遷其辭蓋有輕重鯀以治水之績不成故廢黜而用其子代之罪比三凶為輕而説者不明殛字之義以殛為誅死果若是則四罪鯀乃最重誤矣又以四裔之地論之羽山去帝都差近三危稍逺崇山蓋又逺幽州蓋最逺或謂崇山即今澧州慈寧縣之崇山幽州即其後所分幽州之北鄙未詳是否若以罪之重輕度地之逺近則北流冝在荒服二百里流之地南放冝在荒服三百里蠻之地西竄冝在要服二百里蔡之地東殛冝在要服三百里夷之地但疑當時水土未平五服地里未定則未能盡然也陳氏曰言四罪見當時無犯者罰當其罪明也法行權貴公也刑止流放仁也允愜人心故天下咸服史載於欽恤之後見用法之審林氏曰殛鯀竄三苗當在水未平之前巡守肇十二州當在禹平水之後史因言舜之謹刑遂舉誅四凶之事繫于下爾吳氏曰史泛記舜所行之大事初不記先後之序也二十有八載帝乃殂落百姓如喪考妣三載四海遏密八音堯在位七十載而徵庸舜試舜三載而老舜以堯七十三載之正月上日受終于文祖攝位之二十八載堯在位一百載矣殂落死也死者魂氣升于天故曰殂體魄降于地故曰落喪為之服也父曰考母曰妣三載子為父服則斬衰三年為母服則齊衰三年也四海甸服千里之外四方諸侯之民也遏絶密靜也八音金石絲竹匏土革木八音之樂器也案儀禮圻內之民為天子服齊衰三月圻外之民無服今百姓應服三月者如服考妣三年之喪四海應無服者耳不聽樂蓋雖無服而若有心喪者焉此堯聖德廣大恩澤隆厚故近而國中之民逺而天下之民思慕之深至於如此也此第三章舜攝位之事月正元日舜格于文祖月正正月也元日上日也蓋舜攝位三十有一載之正月朔孔傳曰舜服堯喪三年畢將即政故復至文祖之廟告疏曰既除喪以明年之正月告廟即正位為天子蘇氏曰受終告攝此告即位也然春秋國君皆以遭喪之明年正月即位于廟而改元孔氏云喪畢之明年不知何據澄案孟子言堯老而舜攝堯崩而舜帥天下諸侯為堯三年喪三年之喪畢舜避堯之子于南河之南天下諸侯朝覲者不之堯之子而之舜訟獄者不之堯之子而之舜謳歌者不謳歌堯之子而謳歌舜矣然後之中國踐天子位焉子嗣父位者雖以遭喪之明年正月即位然國事則總于大臣喪畢而嗣君始親政此常禮也舜以大臣攝天子事在堯生存之時堯崩之後堯之子居喪舜攝事如故蓋天子崩世子聽于冢宰三年者禮也喪既畢則堯之子可以嗣堯為天子矣故舜避之而去天下臣民皆就舜而不就堯之子堯之子亦不敢當而舜不得辭于是乃還國中告祖廟而踐帝位與嗣君踰年即位之常禮不同也詢于四嶽闢四門明四目達四聰詢謀也闢開也帝朝大臣百揆四嶽為尊舜自百揆升為天子則朝之大臣惟有四嶽而已故舜踐位之初首謀治于四嶽開四方賔客之門俾下之事情無或壅蔽廣四方耳目之寄俾上之視聽無不周遍也蓋四嶽在內而統四方之諸侯者故謀之以天子治天下之道咨十有二牧曰食哉惟時柔逺能邇惇德允元而難任人蠻夷率服十有二牧十二州之牧也牧以養民為職養民在先足民食足食在不違農時故曰食哉惟時柔謂撫綏之能謂和協之惇謂厚待之德有德之人也允謂信用之元仁者之人也難謂拒絶之任壬通壬人包藏凶惡之人也率猶皆也養其身懷其心者安民也親君子逺小人者知人也如此則不特中國順治雖蠻夷之國亦率皆服從矣蓋十二牧在外而長一州之諸侯者故命之以諸侯治其國之道舜曰咨四嶽有能奮庸熙帝之載使宅百揆亮采惠疇僉曰伯禹作司空帝曰俞咨禹汝平水土惟時懋哉禹拜稽首讓于稷契暨臯陶帝曰俞汝往哉言舜曰者別于堯也此以前之帝曰皆堯此以後之帝曰則舜也奮起也奮庸猶曰登庸載行事也亮明了之意采事治之意惠順也意與若相近謂得事之理稱人之意無所拂戾也亮采惠疇猶言疇若豫采而倒用其語也伯爵禹名崇伯鯀之子姒姓司空掌土之官懋勉也舜問有能奮起升用於羣臣之上而廣明帝堯所行之事者使之居百揆之職亮采而順者其誰乎四嶽與羣臣同辭以對謂崇伯名禹見作司空之官可當百揆之任也俞者帝然四嶽羣臣所舉之當命禹仍作司空而兼行百揆之事謂汝前有平水土之功矣今惟於是百揆之事而勉之哉以司空兼百揆如後世以他官平章事知政事也稽首拜而首至地臣拜君之禮也稷田正官名棄封於邰姬姓契臣名封於商子姓稷契皆帝嚳之子臯陶亦臣名稷契二人臯陶一人故言暨以别之下文殳斨暨伯與倣此俞者帝然伯禹所推之賢汝往哉謂汝其往宅百揆哉不許其讓也舜登帝位百揆職虛故首擇人以居此職帝曰棄黎民阻飢汝后稷播時百穀帝因禹之讓三臣各申命之使仍舊職以終其事阻厄也后君也有土之稱蓋分土為諸侯而仕于帝朝者也稷五穀之長故主穀之官以稷名播種也穀品數多故曰百穀帝言黎民或有厄於飢者汝為后稷之官其教民播是百種之穀一年耕有三年之食則雖遇水旱凶荒不至厄於飢也帝曰契百姓不親五品不遜汝作司徒敬敷五教在寬親相親睦也五品父子君臣夫婦長幼朋友五者之名位等級也遜順也司徒掌教之官聖賢於事無所不敬授人時敷五教事之重者故特言敬五教以父子有親君臣有義夫婦有别長幼有序朋友有信五者為教也寬有容而不迫也帝言百姓或有不相親睦而於五品之人倫或有不順者汝為司徒之官其敬敷此五教以教民在乎寬以待之使其優遊浸漬以漸而至則人不苦其難而教易入也孟子所引堯言曰勞之來之匡之直之輔之翼之使自得之又從而振德之亦此意也帝曰臯陶蠻夷猾夏寇賊姦宄汝作士五刑有服五服三就五流有宅五宅三居惟明克允猾亂也夏猶四時之夏明而大也中國文明之地故曰華夏劫人曰寇殺人曰賊姦宄皆為亂也士理官也服猶衣服之服謂刑加其身也三就朱子以為惟大辟棄之於市宫刑則下𧖟室餘刑亦就屏處蓋不欲風中其瘡誤而至死聖人之仁也五流五刑之當宥者也五宅三居者流雖有五而宅之但為三等之居如列爵五而分土三也孔氏以為大罪居于四裔次則九州之外次則千里之外明謂照察精審允謂刑罰當罪言蠻夷或有猾亂中夏者寇賊或有為姦為宄者不可以無刑也汝為士官五刑五流各有所冝惟明而後能允也帝曰疇若豫工僉曰垂哉帝曰俞咨垂汝共工垂拜稽首讓于殳斨暨伯與帝曰俞往哉汝諧若與若豫采之若同工造作器用者也周官考工記六工曰攻木攻金攻皮設色刮摩搏埴曲禮則曰木工金工獸工草工石工土工也垂臣名有巧思顧命云垂之竹矢莊子工垂之指即此人也帝問誰可稱豫工官之職者而僉舉垂以對也共謂供其職共工蓋衆工之長也殳斨伯與三臣名殳以集竹為兵建于兵車者斨方銎斧也古者多以其所能為名殳斨豈能為二器者歟往哉者令垂往為工官汝諧者以所讓三臣為佐汝與之諧和共治工事也帝曰疇若豫上下草木鳥獸僉曰益哉帝曰俞咨益汝作朕虞益拜稽首讓于朱虎熊羆帝曰俞往哉汝諧上謂髙上之地山林也下謂卑下之地川澤也益臣名嘗同禹治水烈山澤而焚之芟除草木驅逐鳥獸故帝問誰可稱豫上下草木鳥獸之職者而僉舉益以對虞掌山林川澤之官周官分為虞衡二職山與澤曰虞川與林曰衡朱虎熊羆四臣名左氏傳載八元之名有曰伯虎仲熊虎與熊為二人則朱與羆亦二人也史記謂朱虎熊羆為伯益之佐往哉者令益往為虞官汝諧者以所讓四臣為佐汝與之諧和共治虞事也帝曰咨四嶽有能典朕三禮僉曰伯夷帝曰俞咨伯汝作秩宗夙夜惟寅直哉惟清伯拜稽首讓于夔龍帝曰俞往欽哉宅揆典禮之事重與工虞不同故特咨四嶽而皆以有能二字發之典謂主掌其事三禮祀天神享人鬼祭地祗之吉禮也禮有吉凶軍賔嘉而此獨言吉禮者蓋以吉禮為重也伯夷薑姓伯爵夷名也朝臣僉舉稱爵稱名與伯禹同而帝之咨命爵而不名蓋齒德俱尊不純以臣禮待之也秩品次也宗祖廟也秩宗禮官也品次百神之祭祀而專以秩宗名者蓋以宗廟為主也周官掌禮者謂之宗伯都家掌祭祀者並謂之宗人名義蓋亦同此夙早也直謂心不斜倚清謂潔淨不汚禮以敬為主交神明者自早至夜惟當常敬故曰夙夜惟寅敬所以直內然敬立而內直未易能也惟人欲淨盡無所汚濁而後能之故曰直哉惟清夔龍二臣名往欽哉者令伯夷往踐其職而主之以敬也凡事無不當敬典禮者尤當敬故特言欽哉帝曰夔命汝典樂教胄子直而溫寬而栗剛而無虐簡而無傲詩言志歌永言聲依永律和聲八音克諧無相奪倫神人以和夔龍二臣名亦因伯夷之讓而申命之使仍舊職以終其事若前之申命稷契臯陶也胄長也胄子天子之元子公卿大夫元士之適子也直者徑行溫者和煦寬者宏量栗者嚴密剛者堅徑虐者殘酷簡者省約帝言命汝為典樂之官欲俾汝教胄子以變化其氣質之偏也直者不足於溫故欲其溫寬者不足於栗故欲其栗所以益其不及也剛者易至於虐故欲其無虐簡者易至於傲故欲其無傲所以損其太過也四者姑舉其大凡其他莫不皆然而所以變化氣質專在於樂是以教胄子必屬典樂之官而周官掌成均之法以樂德樂語樂舞教國子亦大司樂所職也詩以言陳述其心也在心為志發言為詩故詩者所以言其心之志歌以口唱嘆其詩也永長也詩若急疾讀過則其辭短促必歌之于口每字延引遲久使之悠長故歌者所以永其詩之言永或作詠永或同義聲謂五聲最濁者為宫稍濁者為商微濁微清者為角稍清者為徵最清者為羽依慿倚也所歌之辭若無清濁髙下之節自始至終皆同則雖遲久悠長亦不足聽故曰歌辭之永必慿依于五聲而抑揚髙下之五者清濁相間迭用然後錯雜成文而不質俚故曰聲依永律之十二管長者聲濁短者聲清和謂五聲勻調也蓋宫商角徴羽之髙下無定準必以律管之長短定之每律之宫各有商徵羽而不相亂其長短之度不可有分釐之差然後其聲勻調故曰律和聲聲和律不特歌聲勻調施之八音皆能諧和而無相奪倫矣相奪倫者商太下則奪宫之倫太髙則奪角之倫角太下則奪商之倫太髙則奪徵之倫徵太下則奪角之倫太髙則奪羽之倫羽太下則奪徵之倫太髙則奪變宫之倫不相奪倫而和足以感格神明變移風俗故用之于神則神和用之于人則人和也帝曰龍朕堲讒説殄行震驚朕師命汝作納言夙夜出納朕命惟允火熟之土曰堲燭頭之燼亦曰堲皆有熄滅不生之義音與疾相近古字或通用故孔傳曰疾也讒説誣譛人之言也殄行傷害人之事也震動也驚猶駭也師衆也帝言造讒譛以傷害人者駭動衆聽易于惑人我欲熄滅之故命汝為納言之官凡夙夜之間上言之出下言之入惟其允當而後出納之蔡氏曰命令政教審之既允而後出敷奏復逆審之既允而後入則讒説不得行邪僻無自進矣孔疏曰納言者聽下言納于上出朕命者受上言宣于下納言下納于言朕命有出無納官名納言又云出納朕命互相見也澄曰舜命九官新命者四人禹垂益伯夷也因人之讓而以舊職申命之者五人稷契臯陶夔龍也或因汝典樂汝作納言之上有命字遂以夔龍二人亦為新命者非也今案帝問而命臣拜而讓之新命也不問而命不拜不讓者申命也夔龍若果新命則臣受君之命豈得不拜王氏曰百揆者百官之首故先命禹養民者王道之始故次命稷富之然後教之故次命契刑所以弼教故次命臯陶工者成器以為天下利治人之末故次命垂治人者略具然後及草木鳥獸故次命益自百工至于鳥獸草木咸若則隆禮樂之時也禮樂者治之大成所以事天地鬼神而和理萬物故次命夷夔有禮而後樂生焉故先夷後夔陳氏曰羣賢雖盛苟讒間一行則賢者不安前功廢矣命龍于末所以衛羣賢而成其終猶命十二牧終之以難任人夫子論為邦終之以逺佞人也帝曰咨汝二十有二人欽哉惟時亮天功二十有二人四嶽十二牧九官也人君之位天位也人臣之職天職也天下之事無一非天之事故曰天功舜踐位之初詢四嶽咨十二牧命九官而又總命之曰汝二十有二人者其敬哉惟于是而亮天之事蓋明于其事則善于其職矣三載考績三考黜陟幽明庶績咸熙考核實也三考九載也黜貶退也陟升進也幽謂暗于其事而隳廢所職者明謂明于其事而修舉所職者考績至三厯年至九則人之賢否事之得失畢見故黜其幽陟其明考核精賞罰當人人勉力事功是以庶績咸熙也帝既咨命羣臣史因述其考績黜陟之法于後而并及其效如此且于堯舜二帝在位之事皆以庶績咸熙四字終之辭雖簡而所該則大矣分北三苗分謂使之離異二人隨順為從二人相背為北三苗之君前既竄于三危而三苗之民尚居故地頑而習惡治水之役違拒上命羣類衆多終必為亂故遷徙之使分𣪚各居不得聚在一處既全其生又免于亂聖人立心之仁處事之義兩盡其道矣舜在位三十有三載而始薦禹自代今書所載自初年咨命羣臣之外惟有考績分北二條其他無事可見夫子曰無為而治者其舜也與朱子曰紹堯之後又得人以任衆職故無所為澄以書稽之尤信舜生三十徵庸三十在位五十載陟方乃死前章紀舜攝位之事而于章末敘堯之終此章紀舜在位之事故于章末總敘舜之始終徵召也陟方猶言升遐也舜生三十年堯方召用厯試三年居攝二十八年通三十年乃嗣堯位又五十年而崩也舜以服堯喪畢之明年正月踐位而此五十載數自堯崩之明年始何也蓋堯崩而天下無君舜雖未為天子而紀年則當屬之舜故始自堯崩之明年為舜元年如漢王五年方并項氏得天下然秦亡而天下無君漢王雖未稱皇帝而紀年則當屬之漢故始自入關之年為漢元年也韓子曰陟方乃死傳謂舜升道南方以死竹書紀年帝王之沒皆曰陟陟升也謂升天也書曰殷禮陟配天言以道終其德協乎天也舜之沒云陟者與竹書同文方乃死者所以釋陟為死也地之𫝑東南下如言舜南巡而死冝言下方不得言陟方也朱子曰案此得之但不當以陟字為句絶爾方猶云徂乎方之方林氏曰陟方乃死與揚子黃帝堯舜殂落而死文𫝑同此第四章舜在位之事臯陶謨謨謀也典者載堯舜二帝之善政謨者載臯陶禹二臣之嘉言臯陶曰允迪厥德謨明弼諧禹曰俞如何臯陶曰都慎厥身修思永惇敘九族庶明勵翼邇可逺在兹禹拜昌言曰俞迪猶導也明謂明哲之人弼猶輔也諧猶汝諧之諧惇厚而篤也敘各得其倫理也庶衆也勵勉也翼猶弼也言臣之于君信實開導其德所資之謀謨必以明者為輔弼而諧和之所謂允迪厥德者謹其身之所修而思永久則其德終始如一也身修則家可齊故能惇敘九族所謂謨明弼諧者庶明之人勉勵輔翼則國治也國治則天下可平故自一國之邇可推而及于天下之逺者在此臯陶禹問答于帝前臯陶所言善故禹拜而然其言孟子曰禹聞善言則拜臯陶曰都在知人在安民禹曰吁咸若時惟帝其難之知人則哲能官人安民則惠黎民懷之能哲而惠何憂乎歡兜何遷乎有苗何畏乎巧言令色孔壬申上文之意言庶明勵翼者在于知人邇可逺者在于安民帝帝舜也禹謂臯陶言治國平天下惟在于知人安民二者誠能如是之所言然人未易知民未易安帝舜雖聖當以二者為難而不可忽也知人則有明哲之智而能官使人才安民則有惠愛之仁而民心無不歸嚮巧好令善孔甚也好其言善其色佞偽于外而包藏于中甚深蓋指共工也前此憂歡兜而放之于崇山以其阿黨惑上而害于知人也遷有苗而竄之于三危以其威虐殘下而害于安民也畏巧言令色孔壬之共工而流之于幽州以其靜言象恭姦回叵測而于知人安民俱有害也既能哲又能惠則知仁兩盡雖有如共歡三苗亦不能昏吾之智梗吾之仁而何怪乎憂之遷之畏之哉或問人之難知民之難安何也曰堯舜之智而不遍物當務之為急天下之人品不一也豈兩耳目之聰明所能盡知修已以安百姓博施于民而能濟衆堯舜其猶病諸天下之民數至衆也詎可謂覆載之內無有匹夫匹婦不得其所者乎雖大聖人不敢自足也臯陶曰都亦行有九德亦言其人有德乃言曰載采采禹曰何此以下自亦行有九德至政事懋哉懋哉言知人之事自天聰明至敬哉有土言安民之事行者行于身德者得于心言猶王制所謂辨論官材也載始行也采采事其事也觀其身之所行則知其心之所得其別有九者人不可求備苟有一德可矣此知人之法也先論量其人之有何一德乃論量其人曰可以事何事此官人之法也何者禹復問其詳而臯陶于下文乃詳陳之也臯陶曰寬而栗柔而立願而恭亂而敬擾而毅直而溫簡而亷剛而塞強而義彰厥有常吉哉此詳陳行有九德之目願謹慤也亂治也才能可以治亂也擾馴狎也毅果決也亷有分辨也塞實也義合宜也寬宏而縝栗則不濶疏柔順而植立則不懦弱謹願而恭肅則不至于朴野而不文有治才而敬畏則不至于逞能而妄作馴擾而果毅則不至于少斷徑直而溫和則不至于多忤簡略而亷隅則不至于無分辨剛健而有實則非虛矯恃氣之剛強勇而有義則非鬭狠為亂之強寬與直對柔與剛對亂與簡對擾與強對而轉語辭合二長為一德則不偏皆天之所與學之所成自然而然之懿非以彼濟此之謂彰著也有常久而不變也德著于外終始不變是為吉德也日宣三德夙夜浚明有家日嚴祗敬六德亮采有邦翕受敷施九德咸事俊乂在官百僚師師百工惟時撫于五辰庶績其凝此詳陳言其人有德乃言曰載采采之意三德六德謂九德之中或得其三或得其六也宣達之也浚謂修事明謂通曉有家卿大夫之家也嚴祗敬禮之也亮亦通曉之謂采亦修事之謂有邦諸侯之國也翕合也兼收而並蓄之曰翕受分別而任使之曰敷施俊才之大而敏者乂才之可以治者百僚百官之屬師師官之長也百工百官之事撫循也五辰四時也木火金水旺于四時土寄旺于四季各旺七十二日共三百六十日而成一嵗也凝成也卿大夫之有家者得三德之人日進達而用之足以治其家矣諸侯之有國者得六德之人日尊禮而用之足以治其國矣天子有天下者于九德之人合而受之敷而施之使皆事其事各隨其能以居其官則百官長屬所職之事悉不違時故循四時之序而衆功皆成也無教逸欲有邦兢兢業業一日二日萬幾無曠庶官天工人其代之承上文言天子所以用九德之人者蓋不能自治天職故也無毋通禁止辭教謂上行而下效之逸謂安逸欲謂嗜欲兢兢戒謹業業恐懼幾微也曠廢也天子者諸侯之視效不可導之以逸欲當戒懼一日二日之萬幾一日二日日之至淺萬幾事之至繁一日二日之間事之細微至于萬焉其可逸欲而不兢業乎已雖兢業然萬幾之多豈一人所能自治庶官與我共治者也蓋天子所事皆天之事天以此事付之君君不能自治而分之人是庶官所治之事皆代天而為之也其可有一職之曠廢乎孔氏曰曠空也位非其人為空言官不可以非才天敘有典勑我五典五惇哉天秩有禮自我五禮五庸哉同寅協恭和衷哉天命有德五服五章哉天討有罪五刑五用哉政事懋哉懋哉五庸舊本作有庸今從馬本勑教戒督勉之意我通言君臣自由也寅恭皆敬也寅在心恭在貌和謂不乖衷即典禮也五服五等之服九章至一章是也章顯也承上文天工人其代之而言父子君臣夫婦兄弟朋友有自然之倫乃天所敘也而五者之典各惇其所當惇者勑于我則不可無司徒之官親踈貴賤尊卑隆殺有自然之品乃天所秩也而五者之禮各庸其所當庸者由于我則不可無秩宗之官君臣當內同其寅外協其恭以和此典禮之衷使民彛物則各得其正而無乖戾也命德者天也隨其德之大小而章之以五等之服則不可無百揆之官討罪者天也因其罪之輕重而用之以五等之刑則不可無士師之官命討之政事君臣當勉勉無已不可使賞罰有一之不當也此所謂天工人其代之者也天聰明自我民聰明天明畏自我民明威達于上下敬哉有土威古文作畏二字通用明者顯其善畏者威其惡上謂天下謂民天之聰明非有視聽因民之視聽以為聰明天之明畏非有好惡因民之好惡以為明畏天不在天而在民上天下民通徹為一民即天也故能安民則民懷而天眷之不能安民則民離而天釋之矣有土之君其可不敬哉臯陶曰朕言惠可砥行禹曰俞乃言砥可績臯陶曰豫未有知思曰贊贊襄哉思曰之曰當作日襄去衣而耕也勤力服事之意臯陶謂我所言良可以砥行禹然之謂汝之言砥行之可以有功臯陶謙辭言我未有所知不敢計功也但思每日贊助于帝勤力服事而已此第一章帝曰來禹汝亦昌言禹拜曰都帝豫何言豫思日孜孜臯陶曰吁如何禹曰洪水滔天浩浩懷山襄陵下民昏墊豫乘四載隨山刋木暨益奏庶鮮食豫決九川距四海濬畎澮距川暨稷播奏庶艱食鮮食懋遷有無化居蒸民乃粒萬邦作乂臯陶曰俞師汝昌言孜孜勤勉不已之意禹臯陶相與問答于帝前臯陶既陳謨于帝呼禹使之亦陳其言禹拜而歎美謂臯陶之謨至矣我更何所言惟思日孜孜以務事功而已臯陶問其所以孜孜者禹乃言前此勤勞治水之事昏瞀謂四顧茫然莫知所之也墊下謂卑下之地為水所及也四載水乘舟陸乘車泥乘輴山乘樏也輴史記作橇漢書作毳以板為之其狀如箕擲行泥上樏史記作橋漢書作梮以鐵為之其形如錐長半寸施之履下以上山不蹉跌也隨循刋除也蓋水涌不泄平地皆水不沒者山耳故循山伐木以通治水之道路也奏進也肉食曰鮮水土未平民未播種暨益教民以田進刋木所得禽獸之肉以食也九川九州之川距至濬深也周官一𤱔之間廣尺深尺曰畎一夫之間廣深二尺曰遂一井之間廣深四尺曰溝方十里為成成間廣深八尺曰洫方百里為同同間廣二尋深二仭曰澮皆田間水道此言畎澮而不及遂溝洫舉小大以包其餘也先決九川之水使至于海次濬畎澮之水使至于川也播謂播種百穀也艱漢今文作根謂百穀根生其實可食者也或曰難也人力所成得之不易也暨稷教民播穀以供食然可耕之地尚少故又教民以漁兼進決水所得魚鱉之肉以食也懋大傳作貿貿易也遷徙也化變换也居儲積也兩相貿易遷有于無變化其所居積之貨也蒸衆也米食曰粒蓋水患悉平民得播種之利而山林川澤之貨有無相通以濟匱乏然後庶民皆得粒食而萬邦興于治也禹之意謂今水患雖平然不敢忘昔之勤勞而遂安逸欲常如治水之時所謂孜孜者如此而臯陶以其言為可師也禹曰都帝慎乃在位帝曰俞禹曰安汝止惟幾惟康其弼直惟動丕應徯志以昭受上帝天其申命用休禹既自述其孜孜之意乃進戒于帝俾慎于居位居天位甚難雖聖人不可忽易慎之之道安汝止以下是也止謂心之所止蓋一物有一則皆具于心各有所止凡事之來物各付物循其自然之則曰安審事之幾于始省事之康于終其輔弼又得直人斯無過舉矣徯待凡所作為大應下民期望之志得人心斯得天心故以此明答上帝眷祐之心則天亦申重其已然之命而嘉美之也帝曰吁臣哉鄰哉鄰哉臣哉禹曰俞帝之意謂此非吾所自能實賴臣鄰之助臣謂任事之臣當時九官如周之六卿者是也鄰謂君所親近左輔右弼前疑後丞如周之師傅保者是也君與為師友而不臣之故不曰臣而曰鄰鄰以輔成君德臣以分治天職禹所謂弼帝所謂鄰也輔成君德之鄰固所當重分治天職之臣亦不可輕故帝因禹言弼直而并言之互言至再以見反覆丁寧之意帝曰臣作朕股肱耳目豫欲左右有民汝翼豫欲宣力四方汝為豫欲觀古人之象日月星辰山龍華蟲作會宗彞藻火粉米黼黻絺繡以五采彰施于五色作服汝明豫欲聞六律五聲八音七始詠以出納五言汝聽此帝言所資于臣之事股足髀肱手臂左右有民謂內治畿甸厚民生利民用正民德也翼如鳥翼謂在身兩旁夾持覆護宣力四方謂外使諸侯諭志意布德化救災患也為獸名猴屬有力便捷效使令趨事功者似之黃帝始制衣裳古人蓋謂黃帝象謂肖其形狀星辰凡經星布列周十二辰者皆是此謂星宿三星名為大辰者也華蟲有文華之羽蟲雉也會與繪同畫也宗彞宗廟盛鬱鬯之尊名曰彞周有六彞虎彞蜼彞為上藻水中聚藻粉米白米黼黻黼為斧形刃白身黑黻兩己相背青黑線繡絺讀為黹刺繡也象日月星辰山龍華蟲六者作為繪畫于上衣象宗彞藻火粉米黼黻六者黹為繡紋于下裳采五色之物藍砂粉墨雌黃之屬繪則以五采澤之于筆繡則以五采染之于線彰施彰顯而施用之也五色青黃赤白黑也明謂察其物象采色之合法也七始詠孔氏傳作在治忽史記引書作來始滑惟漢書律厯志引書作七始詠今從之七始國語謂之七均蓋六陽律六隂律各有宫商角徵羽三分損益隔八相生十二管之中用其五為五聲然宫與商商與角徵與羽相去皆一律角與徴羽與宫相去獨二律一律則近而和二律則逺而不相及五聲之序宫生徵徵生商商生羽羽生角至角則窮矣角又隔八下生其律位與宫相比謂之變宫則羽聲距正宫雖間二律而距變宫止聞一律矣變宫又隔八土生其律位與徵相比謂之變徵則角聲距正徵雖間二律而距變徵止聞一律矣正聲五變聲二每律用七聲為均相和而均調故曰七均七聲迭用以終始一調故曰七始先有六律然後可定五聲宫徵該正變二變非正聲故止曰五聲也五聲定則被之八音之器而奏七始之均詠歌也八音之外有人聲也人聲之精者為言五言唇齒舌牙喉之音為言各不同也或曰五方之言也樂工審于聲音故亦能辨人之聲音而使之出納五言也聽謂審其聲律音調之中倫也帝欲左右而臣翼之作肱也帝欲宣力而臣為之作股也帝所欲觀而臣明之作目也帝所欲聞而臣聽之作耳也有民蓋后稷司徒所職四方蓋四嶽十二牧所職服色蓋典禮所職聲音蓋典樂所職翼為明聽皆曰汝者禹與羣臣咸在而禹作揆兼總衆職也豫違汝弼汝無面從退有後言欽四鄰此帝言所資于鄰之事違戾也我有違戾于道汝當弼正其失汝無面諛以為是而背毁以為非不可不敬爾四鄰之職也四鄰謂在前在後在左右也帝舜之時輔弼疑丞之庶官不可知其為誰或百揆四嶽亦兼此職如周以六卿兼三公也曰汝弼曰汝無面從責之禹及居是官而在帝側者林氏曰舜大聖人夫豈有違于道禹亦大聖人豈有面從後言無是而猶警戒所以為聖吕氏曰舜非有所歉而畏人之後言非容受有所未盡而致人之後言虞廷之臣非肯欺其君而面是背非者聖人敬畏無已虛懷待諫惟恐過之不聞言之不盡故其求之切也如此大傳曰古者天子必有四鄰前曰疑後曰丞左曰輔右曰弼其爵視卿其祿視次國之君其為人也仁好學多聞道順天子未嘗有過者謂之疑其位在前強立敢斷輔善從義者謂之輔其位在左亷潔切直弼過諫邪者謂之弼其位在右齋給便利善應顧問而不回者謂之丞其位在後天子中位而聽朝四鄰維之是以慮無失計舉無過事也庶頑讒説若不在時侯以明之撻以記之書用識哉欲並生哉工以納言時而揚之格則承之庸之否則威之帝與禹言欲臣鄰各盡其職以助已而未任之人亦欲教養以成其才蓋百官世胄萬民之俊選及諸侯所貢之士皆他日居臣鄰之職者其可用之才固將論定而官使之其間有庶頑讒説不在是選者儻以為不可用而遽棄之慮有遺才之失故必命掌教掌樂之官悉心造就冀其改過遷善而得為吾用侯張侯以射也如王制所謂司徒命鄉簡不率教者以告耆老皆朝于庠習射上功是也明之使自明也射之禮必明于進退周旋升降揖讓之儀必明于騶虞貍首采蘩采蘋之節又必內志正外體直持弓矢審固而後可以中所以開悟其心思智識者非一故曰以明之撻撲也如儀禮鄉射記所謂楚撲長如笴射者有過則撻之是也記之使之自記也人有不善每欲諱護不遭戮辱稍久即忘恥不甚則悔不深悔不深則改不力射而有過及犯教者撻之中庭衆所共見辱莫大焉所以堅牢其羞惡憤悔者至切故曰以記之書用識哉者謂嵗時常教習之苟其有一善則書而識之以待考校如周官族師屬民讀法書其孝弟睦姻閭胥聚衆庶讀法書其敬敏任恤是也夫習射而使之明撻過而使之記又用書以識其善道之齊之懲之勸之至再至三而未已者欲其並生而已善者生之徒不善者死之徒改不善而從善是與之並生也已上蓋使掌教者教之猶以為未足又使典樂者教之工謂樂工納言樂工平日所納之言也揚播揚也工以所采詩歌之類時時播揚倡歎以曉諭感動之而興起其善心如周官大司樂以樂語教國子興道諷誦言語是也承進也威謂屏之責之也其改過而至于善者則進之用之其不可化而終不改者則屏之責之也嗚呼帝舜為君為師之道仁之至義之盡也禹曰俞哉帝光天之下至于海隅蒼生萬邦黎獻共惟帝臣惟帝時舉敷納以言明庶以功車服以庸誰敢不讓敢不敬應俞哉者然之而不盡然蘇氏謂與春秋傳諾哉意同是也隅角也海隅四海之隅蒼生草木蒼蒼然而生之處言極其逺也黎獻黎民之賢者庶朱子云當作試由音相近而訛也帝德光輝逺被普天之下以至海隅草木所生之地萬邦黎民之賢誰不感慕興起共願為帝朝之臣惟帝于是而舉之既敷納之以其言又明試之以其功必其言之施于事而有功然後賜以車服而用之用人之際如此精別誰敢不以敬以讓而應上之求言此蓋謂諸侯所貢之士必不敢為頑讒也不言國之俊選者以逺包近也帝不時敷同日奏罔功無若丹朱傲惟慢遊是好傲虐是作罔晝夜額額罔水行舟朋淫于家用殄厥世敷同孫氏謂猶言普同也帝之用人試其言之有功然後用不是普同無分別而日進無功之人世胄非才者不得世其官故以丹朱示戒堯處子朱于丹淵為諸侯丹者朱之國名也慢怠慢也因怠惰而好逰行也傲嬉戲也因嬉戲而為虐害也不分晝夜額額不休息此好慢遊之事罔水行舟如奡之平地蕩舟此作傲虐之事朋猶言羣聚也羣聚而淫亂于家也殄絶也世者世堯之天下也丹朱不肖堯以天下與舜而不與朱故曰殄厥世言此蓋以警公卿大夫元士之子使之不敢為頑讒也豫創若時娶于塗山辛壬癸甲啓􅈱􅈱而泣豫弗子惟荒度土功創懲也塗山國名夀春縣東北有山名曰塗山國蓋近此山也啓禹子􅈱􅈱泣聲荒大度營為也圡功治水之事也禹言我懲創丹朱之如此故娶妻厯辛壬癸甲四日即往治水其後過門不入聞子啓泣聲不暇子之惟以荒度土功為急朱子曰丹朱如是故不得為天子我如此勤苦故有功以此戒教令莫如丹朱而如我也弼成五服至于五千州十有二師外薄四海咸建五長各迪有功苖頑弗即工帝其念哉夾持以正弓體曰弼薄迫近也治水事畢經理天下定為五服之制每一服一面五百里兩面相夾而成千里如弓之弼然五服共五千里既別九州後增其三一州立一州牧為之師故有十二師內自侯服而始外迫四海之逺皆建五等諸侯為之長師統諸侯者也長君一國者也有師有長各使導迪其民以趨事功惟三苖之國于治水之前已竄其君于三危而其民留居故土者習頑不順政教治水之時不就官司之徵役在內讒説之頑可化也在外苗民之頑未易化帝其念之哉苗民之頑其後帝分北之猶殷民之頑周公遷之于洛蓋所以化其頑也帝曰迪朕德時乃功惟敘臯陶方祗厥敘方施象刑惟明敘者無一事之不理也帝言導迪朕德者是汝之功惟當更使事事咸敘又言臯陶為禹之助方祗敬其當敘之事方示人以畫象之刑凡猾夏之蠻夷姦宄之寇賊有刑以待之惟當更加明審蓋因禹臯陶謨之後歸美二臣而又欲其加勉也此第二章夔曰戛擊鳴球搏拊琴瑟以詠祖考來格虞賔在位羣后德讓此堂上之樂戛亦擊也戛輕擊重球玉磬石音也叩之則鳴故曰鳴球搏猶擊也輕手取聲曰拊琴瑟絲音也詠登歌也鳴球琴瑟其聲清越和平可與人聲相比故戛擊搏拊之而詠也祖考所祭之祖考虞賔丹朱也在位內百官也羣后外諸侯也皆助祭者虞賔不臣故序內外諸臣之上德讓有相讓之德也樂作而所祭者來格助祭者德讓則神人無不和矣下管鼗鼓合止柷敔笙鏞以間鳥獸蹌蹌下謂堂下之樂管竹音也堂上之樂以歌為主故謂之升歌堂下之樂以管為主故謂之下管鼗小鼓鼓大鼓革音也合止為二音合作止則敔止柷木音敔當是土音塤之類而舊説相傳以為斫木成伏虎狀背有鉏鋙櫟之以為聲蓋因敔名而生鉏鋙之義必不然也笙匏音也列管于匏中又施簧于管端鏞大鐘金音也堂下之吹與堂上之歌相間故曰間蹌蹌舞貌鳥獸蹌蹌而舞則萬物無不和矣孔疏曰樂上下迭奏而曲成神人鳥獸之應上下共致以神人尊而在上故配堂上之樂言之鳥獸賤而在下故配堂下之樂言之非堂上之樂獨感神人堂下之樂偏感鳥獸也簫韶九成鳯凰來儀簫韶舜樂名簫字本作簫舞者所執之物成謂樂曲之一終也樂曲終必變而更奏周官言九變傳言九奏與九成之義同鳳凰靈鳥也儀有容儀也簫韶合奏九成而樂大備雖靈鳥瑞物不常有者亦感至和而來儀也夔曰於豫擊石拊石百獸率舞庶尹允諧此又一時之言拊猶言戛也石通球而言石音貴于衆音故韶樂以球為首商頌亦言依我磬聲也百獸該物之飛走庶尹該官之正二方擊拊石音不待衆音備奏而已能召人物之和上文先言神人而後鳥獸以尊卑為序此先言百獸而次庶尹以難易為序夔言樂如此蓋有舜之德是以有夔之樂道德樂之本聲音樂之具舜德極大極盛而韶樂又盡善盡美故其感應之妙古今莫及此第三章帝庸作歌曰勑天之命惟時惟幾凡樂必有歌辭上章載韶樂感應之效驗此章載帝朝君臣之歌詩勑天之命謂以天命難保相教戒督勉也惟時惟幾謂無一時不勑無一事不勑雖須臾不敢忘雖細微不敢忽也此帝先言其所以作歌之意乃歌曰股肱喜哉元首起哉百工熙哉股肱臣也喜歡喜而有為元首君也起謂作興而無怠百工熙哉謂百工之職業廣大光明也此惟時惟幾而勑天命者也臯陶拜手稽首揚言曰念哉率作興事慎乃憲欽哉屢省乃成欽哉拜手首至手稽首首至地先拜手而後稽首九拜中之吉拜也揚言發揚其聲而言也念哉令同列思念帝歌之意作起也振發之意興事謂建立其事不可頽廢也憲法也率皆起而立事事必循法所當致慎于始事雖已成猶當屢省于終始終同一敬也此臯陶先拜帝歌又言所以賡帝歌之意乃賡載歌曰元首明哉股肱良哉庶事康哉又歌曰元首叢脞哉股肱惰哉萬事墮哉賡續也載始也帝歌則先臣後君臯陶賡則先君後臣君以知人為明臣以任職為良如此則庶事安泰也叢脞煩碎也惰懈怠也墮傾圯也君不識體要而行臣之事臣虛竊祿位而怠君之事則萬事廢壞矣王氏曰前言庶事後言萬事甚言叢脞與隋之敗事也帝拜曰俞往欽哉蔡氏曰帝拜重其禮也然其言而曰汝等往治其職不可不敬也陳氏曰典謨之書皆以欽終之此第四章書纂言卷一
