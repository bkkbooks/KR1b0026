body:
  text: 書纂言卷二元吳澄撰夏書夏禹有天下之號也禹貢成於堯之時而繫之夏書者禹之王以是功也禹貢貢者下供上之名林氏曰是篇有貢有賦而獨以貢名篇者孟子曰夏后氏五十而貢則貢又夏后氏田賦之總名也禹敷土隨山刋木奠髙山大川禹先分布九州之土地以別州界隨山之𫝑斬木通道又定其山之髙者川之大者以為各州綱紀然後因界分相其便冝而施功焉此第一章總叙大槩以起後章冀州冀州堯都之地三面距河兖河之西雍河之東豫河之北八州皆言疆界而冀不言者以尊帝畿示天子無外之意既載壺口治梁及岐既者已事之辭載始有事也壺口山名龍門之上口也在隰州吉鄉縣東南梁吕梁山也在石州離石縣東北春秋成公五年梁山朋壅河爾雅云梁山晉望謂此山也岐狐岐之山也在汾州介休縣勝水所出東北流注于汾吕不韋謂龍門未闢吕梁未鑿河出孟門之上水溢逆流孟門蓋在壺口之下流壺口治則河流壺之中而不復出其上矣自是乃治梁治岐魏志曰梁山北有龍門大禹所鑿新安王氏曰龍門兩山夾河其一在洚州龍門縣其一在同州韓城縣陳氏曰水患莫甚于河河之險在于龍門孟門蓋孟門龍門乃河之上下口為河之巨扼故首治之吕氏曰此禹最用功處孟子謂禹行其所無事如鑿龍門豈得為無事鑿其所當鑿不憚難而止乃是行其所無事也林氏曰鑿者疑就狹處鑿而廣之未必如賈讓所謂隳斷天地之性也蔡氏曰梁岐二山河水所經治之所以開河道先儒以為雍州梁岐者非是既修太原至于嶽陽修因鯀之功而修之也廣平曰原太原河東太原府也嶽太嶽山在晉州霍邑縣東山南曰陽今嶽陽縣地也從太原至嶽陽皆修之蓋汾水出太原經太嶽東入于河此導汾水也朱子曰他所舉山川皆先地後績覩成功而言也壺口梁岐太原獨先績後地本用功之始而言也豈治之有難易歟覃懷砥績至于衡漳覃懷地名漢河內郡懷縣今懷州也衡漳水名衡古橫字漳水二源一出平定軍樂平縣少山者名清漳一出潞州長子縣發鳩山者名濁漳東至涉縣合清漳東北至定逺軍東光縣入北河曽氏曰地形南北為從東西為橫河自大伾而北流漳水東流而注之河從漳橫故曰衡漳蔡氏曰桑欽云二漳異源而下流相合同歸于海唐人亦言漳水能獨達于海請以為瀆而不云入河者蓋禹導河自洚水大陸至碣石東北入海周定王五年河徙砱礫則漸遷而東漢初漳猶入河其後河日以東而漳水益逺至欽時河自大伾而下已非故道而漳自入海矣故欽與唐人所言如此厥土惟白壤無塊曰壤白色也壤質也水害既去土復其常故以土色質辨土之所宜也王氏曰冀土非盡白壤其大致然也餘州倣此厥賦惟上上錯厥田惟中中賦者上稅下之名粟米兵車之類錯猶閒也賦上上第一等閒或第二等田中中第五等田賦之等不同何也賦之九等以各州嵗入總數較其多寡而為髙下也數之最多者為上上田之九等以各州土地所宜較其肥瘠而為髙下也地之最肥者為上上林氏曰冀州先賦後田者畿內之地併與廛里場圃關市之類征之如周官載師所載非但田賦也他州皆先田後賦蓋賦出于田而已恆衛既從大陸既作恆衛二水名恆水出定州曲陽縣恆山北谷東流合滱水至瀛州髙陽縣入易水眺氏曰今恆水西南流至真定府行唐縣東流入滋水又南流入衡水非古徑矣衛水出真定府靈夀縣東流合滹沱河過信安軍入易水從從其道也大陸蔡氏曰髙平曰陸禹河自澶相以北在貝冀以及枯洚之南皆穿西山踵趾以行班馬王橫所謂載之髙地是也及其已過信洚之北則西山𫝑斷曠然四平蓋此處謂之大陸杜佑李吉甫以邢趙深三州為大陸者得之孫炎以為巨鹿北廣阿澤河所經者非是程氏曰古河未嘗徑邢行巨鹿之廣阿也作謂耕治水患既息而平地之廣衍者可耕治也敘此于田賦之下以其成功在田賦既定之後吕氏曰言于田賦之前者其害大不可不先治也言于田賦之後者其害小故徐治之也島夷皮服島海中山皮服製皮為衣海島之夷以皮服來貢也夾右碣石入于河碣石在漢右北平郡驪城縣遼西臨榆縣河入海處蓋在碣石東南冀州三面距河他州貢物必達于海而後至帝都故八州敘事于章末紀其入貢之道冀州天子所自治故無貢篚惟有島夷皮服之貢島夷來貢所經之道東海在左碣石在右來行其閒由海入河而達帝都也此第二章濟河惟兖州東南據濟西北距河蘇氏曰河濟之閒相去不逺兖州之境東南跨濟非止于濟也蔡氏曰河昔北流兖州之境北盡碣石河右之地後淪于海河益徙而南濟河始相去不逺林氏曰濟古文作泲說文注云此兖州濟也其從水從齊者說文注云出常山房子縣贊皇山濟泲音同字異當以古文為正澄案導水章所敘冀州之濟兖州之濟實一水也濟泲二字蓋通用注說文者因二字而以北濟南泲為二水非也九河既道孔氏曰河水分為九道在此州界蔡氏曰唐滄州即漢漸海羣地北境與平州接相去五百餘里禹之九河當在其地後為海水淪沒故其迹不存九河入海之處有碣石在其西北岸九河水道變遷而平州正南有山名碣石者去海岸五百餘里則是古河自今已為海處始分為九而淪于海矣漢王橫言昔天常連雨東北風海水溢西南出浸數百里九河之地已為海水所漸酈道元亦謂九河碣石苞淪于海此說是也澄案後儒蓋因爾雅九河之名而誤道水得其道也後倣此雷夏既澤雷夏在濮州雷澤縣西北澤者水之鍾也孫氏曰既澤向未為澤今始為澤也吕氏曰治水不出兩端川流畎澮則相轉而已達海使之有所歸也或不可以達海則損數百里之地因其𫝑以為澤使之有所容也灉沮㑹同灉沮二水名兩相合謂之㑹合為一謂之同新安王氏曰九域志濮州有沮溝即禹貢灉沮㑹同者沮溝出濮陽灉水出曹州下流相合桑土既蠶是降丘宅土桑土冝桑之土也兖地冝桑後之濮上桑間可驗也地髙曰丘兖地卑民皆升髙丘以避水今水退而桑土既可蠶矣于是民始下髙丘而居平土也厥土黑墳厥草惟繇厥木惟條墳土脈墳起也如左氏傳所謂祭之地地墳是也繇抽也條長也吕氏曰兖水最甚草木至是始抽始長與包喬不同厥田惟中下厥賦貞作十有三載乃同田中下第六等貞猶木之貞幹貞幹在下枝條在上貞者物之下事之終也賦下下第九等言在九州之下九等之終也禹治水八年十有三載通治水八年言之則此州水平其後他州五年歟同謂一州之內或髙或下水患皆平若有一處未平則不可謂同也兖水最甚故作治十有三載乃同也厥貢漆絲貢者謂諸侯貢天子故畿外八州皆有貢先漆絲以土地最冝者先之也他州倣此厥篚織文篚者所貢之物入于篚也篚竹器筐屬幣帛必承以篚所謂篚厥𤣥黃也織文織而成文綾羅之屬東陽馬氏曰周官九貢一曰祀貢菁茅是也二曰嬪貢絲枲是也三曰器貢浮磬是也四曰幣貢琨瑶皮革是也五曰材貢杶幹栝柏篠簜是也六曰貨貢龜貝金珠是也七曰服貢絺紵織文是也八曰斿貢羽毛是也斿旗之有旄垂下者九曰物貢魚鹽橘柚是也林氏曰八州之貢兖雍最寡荆揚最多然各因土地所宜雖有多寡而無輕重浮于濟漯達于河泛舟于水謂之浮自水通水謂之達案地志漯水出東郡東武陽至千乘入海程氏謂此乃漢河與漯殊異澄嘗浮濟舟人言漯合于濟孔疏曰自漯入濟自濟入河此第三章海岱惟青州東北至海西南距岱岱泰山也在襲慶府奉符縣西北三十里孔疏曰東北當跨海堯時青州越海而有遼東舜分青州為營州即遼東也漢公孫度據遼東自號青州刺史矣嵎夷既略嵎夷即堯典嵎夷蓋海濵之夷在登州略為之封畛也濰淄其道濰淄二水名濰水出密州莒縣東北濰山北至濰州昌邑入海淄水出淄州淄川縣東南七十里原山東至青州壽光縣入濟其者將然之辭上言既道既者已然之辭林氏曰河濟下流兖受之淮下流徐受之江漢下流揚受之青雖近海然不當衆流之衝但濰淄二水順故道則功畢矣比之他州用力最省者也厥土白墳海濵廣斥濵水旁也斥鹹土也可煮為鹽東方謂之斥西方謂之鹵平土則白而墳海濵之土則處處皆斥鹵故曰廣斥厥田惟上下厥賦中上田上下第三等賦中上第四等也厥貢鹽絺海物惟錯岱畎絲枲鉛松怪石鹽斥地所出絺細葛也海物水族排蜃羅池之類惟或在句中猶言與及暨也或在句端猶如越如若也錯石可磨礪者也詩云他山之石可以為錯畎谷也枲麻也鉛黑錫也怪石怪異之石碔砆之屬岱山之谷出此五物林氏曰凡貢不言所出之地者一州所出皆可貢言所出之地者以此地所産為良也萊夷作牧厥篚檿絲萊夷萊山之夷作謂耕作牧謂放牧夷人以耕牧為業也檿山桑也野蠶食山桑成繭其絲中琴瑟絃以之為繒堅韌異常惟東萊出此絲水平而萊夷之地可作牧矣故篚檿絲而來貢也浮于汶達于濟汶水出原山西南至鄆州中都縣入濟蓋淄水出原山之隂汶水出原山之陽不言達河者達濟則自濟可達河矣此第四章海岱及淮惟徐州東至海北距岱南至淮林氏曰北接青州則至岱南接揚州則至淮一州之境有四至七州止言二至此獨載三面者止言海岱則嫌于青止言淮海則嫌于揚故言海岱及淮而後徐州之疆境始別淮沂其乂蒙羽其藝淮沂二水名淮之源出于豫之境至揚徐閒始大其泛溢為患尤在于徐故淮之治于徐言之沂水出沂州沂水縣艾山行六百里南至下邳入泗源出尼丘山西北徑魯雩門即曽㸃浴沂處又一源出武陽冠石山又一源出黃孤山又有出沂州費縣者皆曰沂水乂治也徐之水非一獨舉淮沂者蓋徐州泗水為大而淮沂二水與之並沂在上流而入泗水淮在下流而受泗水二水治則他無不治矣蒙羽二山名蒙山在費縣西北八十里跨兩邑閒費縣在其東南蒙隂縣在其東北顓㬰國在費縣西北故為東蒙主羽山在沂州臨沂縣之東南海州朐山縣之西北藝言可種藝也大野既豬東原砥平大野澤名在巨野縣北五里其澤廣大南通洙泗北連清濟俗呼梁山泊水蓄而復流曰豬東原漢東平國即鄆州也後為東平府以地之平故曰東平在徐西北謂之東者以在濟東故也東平國景帝時亦名濟東國東平下濕自古多水患後世數徙其城砥平者水患已去砥于平也蔡氏曰大野東原所以志濟厥土赤埴墳草木漸包土黏曰埴黏泥如脂之膩也考工記言摶埴老氏言埏埴土黏膩故可摶可埏而為器埴墳其土質有黏膩者有墳起者漸進長也包叢生也厥田惟上中厥賦中中田上中第二等賦中中第五等也厥貢惟土五色羽畎夏翟嶧陽孤桐泗濵浮磬淮夷蠙珠暨魚土五色謂青黃赤白黑五種之土徐土赤而五色亦間有之案周書作雒篇曰建大社于國中其壝東青土南赤土西白土北驪土中央舋以黃土將建諸侯鑿取其方面之土包以黃土苴以白茅以為土封故曰受削土于周室此貢土五色蓋以為是用也羽畎羽山之谷也夏五色具也翟雉也五色之雉羽中旌旄嶧山名下邳縣有葛嶧山嶧陽嶧山之南也孤桐特生之桐材中琴瑟泗水名出泗水縣桃墟西北陪尾山源有泉四因以為名西南經曲阜分為二派南洙北泗至瑕丘復合又經魚臺東南過沛彭城又過下邳入淮泗濵泗水之二旁也浮磬石露水濵若浮于水然或曰泗水旁近石浮生土中不根著者也下邳有石磬山或以為古取磬之地不曰石而曰磬成磬而後貢也淮夷淮北之夷蠙蚌之别名淮有美魚謂之淮白魚夏翟孤桐浮磬珠魚各有所産之地非他處所有故詳其地厥篚𤣥纎縞𤣥黑繒纎黑經白緯縞白繒浮于淮泗達于河自淮而泗自泗達于河或謂泗水不可達河者蘇氏曰自淮泗入河必道于汴世謂隋煬始通汴入泗禹時無此水道此考之不詳也漢書項羽與漢約中分天下割鴻溝以西為漢東為楚文頴注云于滎陽下引河東南為鴻溝以通宋鄭陳蔡曹衛與濟汝淮泗㑹于楚即今官渡水也魏武與𡊮紹相持于官渡乃楚漢分裂之地自秦漢有之安知非禹跡邪晉王濬伐吳杜預與書云足下當徑取秣陵自江入淮踰于泗汴泝河而上振旅還都王濬舟師古今絶倫而自汴泝河可以班師則汴水之大小當不減于今足以見秦漢魏晉皆有此水道非煬帝創開也禹貢九州之末皆記入河水道而淮泗獨不能入河理不應爾意此水道其後或為鴻溝或為官渡或為汴皆引河而注之淮泗也此第五章淮海惟揚州北至淮東南至海彭蠡既豬陽鳥攸居彭蠡澤名跨豫章鄱陽之境廣數百里受歙信饒撫之水及洪州東境水豬者名鄱陽湖流出名揚瀾左蠡䖍吉𡊮筠之水及洪西境之水皆㑹過南康至湖口縣入江陽鳥鴈也冬月居于此澤洲渚之閒千百為羣日冬南夏北鴈九月而南正月而北隨日南北趨暖避寒故曰陽鳥三江既入震澤砥定唐仲初吳都賦注松江下七十里分流東北入海者為婁江東南流者為東江併松江為三江其地今亦名三江口吳越春秋謂范蠡乘舟出三江之口者是也入謂入海蘇湖之水于此入海也震澤太湖一名五湖在吳縣西南五十里今湖州也震如三川震之震俗謂湖翻太湖之水震蕩難定故名震澤江之下流三江既入海則震澤砥于定也篠簜既敷厥草惟夭厥木惟喬厥土惟塗泥篠箭竹簜大竹竹濶節曰簜少長曰夭喬髙也塗泥水泉濕也下地多水其土淖新安王氏曰兖徐言草木于厥土之下其土髙下燥濕同兼山林言之也揚之塗泥惟言沮洳之多山林不與故言草木于厥土之上厥田惟下下厥賦下上上錯田下下第九等賦下上第七等上錯錯在下上之上言間出第六也九等分為三品下上與中下異品故特言上錯也厥貢惟金三品瑶琨篠簜齒革羽毛惟木島夷卉服三品金銀銅也瑶琨皆美石瑶次玉琨次瑶篠材中矢笴簜材中樂管亦可為符節周官掌節有英簜齒象齒革犀兕革羽鳥羽毛牛毛木楩梓豫章之屬凡木之可用者皆是島夷東海南海島上之夷卉草也卉服織草以為衣服也厥篚織貝貝錦名詩云成是貝錦染其絲五色織之成文者曰織貝不染五色而織之成文者曰織文厥包橘柚錫貢凡貢物有宜入篚而貢者有宜包裹而貢者故又出厥包一條于厥篚之外小曰橘大曰柚錫與也言下與上有時特獻送而貢非常制也故曰錫貢錫貢字例當在貢物之上為嫌厥篚之文繫以錫貢則不成辭故言之于貢物之下沿于江海達于淮泗順流而下曰沿沿江入海自海入淮自淮入泗泗可達河而至帝都矣林氏曰禹時江淮未通故揚州入貢必自江以入海然後達于淮泗至吳夫差掘溝通水與晉㑹黃池然後江淮始通孟子謂禹排淮泗而注之江蓋誤指吳王所通之水以為禹跡澄謂江北淮南地髙于水雖曰溝通江淮兩水之間掘一橫溝兩端築堤壅水在溝中若欲行舟須自江中拽舟上溝行溝既盡又拽舟下淮江淮二水實未嘗通流也此第六章荆及衡陽惟荆州北距南條荆山南盡衡山之陽江漢朝宗于海朝宗諸侯見天子之名也春曰朝夏曰宗江漢合流于荆去海尚逺然水道已安而無汜濫橫流之患其𫝑奔趨于海猶諸侯朝宗也九江孔殷九江今之洞庭也經言九江在長沙下雋西北楚地記言巴陵瀟湘之淵在九江之間今嶽州巴陵縣即楚之巴陵漢之下雋也洞庭正在其西北則洞庭為九江審矣今沅水漸水元水辰水敘水酉水澧水資水湘水皆合于洞庭意以是名九江也孔甚殷盛也言九水之合有所容歸其流甚盛也漢志以九江為在廬江之尋陽縣者非是蓋尋陽乃揚州之境不屬荆州且惟一江而已不見有九江而孔疏又以彼處九江之名起于近代則非禹貢所謂九江也沱潛既道雲土夢作乂爾雅曰水自江出為沱自漢出為潛江漢源發梁州流經荆州故梁荆皆有沱潛此則荆州江漢之出者也案枝江縣有沱水然其流入江非出于江也華容縣有夏水者首出于江尾入于沔亦謂之沱潛乃江漢下流支派不一蓋謂江漢下流不一支派無循其道者矣雲夢澤名周官職方氏荆州其澤藪曰雲夢案華容縣南有雲夢澤枝江縣西有雲夢城江夏安陸縣亦有雲夢蓋此澤跨江南北八九百里故每處名焉土謂水退而土見作乂謂可耕種而治乂鄭氏曰雲在江北今玉沙監利景陵等縣夢在江南今公安石首建寧等縣易氏曰左傳楚子涉睢濟江入于雲中則在江北為雲楚子田江南之夢則在江南為夢江北江漢之㑹水潦常積雲在北方者方見土江南皆山水源易涸夢在江南者已作乂沈氏曰舊尚書雲夢土作乂太宗時得古本尚書乃雲土夢作乂詔改從古本厥土惟塗泥土下濕與揚州同厥田惟下中厥賦上下田下中第八等賦上下第三等蔡氏曰田比揚只加一等而賦為第三等者地濶人衆也厥貢羽毛齒革惟金三品杶幹栝柏礪砥砮丹惟箘簵楛荆州貢與揚州大抵多同然荆先言羽毛者孔注謂善者為先也杶幹栝柏皆木名杶古椿字幹柘也柏葉松身曰栝揚州貢木不言其名凡木可用者皆貢此州所貢只此四木而已礪粗砥細皆磨石也砮石中矢鏃丹丹砂箘簵二竹楛木名材皆中矢笴三邦砥貢厥名包匭菁茅三邦未詳其地砥致也匭匣也既包而又匣之敬也菁茅有刺而三脊所以供祭祀縮酒之用三邦砥貢其有名者今辰州麻陽縣包茅山出菁茅然他處亦有之舊以三邦砥貢厥名屬上文箘簵楛者非是厥篚𤣥纁璣組𤣥染黑六入者七入則為緇深黑矣纁染綘三入者四入則為朱深赤矣璣珠不圓者組綬璣組以璣穿結為組也揚州先篚後包此先包後篚者以菁茅祀貢重物包而且匭故升在篚前九江納錫大龜尺二寸曰大龜神物國之所寶非可常得若偶得之則以入納而錫于上謂納不謂貢明其非貢物也故于貢包篚之外別出此條浮于江沱潛漢逾于洛至于南河江沱潛漢其水道出入不可詳大𫝑則自江沱而入潛漢也逾越也漢與洛不通故自漢出陸行及洛濵乃用舟順流而下逾越洛口而遂入河也程氏曰不徑浮江漢兼浮沱潛者隨其貢物所出之便或由經流或循支派也此第七章荆河惟豫州西南至南條荆山北距大河伊洛瀍澗既入于河伊水出虢州盧氏縣熊耳山東北至河南府鞏縣入洛瀍水出河南郡舊穀城縣潛亭北至偃師入洛澗水出澠池縣白石山至新安入洛伊瀍澗三水入洛而洛水入河此言四水皆入于河猶漢入江江入海而荆州言江漢朝宗于海意同蓋四水並流大小相敵故也滎波既豬滎波二水名周官職方氏豫州其川滎雒其浸波溠滎在今鄭州滎澤縣西五里敖倉東南鄭氏謂滎今塞為平地滎陽民猶謂其處為滎澤酈道元曰禹塞淫水于滎陽下引河東南以通淮泗濟水分河東南流漢明帝使王景即滎水故瀆東注浚儀謂之浚儀渠漢志謂滎陽縣有狼蕩渠首受濟是也南曰狼蕩北曰浚儀一也滎瀆水受河水有石門謂之滎口石門波水爾雅云水自洛出為波山海經曰婁涿之山波水出其隂北流注于穀二說不同未詳孰是導菏澤被孟豬菏澤在興仁府濟隂縣南三里其地有菏山故名其澤為菏澤也蓋濟水所經水經謂南濟東過冤句縣南又東過定陶縣南又東北菏水東出焉是也被被覆而及之也孟豬在睢陽郡虞城縣西北周官作望諸左傳爾雅作孟諸漢志作盟豬史記作明都夏氏曰菏澤水盛餘波被于孟豬如弱水餘波入于流沙也不言入言被者水盛乃被之不常入也厥土惟壤下土墳壚土不言色色不一也壚疏也顔氏曰𤣥而疏說文曰黑剛土土質髙下不同故別而言之厥田惟中上厥賦錯上中田中上第四等賦錯上中第二等而間或第一等也蓋冀賦第一或時數少于豫則降為第二而升豫為上上豫賦第二或時數多于冀則升為第一而降冀為上中也厥貢漆枲絺紵周官漆林有征周時豫為畿內故征而不貢禹時豫在畿外故貢而不征紵麻屬林氏曰顔師古謂織紵為布及練然經但言貢紵或成布未成布不可詳厥篚纎纊纊綿也林氏曰纎與纊二物也錫貢磬錯磬錯治磬之錯也凡錫者非常貢故于末特言之龜非貢物故言納不言貢橘柚磬錯雖是貢物非常制所貢也故言錫貢浮于洛達于河豫去帝都最近其東境徑自入河其西境由洛達河此第八章華陽黑水惟梁州東距西嶽華山之南西據黑水岷嶓既藝沱潛既道岷嶓二山名岷江源所出嶓漢源所出二源既滌水無阻滯泛溢之患其山已可種藝也沱潛江漢別流之在梁州者成都府郫縣東有沱水西入江又彭州導江縣西南有沱水東入江又洋州真符縣有灊谷水西南入漢灊音潛凡江漢支流或大或小或長或短皆名沱潛不拘一處岷嶓藝則江漢之上源治矣沱潛道則江漢之下流治矣蔡蒙旅平和夷砥績蔡蒙二山名蔡山在雅州嚴道縣蒙山在雅州名山縣酈道元謂其山上合下開沫水徑其間溷崖水脈漂疾厯代為患蜀郡太守李冰發卒鑿平溷崖則二山在禹為用功多也旅祭名旅平者治功畢而祭以告水患之平和夷自嚴道而西地名和川夷人居之旅祭二山而和夷所居之地亦致功也林氏曰今雅州有和川鎮即和夷故地厥土青黎黎黑也土不言質質不一也厥田惟下上厥賦下中三錯田下上第七等賦下中第八等三錯者或時錯出第七則降揚于下中而梁為下上或時錯出第九則升兖于下中而梁為下下隨本等第八為三故曰三錯厥貢璆鐵銀鏤砮磬熊羆狐貍織皮西傾因桓是來璆玉磬鐵柔鐵銀白金鏤剛鐡可鏤刻者也磬石磬先鐵後銀鐵多于銀也後世蜀之卓氏程氏以鐵冶冨擬封君見梁州産鐵之多也熊似豕羆似熊而黃狐類犬而長尾貍則狐之小者孔氏謂以四獸之皮織今通外國之俗者為澄言曰織皮者獸皮熟之去毛削令至薄裁令極細如縷以金傅之織而為布非縫皮為裘亦非織毳為褐也西傾山名在洮州臨潭縣西南桓水名水經曰西傾之南桓水出焉葉氏曰中國之貢疑西傾即西戎之境熊羆狐貍織皮文當與西傾因桓是來相屬謂四獸織皮西傾之戎因桓水而來以通中國獻方物也澄案西傾山雖屬雍州然山趾所必廣西傾之戎蓋在梁州境內此句特為織皮之貢而言章末乃總言一州貢物達于帝都之道他州之貢則皆然舊注以此句屬下文浮于潛之上者非是浮于潛逾于沔入于渭亂于河凡漢水分支可以容舟處皆潛也不言浮漢而言浮潛者隨其支流徑便不必至漢乃浮也桑欽叙漢自西樂城以上為沔度水口以下為漢大率漢之支流皆名潛漢之上流皆名沔此由潛以逹漢也沔在山南屬梁州渭在山北屬雍州水不可通自沔而北陸行度隴至于渭濵乃用舟順流而不可逾越渭口而遂渡河也文當曰入于沔逾于渭蓋二文互也漢武帝時人有上書欲通褒斜道及漕事下張湯問之云褒水通沔斜水通渭皆可以漕從南陽上沔入褒褒絶水至斜間百餘里以車轉從斜下渭蔡氏曰褒斜之間絶水百餘里故曰逾然當曰逾于渭今曰逾于沔又未可曉絶河而渡曰亂此第九章黑水西河惟雍州西跨黑水東至西河西河主冀都而言龍門之河在冀西也弱水既西弱水出吐谷渾界窮石山自張掖郡刪丹縣西至合黎山與張掖縣河合既西者導之西流也栁宗元曰其水無力不能負芥投之則墊沒及底故名弱水涇屬渭汭涇水出安定岍頭山易氏曰岍頭山一名崆峒連亘原州髙平百泉平涼三縣涇水東南流至涇州臨涇縣保定縣邠州冝祿縣永夀縣又東北流至京兆醴泉縣九嵕山東仲山西當水出山處故漢名谷口縣白渠溉田在此地又自池陽東流至涇陽縣南七里左傳襄十四年諸侯伐秦濟涇而次在此地東南流至髙陵縣東北流至雲陽縣西二十五里即鄭國鑿渠處又東流而入渭洛入河處謂之洛汭渭入河處謂之渭汭涇至雲陽縣而入渭又至華州華隂之永豐倉而入河此二百八十里間涇與渭相連故曰涇屬渭汭漆沮既從灃水攸同漆沮二水名漆水自耀州同官縣東北界來經華原縣沮水自坊州升平縣北子午嶺出下合榆谷慈馬等川至華原縣合漆水至同州朝邑縣東南入渭從如恆衛既從之從灃水出京兆鄠縣北東至咸陽縣經上林苑與渭水合為一故曰同案水經漆水出扶風杜陽縣眺氏曰此邠州漆也程氏曰杜陽今岐山普潤縣之地亦漢漆縣之境非禹貢之漆水也荆岐既旅終南惇物至于鳥鼠荆岐二山名荆北條荆山在耀州富平縣掘陵原岐在鳯翔岐山縣東北十里終南惇物鳥鼠三山名終南一名太一山在京兆萬年縣南五十里惇物一名垂山在武功縣鳥鼠俗呼為青雀山在渭源縣西舉三山而不言所治者蒙上文既旅之文也原隰砥績至于豬野廣平曰原下濕曰隰詩曰度其隰原即此也在邠州豬野澤名武威縣東北休屠澤是也治水成功自髙而下故先言山次原隰次陂澤也三危既宅三苗丕敘三危山名未詳其地地記以為在鳥鼠之西而南當岷山或以為燉煌左傳曰先王居檮杌于四裔故允姓之姦居于瓜州即燉煌也叙謂服從政教也舜竄三苗之君于三危者猶尚桀驁頑不即功蓋三苗故地山川險惡氣習使然今湖南徭洞時猶竊發俘而詢之多為猫姓豈其遺種歟厥土惟黃壤黃者土之正色林氏曰物得其常性者最貴雍州黃壤故其田他州莫及厥田惟上上厥賦中下田上上第一等賦中下第六等或謂荆州厥賦下上上錯之等是與雍州兩易而此不言錯何也曰荆賦或時數多于雍則錯出第六而雍為第七自是荆之賦有增羡而非雍之賦有減殺也故荆言錯而雍不言錯厥貢惟球琳琅玕織皮崑崙析支渠搜西戎即敘球琳皆美玉或云球玉磬琅玕美石似珠今南海有青琅玕珊瑚屬也崑崙析支渠搜皆西戎國名崑崙在臨羌西析支在河關西渠搜近朔方地即猶即工之即敘猶丕敘之敘即敘言臣順而效貢也梁州織皮西傾之戎所貢雍州織皮此諸國之戎所貢易氏曰臨羌西即今蘭州之地河關西即今積石軍之地朔方郡有渠搜縣水經云河自朔方東流經渠搜故城禮大戴記云北發渠搜西戎又在三國之外如漢之西域亦總三十六國舊本織皮至即敘十二字在㑹于渭汭之下蘇氏曰其文當在球琳琅玕之下浮于積石之上今從之浮于積石至于龍門西河㑹于渭汭積石山名禹導河所始處龍門在河中府龍門縣雍之貢道有二北道自積石至西河南道自渭入河北道自龍門而下與南道㑹于渭汭蔡氏曰他州入貢亦必不止一道發此例以互見耳案邢恕奏乞下熙河路打造船五百隻于黃河順流放下至㑹州西小河內藏放熙河漕使李復奏竊知邢恕欲用此船載兵順流而下去取興州契勘㑹州之西小河鹹水其濶不及一丈深止于一二尺豈能藏船過㑹州入韋精山石峽險窄自上垂流直下髙數十丈船豈可過至西安州之東大河分為六七道散流渭之南山逆流數十里方再合逆溜水淺灘磧不勝舟載此聲若出必為夏國侮笑事遂寢邢恕之䇿如李復之言可謂謬矣然此言雍州貢賦之路亦曰浮于積石至于龍門西河則古來此處河道固通舟楫矣而復之言乃如此何也姑録之以備參考云此第十章導岍及岐至于荆山逾于河壺口雷首至于太嶽砥柱析城至于王屋太行恆山至于碣石入于海陳氏曰隨山治水故以導言水源出于山因山以相水之源委山有澗谷者導而納之川朱子曰導山自北而南據導字分南北二條而江河為之紀二條又分為四鄭氏曰岍岐為正隂列西傾為次隂列嶓冢為次陽列岷山為正陽列澄案每列之中又有二焉此條河渭北境之山北條之北也岍岐荆三山在渭北北條之北之一也岍在雍州岍源縣西六十里北與隴山接今之隴山天井金門秦嶺山皆古之岍也逾謂行及河濵用舟截流橫渡逾越河濵而又出陸也壺口雷首太嶽砥柱析城王屋太行恆山碣石九山在河北北條之北之二也雷首一名中條山在河中府河東縣南十五里太嶽即霍山在晉州霍邑縣東三十里砥柱在陜州陜縣東北五十里山在水中破為三穿河出其間有似于門俗名三門山析城在王屋縣西北七十里山峰四面如城有南門焉王屋在垣曲縣北十五里周回一百三十里髙三十里山形如屋太行連亘河北諸州澤州之晉城陸州懷州之河內武涉修武以至于河北境皆太行所經故太行在河北為天下之脊恆山北嶽也在漢常山郡上曲陽縣西北入于海言山傍之水皆入海也西傾朱圉鳥鼠至于太華熊耳外方桐柏至于陪尾岍與西傾皆雍州山故西傾不言導其文蒙于導岍也此條大河南境之山北條之南也西傾朱圉鳥鼠太華四山北條之南之一也朱圉在秦州清水縣伏羌鎮西南六十里太華西嶽也在華州華隂縣南八里熊耳外方桐柏陪尾四山北條之南之二也熊耳在虢州盧氏縣南五十里外方中嶽嵩山也在河南府登封縣西北二十三里桐柏一名大復山在唐州桐柏縣西南九十里陪尾案唐志泗水縣有陪尾山泗水出焉蓋此是也孔疏以安州安陸縣橫尾山為陪尾者非是導嶓冢至于荆山內方至于大別此條江漢北境之山南條之北也嶓冢荆山二山在北南條之北之一也嶓冢在興元府金牛鎮東二十八里其山中髙東西下形似冢山以東水皆東流山以西水皆西流俗謂分水嶺荆山在荆門軍當陽內方大別二山在江北南條之北之二也內方一名章山在復州竟陵縣大別在漢陽軍漢陽縣漢水入江處鄂州在江南岸北對此山岷山之陽至于衡山過九江至于敷淺原嶓岷皆梁州山故岷山不言導其文蒙于導嶓冢此條大江南境之山南條之南也岷衡二山南條之南之一也岷山在茂州汶山縣西北俗謂鐵豹嶺南去青城石山百里蜀以西近江源者皆為岷山連峰接岫青城天彭諸山之所環繞皆岷也岷山之陽其山非一衡山南嶽也在衡州衡陽縣北七十里南一峰曰岣嶁山自縣西北以至湘南縣東南皆衡山也過九江謂導山之人至衡山之麓遂越洞庭之尾東取山路以至敷淺原是導岍岐荆山逾于河以盡恆山碣石之例也敷淺原一山南條之南之二也導山自衡山東行至今江州德安縣有敷淺原即漢厯陵縣地敷淺原蓋兼山水而名望敷陽乃其中間之小山廬阜則其盡處之大山也此第十一章導弱水至于合黎餘波入于流沙蔡氏曰濬川自隨山始故導水次于導山山水皆原于西北故敘山叙水皆自西北而東南導山則先岍岐導水則先弱水也朱子曰導水凡九條弱水最西北水又西流不經中國故首言之黑水從雍梁西界入南海亦不經中國故次之河為四瀆宗且發源西北故中國之水以河為先漢發源于西在江之北故次于河江在漢南故次于漢濟雖北而發源近故次于江淮在濟南故次于濟渭水所經止于雍州于一州為大于九州為小故後及之洛水所經止于豫州自渭而言又在南故居末易氏曰弱水合黎流沙同在甘州即漢張掖郡弱水出刪丹縣南山下合黎山在張掖縣西北二百里俗名要塗山又有居延澤在縣東北六十里古以為流沙朱子曰流沙在合黎之西杜佑曰在沙州西八十里其沙隨風流行故曰流沙導黑水至于三危入于南海水經曰出張掖雞山南至燉煌過三危山漢志曰益州郡滇池縣有黑水祠夏氏曰黑水在張掖為雍州之界在于闐為梁州之界易氏曰樊綽蠻書載蠻水之入南海者有四西洱河與瀾滄江合一也麗水與瀰渃江合二也新豐川合勃弄諸水三也唐蒙所見盤江四也綽指麗水為黑水一名樣禆江而羅些城北有山即三危山其水從羅些城三危山西南行上流出于西羌吐蕃下流南至蒼望城又南至雙王道勿川有瀰渃江西南來㑹南經驃國之東而入海羅些乃南詔吐蕃南北相距之地其西接吐蕃其東接劍南東北之西境蔡氏曰梁雍二州西邉皆以黑水為界是黑水自雍之西北而直出梁之西南也中國山𫝑岡脊皆自西北而來積石西傾岷山岡脊以東之水既入于河漢岷江其岡脊以西之水即為黑水而入于南海導河積石至于龍門南至于華隂東至于砥柱又東至于孟津東過洛汭至于大伾北過洚水至于大陸又北播為九河同為逆河入于海河水出塞外東北入塞內漢張騫窮河源一源出葱嶺一源出于闐于闐河北流合葱嶺河東注蒲昌海去玉門陽關三百餘里水潛行地下南出積石為中國河說者謂張騫徒見兩水入蒲昌海誤以為河源爾雅云河出崑崙墟唐長慶中薛元鼎使吐蕃自隴西成紀縣西南出塞二千餘里得河源于莫賀延磧尾曰悶磨黎山其山中髙四下所謂崑崙也東北流與積石河相連河源澄瑩冬春可涉下稍合流色赤益逺他水并注遂濁河源非出于積石禹導河自積石始也易氏曰河自廓州積石軍北東北流一百五十里至化城縣南八十步東流一百四十里至鄯州龍支縣西南六十里積石山在縣西九十八里又三百九十里至河州枹罕縣南五十里積石在縣西北七十里一名唐述山今人自龍支縣山為大積石此山名小積石又三百里至蘭州五泉縣北二十里東北流三百八十里至㑹州之㑹寧縣西北有黃河堰又五百三十里至靈州之回樂縣枕黃河即後魏刁雍開冨平艾山舊渠通河溉田之地又經靈武縣又一千餘里至西受降城東流一百八十里至天德軍又二百里至中受降城又三百里至東受降城三城皆唐景隆中張仁願所築並在河岸以遏突厥河轉南流三百五十里至朔州之鄯陽縣西三十里又三百七十四里至嵐州之合河縣西二里又七十里至石州之臨泉縣北二十里又經定湖縣西二百步孟門關在縣西一百步又經平夷縣西四五十里又四百二十里至隰州之永和縣東六十里又經泰寧縣又二百里至慈州之吉昌縣北六十里又經文城縣孟門山在縣西南三十六里河中有山如槽水流懸注七十餘尺俗名石槽與龍門相對即龍門之上口為河之巨厄又一百八十里至河中府之龍門縣北二十五里乃龍門口所謂至于龍門者也河口廣八十步水陸不通大魚集其下不得上又二百里至陝州之西北對河為華州華隂縣河經太華之北故曰華隂河至東流經陜州之芮城縣陜縣又五十里至陜石縣有砥柱山在河中又二百五十里至河南府王屋縣南五十里又至河陽縣後為孟州南城四面臨河謂之冨平津古謂之孟津又經鞏縣有五社渡洛水入河謂之洛口亦名什谷張儀所謂下兵三川塞什谷之口者也又經泛水縣本漢成臯縣一名虎牢三百九十里至衛州汲縣南五十里謂之棘津亦謂之石濟津東北流至黎陽縣大伾山在縣南七里俗號為黎山二百五十里至相州臨河縣南五里又八十里至澶州頓丘縣南二十五里北流一百二十里至魏州之貴鄉縣大河故瀆在縣西三里俗云王莽河東北流二百一十里至貝州經城縣枯河在縣東十里又二百一十里至冀州南宫縣洚水故瀆在縣東南六里以禹河東從故道入海而不入河又一百二十里至滄州下流故道不可復考九河入海當在滄州之北蔡氏曰自積石至龍門三千里經但一書積石不言方向荒逺在所略也龍門而下因其所經記其自北而南則曰南至華隂記其自南而東則曰東至砥柱又詳記其東向所經則曰孟津曰洛汭曰大伾通利軍黎陽縣臨河有山蓋大伾也山在大河垂欲趨北之地又記其自東而北則曰過洚水洚水今冀州信都縣枯洚渠也周時河徙砱礫至漢又改向頓丘東南流與禹河道背戾漢魏郡鄴縣有故大河在東北古洚瀆自貝州經城北入南宫貫穿信都向北而入故河于信都之北又詳記其北向所經則曰大陸曰九河又記其入海處則曰逆河自洛汭而上河行于山其地皆可考自大伾而下垠岸髙于平地故決齧流移水陸變遷而洚水大陸九河逆河皆難指實然上求大伾下得碣石因其方向辨其故道則猶可考也蘇氏曰播為九河播分也朱子曰河從積石北行又東乃折而南計應三千里然後至龍門而為西河南流至華隂而極始折而東至砥柱至孟津過洛汭而為南河至大伾而極始折而北流為東河至兖州而分為九復合為一而入海河流于是終矣澄案自漢以來人但知有漢河不能復知禹河入海之處雖遷固且然近世河趨汴泗徑淮入海與淮合為一瀆河瀆遂絶不考古者非惟不知禹河所在雖漢河故迹漸莫能知已嶓冢導漾東流為漢又東為滄浪之水過三澨至于大別南入于江東為北江入于海嶓冢山漢水所出在興元府西縣之西此漢水東源也其西源在三泉縣之東始源曰沔徑葭萌入漢酈道元謂東西兩川俱出嶓冢而同為漢水是也易氏曰漾水東流百八十里經興元之南鄭縣至此名漢水又七十二里至城固縣北二里又三百里至洋州興道縣百步又經金州之漢隂縣南二里又五百里至金州西城縣北百步又經洵陽縣又經均州之豐利鄖鄉二縣又六百八十里至均州武當縣西北四十里水中有滄浪州至此又名滄浪水東南流經襄陽府之樂鄉冝城二縣又三百六十里至襄陽府襄陽縣又三百二十里至郢州長壽縣十步又三百里至復州景陵縣南縣有汊汊水即三澨也又經沔州漢川縣至漢陽縣大別山之東北入江澄曰漢水南入于江乃循江北岸東行為江之北而入于海夫漢既入江與江混為一水而又曰東為北江入于海有似別為一水然何也蓋漢水源逺流大可亞于江兩相匹配與他小水入大水之例不同故于荆州言朝宗于海必以江漢並稱蓋曰江之入海非獨江水實兼漢水江固為江漢亦為江也故漢得分江之名而為北江記其入海者著其為瀆也三瀆皆自為一瀆惟江與漢共為一瀆導水九條始之以三水終之以二水而中間記四瀆其一河一瀆也其二漢與江一瀆也其三濟瀆其四淮瀆河瀆非無他水入之然皆小水入大水故河得以大并小而專為瀆江漢𫝑體均敵二水合流所以如此其大不以漢附于江而泯其入海之實故于漢于江並言入海而同為瀆也若漢不為瀆則東為北江入于海七字衍文而其序當殿導洛之後矣岷山導江東別為沱又東至于灃過九江至于東陵東迤北㑹于匯東匯澤為彭蠡東為中江入于海易氏曰岷山漢志在蜀郡湔氐道西徼外考唐志岷山近在茂州而江源逺出西徼松州交川縣古西羌地江源鎮在縣西北三十里江南流二百四十里至翼州翼水縣二百步又六十里至茂州汶山縣汶山即岷山禹導江始此又經蜀州之青城縣彭州之導江縣後以二縣治永康軍又三百七十里至成都縣南七里縣有沱江鎮以沱水名即東別為沱者也凡江之別出者為沱梁荆二州皆有此特其一又二百里至眉州通義縣東三里又經陵州之籍縣嘉州犍為縣又五百六十里至戎州僰道縣東北十步東流五十里經南溪縣有符黑水入江今南廣溪也又經瀘州之綿水江安二縣又三百一十里至瀘州瀘川縣南三十步東北流經渝州之萬壽縣七百里至渝州巴縣南又三百四十里至涪州涪陵縣東流三百五十里至忠州臨江縣南百步又二百六十里至萬州南浦縣又經至夔州之雲安縣南百步又三百一十里䕫州魚復縣瞿塘峽在縣東二里水中孤石名灔澦堆又一百里至巫山縣巫山在縣東四十里江水南去縣一里波流峻急或有冒險朝發白帝暮宿荆渚其間千二百里又經歸州之巴東縣南百步又三百三十里至歸州秭歸縣縣城東北二面並臨絶澗西大溪水南大江有空嶺峽在縣東百二十里湍水迅急上甚艱險載物悉下然後得過又經硤州之冝都縣南二百步又二百里至硤州夷陵縣自蜀至此五千餘里下水五日上水百日縣西北有西陵山自縣浙沂江二十里入峽口名為西陵峽長二十里所謂三峽此其一也或謂巴自有三峽此即峽石東南流入夷道縣百步又三百三十里至江陵府江陵縣東流經公安石首二縣東南至澧州界即東至于澧也先儒以為澧水然澧水入洞庭而後入江又以為澧陵然澧陵在江東南數百里禹貢言至者非山即澤今澧州在江南無非山澤是小山澤因水而得名者自澧州界東流五百七十里至嶽州巴陵縣北五里洞庭湖在縣西南五十步周回二百六十里此禹貢之九江過九江言橫截乎洞庭之口是漢水過三澨之例巴陵與夷陵相為東西夷陵亦名西陵則巴陵為東陵可知江水過九江而後至于東陵自巴陵東迤北經臨湘縣北又經鄂州之蒲圻縣五百一十里至鄂州江夏縣澄曰鄂北對漢陽軍大別山漢水自北來入江合流江水與之㑹水之合流曰匯故曰東迤北㑹于匯不言㑹于漢者以漢有漾沔滄浪之異名不可指定一名而言故但曰㑹于匯也江㑹漢水合流之後東流經武昌縣北又經興國軍界六百里至江州德化縣又六十里有水自南來入江合流其澤名為彭蠡西岸江磯山乃廬山盡處東岸今為湖口縣所謂匯澤為彭蠡也東匯澤為彭蠡六字舊本誤在導漾條南入于江之下解說不通遂至紛紜異論今正其錯簡諸儒之疑可釋而辨可息矣江與彭蠡合流之後東北流又經池州城北五里池口鎮自江州至此凡五百八十里又經太平州當塗縣之采石鎮又經建康府城西十五里又經鎮江府自池州至此凡七百四十里又東至江隂軍北對泰州入海自鎮江府至此凡三百里江之入于海也必曰為中江何也蓋禹貢以漢水江水共為一瀆漢既分江之半為北江故江不得專江之名漢為北江則江當為南江矣然循江南面岸有彭蠡湖水若曰南江恐疑為指湖水而言以江水行于湖水漢水之中故曰為中江也導沇水東流為濟入于河溢為滎東出于陶丘北又東至于菏又東北㑹于汶又北東入于海沇水發源王屋山東南頂崖下既見而復伏至濟源縣西北平地而出有兩源東源周回七百步其深不測西源周回六百八十五步其深一丈其見者兩源合流東至溫縣厯虢公臺西南入河其伏者潛行地下絶河而南溢為滎澤再出于陶丘北溢者言如井泉自中而滿非有來處如菏澤被孟豬之被出者言在平地自下面而湧非有上流如某水至某處之至滎澤後既填塞陶丘亦無竇濟瀆故迹不復可尋自至菏㑹汶之後流而為川其迹始著易氏曰孟州王屋縣王屋山南行九十里至濟源縣流方名濟水南流一百二十里而入于河自入河處東南三百三十里至鄭州之滎澤縣有古滎澤東五十里至鄭州又一百里至汴州東北二百四十里曹州濟隂縣有定陶鎮後以為縣屬廣濟軍蓋陶丘一名再成唐堯所居故為陶唐又東北九十里至菏澤陶丘在廣濟軍之西菏澤在廣濟軍之東北凡古濟所經之地自河至此七百餘里濟至菏澤又東北至東平府之壽張縣安民亭㑹于汶北流一百里至須城縣西二里又經齊州之長清縣東北流經豐濟縣西二十六里二百里至臨邑縣西四十里又經全節章丘臨濟三縣又經淄州之鄒平鄉南三十里又經濟陽又一百九十里至髙苑縣七十步東流二百四十里至青州博興縣北百步東北流入海蔡氏曰濟水伏流絶河乃其物性之常經書導沇或見或伏而脈絡可考程氏言河溢出南岸為滎溢出者非濟水顧弗深考耳蓋溢者指滎而言非指河也且河濁而滎清滎之水非河之溢明矣先儒皆以濟水性下徑疾故能穴地流注顯伏吳興沈氏亦言濟水伏流地中今厯下凡發地皆是流水世謂濟水經過其下東阿亦濟所經取其井水煮膠謂之阿膠用攪濁水則清人服之下膈疏痰蓋其水性趨下清而徑故也澄曰沇水之伏而見也近見于河北之濟源者終于入河是為北濟逺見河南之滎澤者終于入海是為南濟導淮自桐柏東㑹于泗沂東入于海淮水出胎簪山東北過桐柏山胎簪蓋桐柏之旁小山也易氏曰淮自桐柏縣東流經蔡州之朗山縣又二百八十里經真陽縣南八十里北至蔡州一百里又經褒信縣又經新息縣南五里又三百里西南流經潁川汝隂縣南五里東流二百二十里經下蔡縣後為壽春府又五百里至宿州蘄縣南七十里又經虹縣又經濠州之招義縣即漢淮陵縣地漢志所謂淮水至淮陵入海者也東北經泗州之徐城縣又二百四十里至泗州臨淮縣東流經宿遷縣東北流經漣水縣又二百七十里入海澄曰沂至下邳先入泗泗至淮隂乃入淮而曰東㑹于泗沂二水均敵不以沂既入泗而沒其名如朝宗並稱江漢之例導渭自鳥鼠同穴東㑹于灃又東㑹于涇又東過漆沮入于河鳥鼠同處一穴故名其山曰鳥鼠易氏曰山在渭州渭源縣西七十六里後屬雍州禹導渭始此有三源正東微南流至襄武縣東流五十里至隴西縣縣後為鞏州又至秦州之伏羌縣南一里又三百里至秦州上邽縣北三十里秦州後徙治成紀又一百二十里至隴州之南由縣南四十里縣後併入吳山又三百二十里至鳯翔之岐山南二十里又經京兆府之渭南同官咸陽三縣又二百七十里至萬年縣北五里又二百六十里至華州華隂縣東北流三十五里有永豐倉入河謂之渭口澄案㑹于灃在鄠縣東㑹于涇在雲陽縣西過漆沮在同州朝邑縣蘇氏曰㑹灃㑹涇過漆沮者渭水自西而東之次雍州先涇次漆沮後灃者散言境內諸水也合沙鄭氏曰渭水源出塞外行二千里而附于河不得與四瀆並而施功不下于四瀆故與四瀆同紀于導水也導洛自熊耳東北㑹于澗瀍又東㑹于伊又東北入于河洛水出冢嶺山在商州上洛縣西七十里東流七十里至上洛縣東北流九十里至洛之南四十里乃在熊耳山之西浮梁之水出焉而注于洛又四百六十里至虢州盧氏縣熊耳山在縣南五十里禹導洛始此東流經河南府之福昌縣東北流經壽安縣又四百五十里至河南府河南縣北四里洛陽縣西南三里自苑內上陽之南瀰漫東流六十三里至緱氏縣東北流七十七里至鞏縣㑹伊瀍澗之水一百四十里而入河合沙鄭氏曰洛水其上源不逺不及渭漢其流之不過涇沔其行僅千餘里而入河而得與導水之列者洛居天下之中與河並為出圖書之所後人見洛而思禹功蓋亦以此曽氏曰水所經一也有言至言過言㑹者言過言㑹者皆水名言至者或山或澤也河之至于龍門華隂砥柱大伾漢之至于大別皆山名河至于孟津則地名河至于大陸濟至于菏澤皆澤名也江至于澧或以為澧州多山澤或地名因水也至于東陵陵名也以大水合小水謂之過河之過洛汭過洚水漢之過三澨江之過九江渭之過漆沮皆以大合小也二水𫝑均而相入謂之㑹江㑹于匯濟㑹于汶淮㑹于泗沂渭㑹于灃于涇洛㑹于澗瀍于伊皆水𫝑之均也天下之水莫大于河故未嘗言㑹濟淮洛之水為小凡川之合者勢皆可均故未嘗言過也此第十二章澄曰篇內地里凡稱郡者因漢之舊稱府州軍者因唐宋所名不及一一改從後所稱也九州攸同四隩既宅此言民居之安同謂九州之內無一處有未治者隩隈水涯也四隩四海之隈水患悉平海濵逺地既可奠居則中國近地可知也九山刋旅九川滌源九澤既陂四海㑹同此言水患之平九州之山槎木通道而旅祭告成矣九州之川疏滌其源而無復壅滯矣九州之澤既有陂障而無或決溢矣四海㑹同言天下之水皆與㑹同而為一也或曰諸侯之見天子時見曰㑹殷見曰同九州川澤之水一一皆歸于四海其㑹同諸水猶天子之㑹同諸侯也六府孔修庶土交正砥慎財賦咸則三壤成賦中邦此言水平而任土以賦民也六府水火金木土穀也修整飭六者皆修故曰孔修庶土川澤墳衍原隰丘陵山林也交俱也正辨土所宜各得其正也財謂民所出賦謂上所取致其謹者惟恐過取也則準也三壤上中下九等之田也依約田之髙下以成則法于中國則取之有制而不過也錫土姓祇台德先不距朕行此言水平而建國以君民也錫土者分之以百里七十里五十里之地也錫姓者天子建國因生以賜姓如生于姜水者賜之姜姓生于媯汭者賜之媯姓也祇敬也德先有德之先世也所封諸侯乃帝者子孫所以敬其有德之先世也有德之後象賢故人人能恭順天子而不距違我所行也此第十三章總結前章別州隨山濬川之事五百里甸服百里賦納總二百里納銍三百里納秸服四百里粟五百里米甸服畿內之地也甸田服事也所服皆田賦之事故謂之甸服五百里者王城之外四面皆五百里也禾本全曰總刈禾曰銍半藁也半藁去皮曰秸謂之服者三百里內去王城為近非惟納總銍秸而又使之服輸將之事也獨于秸言之者該前二者而言也粟穀也內百里為最近故并禾本總納二百里次之只刈禾半藁而納三百里又次之去藁粗皮而納四百里為逺去其穗而納穀五百里尤逺去其穀而納米蓋量地之逺近而為納賦之輕重精粗也此分甸服五百里而為五等也孫氏曰二百里以下不言賦粟米不言納從上文也朱子曰總至米皆公田之賦畿內不封諸侯故田賦入天子五百里侯服百里采二百里男邦三百里諸侯侯服者侯國之服甸服外四面又各五百里也采者卿大夫邑地男邦男爵小國也諸侯諸侯之爵大國次國也先小國而後大國者大可以禦外侮小得以安內附也此分侯服五百里而為三等也陳氏曰言男則子在其間言侯則公伯在其間或曰王制云千里之外曰采禹定千里之外曰侯服侯服一百里內為采者此也然周官六鄉之外為六遂六遂之外有家邑稍地者大夫之采地乃在畿內又有小都縣地大都疆地者公卿王子弟之采地亦在畿內與禹貢不同疑禹貢侯服之采其周官所謂邦國閒田乎蓋侯服百里最近王畿故不以封而為閒田天子之子弟食采者畿內之疆地世逺族蕃則其采地有及于侯服故空其地以待之所謂百里采者如此或曰此說非也虞周之制各不同耳五百里綏服三百里揆文教二百里奮武衛綏服去王畿漸逺謂之綏者撫安之義侯服外四面又各五百里也揆度也綏服內取王畿千里外取荒服千里介于內外之間故以內三百里揆文教外二百里奮武衛文以治內武以治外聖人所以嚴華夷之辨者如此此分綏服五百里而為二等也五百里要服三百里夷二百里蔡要服去王畿已逺皆夷狄之地其文法略于中國謂之要者要約之義羈縻之而已綏服外四面又各五百里也夷夷之也夷東夷之名也要服內三百里東西南北皆曰夷者謂待之若東夷而不繩以中國之法也蔡放也左傳云蔡蔡叔孟子云殺三苗字異音同古字通用也說文作􅔁謂􅔁散之也散置罪人于此也此分要服五百里而為二等也五百里荒服三百里蠻二百里流荒服去王畿益逺而經理之者視要服為尤略也其地荒野故謂之荒服要服外四面又各五百里也蠻慢之也蠻南夷之名也荒服內三百里東西南北皆曰蠻者謂待之若南蠻而不繩以中國之法也流流徙罪人之地蔡與流皆所以處罪人而罪有輕重故地有逺近之別也此分荒服五百里而為二等也今案要服荒服內三百里均以處夷人而俗小異故曰夷曰蠻蠻蓋甚于夷也外二百里均以處罪人而罰不同故曰蔡曰流流蓋加于蔡也夷蠻雖非中國禮義之俗而其居猶在蔡流者之內蓋亦人類非有罪也蔡流之人不與同中國既逺屏要荒矣而所出夷蠻者之外蓋深弃絶之所謂投之四裔以禦魑魅也或曰內三百里亦處蔡人外二百里亦為夷人夷與蔡蠻與流互文以見耳然則夷地蓋以處罪之輕于蔡者蔡地又逺于夷其猶戎與蠻地蓋以處罪之輕于流者流地又逺于蠻其猶狄與蔡氏曰五服四面二千五百里然堯都冀州北境恐無二千五百里藉使有之亦皆沙漠不毛之地而東南財賦所出則反弃要荒以地𫝑考之殊未可曉但古今土地盛衰不同當時冀北未必荒落如後世耳亦猶閩浙之間舊為蠻夷淵藪而今冨庶蕃衍土地興廢不可以一時槩也澄案周制方千里曰王畿其外方五百里曰侯服又其外方五百里曰甸服又其外方五百里曰男服又其外方五百里曰采服又其外方五百里曰衛服又其外方五百里曰蠻服又其外方五百里曰夷服又其外方五百里曰鎮服又其外方五百里曰蕃服禹并王畿為五服周王畿之外自為九服而里不同蓋禹服言其面每面各五百里故五服相距方五千里周服言其方方五百里則其面一方二百五十里自王畿至蕃面二千七百五十里相距五千五百里增于禹貢但五百里耳禹辨甸服為王畿其外侯服其別有三綏服要服荒服其別各二蓋亦別為九焉曽氏曰周王畿即禹甸服其侯服甸服即禹侯服其男服采服即禹綏服其衛服蓋若綏服之奮武衛也禹之衛去甸服八百里周之衛去王畿千里周之衛凡二百里其蠻服夷服即禹要服其鎮服蕃服即禹荒服澄案周之蠻服一作要服東漸于海西被于流沙朔南暨聲教訖于四海漸如水之漸漬被如衣之被覆聲教者雖不近見善教之實然亦逺聞善教之聲而效慕之也訖盡也凡言四海者謂東西南北通乎地下之海其海也西北地髙臨海皆髙山海在下如深井然人不得而見東南卑海水溢出岸上今所見之海乃海傍平地水所淹及者耳故東南海中洲島又有國土人民更幾千里始為無底之海東漸于海之海指今人所見者而言非訖于四海之海也青徐東距海岸故曰東漸雍州弱水餘波西入流沙故曰西被言漸出今海被過流沙之外與北際南陲之逺皆及嚮慕帝朝之聲教而所及極盡于地維窮處之四海也中庸曰天之所覆地之所載日月所照霜露所隊凡有血氣者莫不尊親其斯言之謂與此第十四章禹錫𤣥圭告厥成功錫猶錫貢納錫之錫下錫上也治水事畢故以𤣥圭為贄而見于帝以告成功蔡氏曰水色𤣥故圭以𤣥云此第十五章甘誓甘地名有扈氏國之南郊也誓者以言戒勵之也誓師于甘故以甘誓名篇大戰于甘乃召六卿交兵曰戰六卿六鄉之卿也召之者將誓也周官每鄉卿一人六鄉六卿平居無事則各掌其鄉之政教禁令而屬之大司徒有事出征則各率其鄉之一軍而屬之大司馬所謂軍將皆卿是也意夏制亦或相似古者四方有變專責之方伯方伯不能討然後天子親征天子之兵有征無戰今啓親率六軍造其城下有扈之敢抗天子交兵大戰若𫝑均體敵然視堯舜禹三聖相承之時氣象有間矣王曰嗟六事之人豫誓告汝王夏王啓也嗟發語閔嘆之辭六事即六卿人則六卿所統之衆有扈氏威侮五行怠棄三正天用𠞰絶其命今豫惟恭行天之罰有扈夏同姓之國在漢鄠縣史記曰啓立有扈不服遂滅之威謂暴害侮謂輕忽五行水火金木土也民用所資不可一日無威侮之則其用乖違民有不遂其生者矣怠謂不䖍棄謂不用三正子丑寅之正也帝王受命三正迭用蓋自唐虞之前已然夏以建寅之月為正則當時諸侯當禀正朔有扈氏不臣服故怠弃夏之正朔也𠞰絶也𠞰絶謂滅之虐下背上獲罪于天故天用𠞰絶其命今惟恭承天意以行罰恭敬奉也天子用兵稱恭行天罰諸侯伐有罪稱肅將王誅皆謂有禀承也左不攻于左汝不恭命右不攻于右汝不恭命御非其馬之正汝不恭命左車左右車右攻治也古者車戰之法一車甲士三人左掌射右掌擊刺御者居中掌進退驅馳命謂受上命各有所掌春秋左氏傳宣公十二年楚許伯御樂伯攝叔為右致晉師樂伯曰致師者左射以菆是車左主射也攝叔曰致師者右入壘折馘執俘而還是車右主擊刺也御非其馬之正猶王良所謂詭遇也左右不治其事與御非其正皆能致敗故戒勵之俾各盡其職也用命賞于祖不用命戮于社用命謂恭命不用命謂不恭命戮殺也天子親征必載遷廟之主及社主以行示賞罰之不敢專也祖左陽也故賞于祖社右隂也故戮于社社下疑有脫簡豫則孥戮汝此句與上文辭意不屬或有脫簡或是下篇湯誓之文重出在此書纂言卷二
