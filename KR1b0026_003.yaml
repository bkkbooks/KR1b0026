body:
  text: 書纂言卷三元吳澄撰商書契始封商湯因以為有天下之號鄭𤣥云商在太華之陽皇甫謐云上洛商是也春秋左氏傳云閼伯居商丘杜預注云梁國睢陽宋都也湯誓湯號也湯名履姓子氏都于亳鄭元云亳在河南偃師縣漢書音義臣瓉云濟隂亳縣夏桀暴虐湯往征之亳衆憚於征役故湯諭以弔伐之意蓋師征之時誓于亳都者也孔疏曰甘誓牧誓首皆言其誓意記其誓處此與費誓惟記誓辭不言誓處者史辭有詳略也王曰格爾衆庶悉聽朕言非台小子敢行稱亂有夏多罪天命殛之王追稱也格至台我稱舉殛誅也以人事言之則臣伐君疑於亂矣以天命言之則所謂天吏非稱亂也今爾有衆汝曰我后不恤我衆舍我穡事而割正夏豫惟聞汝衆言夏氏有罪豫畏上帝不敢不正我后湯民指湯也恤憂念也穡耕穫之通稱割斷也亳邑之民憚伐桀之勞謂湯不恤我衆舍我耕穫之事而斷正有夏湯言聞衆之言如此然夏氏有暴虐之罪天命我殛之我畏上帝不敢不往正其罪也今汝其曰夏罪其如台夏王率遏衆力率割夏邑有衆率怠弗協曰時日曷喪豫及汝皆亡夏德若兹今朕必往其曰其者將然之辭如台猶曰如何也率盡遏絶也割如劓割夏邑之割怠謂解體弗協謂離心時是也日指桀曷何也喪亦亡也湯既言夏氏有罪然亳衆安於湯德政桀之虐焰所不及故不知夏氏之罪其心曰夏氏之罪其如何哉故湯言夏王率為重役以窮民力嚴刑以殘民生夏之有衆率皆解體離心疾視其君指日而曰是日何時而亡乎若亡吾寧與之俱亡蓋苦桀之虐而欲其亡之甚也桀之惡德如此今我必往征之桀嘗自言吾有天下如天之有日日亡吾乃亡耳故民因以日目之爾尚輔豫一人致天之罰豫其大賚汝爾無不信朕不食言爾不從誓言豫則孥戮汝罔有攸赦致推而至於彼也賚與也謂勝夏之後有賞賜也食言如日食之食自有而無謂言已出口又收入而吞食之不行其言也不從誓言謂不肯往伐夏也孥奴通孥戮謂囚繫為奴而戮辱之也盤庚湯都亳第二世次子外丙立三世弟仲壬立四世湯長子太丁之子太甲立五世子沃丁嗣六世弟太庚立七世子小甲嗣八世弟雍已立九世弟太戊立十世子仲丁嗣遷囂十一世弟外壬立十二世弟河亶甲立遷相十三世子祖乙嗣遷耿案書序但言圯于耿史記言乂遷邢依書序則盤庚是自耿遷亳依史記則是自邢遷亳或謂今邢州不近河圯如耿之有患若果在邢似可以不遷况邢耿字體易相混亂恐疑邢字即耿字傳寫之誤故史記以為再遷邢也但若無遷邢一遷則五邦之數少其一此又不可追考且當闕之十四世子祖辛嗣十五世弟沃甲立十六世祖辛之子祖丁立十七世沃甲之子南庚立十八世祖丁之子陽甲立十九世弟盤庚立復都于亳舊注以為自耿而遷也大家世族安土重遷唱為浮言以惑衆小民雖蕩析離居亦惑於浮言盤庚喻以遷都之利不遷之害書凡四節第一節述民怨之辭第二節未遷時告羣臣之辭第三節在途告庶民之辭第四節既遷至亳總告臣民之辭盤庚遷于殷民不適有居率籲衆戚出矢言曰我王來既爰宅于兹重我民無盡劉不能胥匡以生卜稽曰其如台殷亳都也在河南偃師適往籲呼矢誓也我王指祖乙兹指當時所都而言也劉殺稽與叶通問卜也盤庚欲遷於殷民不肯往適有居率呼衆憂之人出誓言而曰我王祖乙來都於此固重我民之生非欲盡致之死地也今不幸蕩析離居不能相救以生則當卜以稽之曰其如之何也豈可不信卜而輕遷之也哉意者盤庚之遷卜之不吉而盤庚必於遷故民之不肯遷者以此為言先王有服恪謹天命兹猶不常寧不常厥邑于今五邦今不承于古罔知天之斷命矧曰其克從先王之烈若顚木之有由蘖天其永我命于兹新邑紹復先王之大業砥綏四方先王成湯以來之王服事也兹指先王所都亳而言也顚仆也由古文作甹木生條也蘖萌芽也盤庚之遷以今所都有水患故欲舍舊從新復成湯所都之邑庶望可再興盛如先王之時故民從而譏之曰我先王有所事能謹敬天命其處亳邑猶不能常常安寧所以不常其居自亳而遷至今已厯五邦若亳果可常安則先王居之至今矣今於他事皆不承順於古先王之為不知天將斷絶汝命況可自謂吾往都亳邑則能從先王之功烈如已仆之木再生枝條萌芽天將長永我命于此新遷之邑而繼紹復還先王之大業以致于撫安天下之民乎此第一章周氏曰殷人稱殷自盤庚始以前惟稱商盤庚遷都後殷商兼稱或只稱殷盤庚斆于民由乃在位以常舊服正法度曰無或敢伏小人之攸針斆教由自針規也小民蕩析離居而巨室安土重遷以浮言相眩惑盤庚知其然故其教民必自在位始以先王舊常遷都之事正其法度小民有欲以言針其上者毋得遏絶而使不上達王命衆悉至于庭王若曰格汝衆豫告汝訓汝猷黜乃心無傲從康衆者臣民咸在也若曰史述其大意若此猷語辭毋與無同傲上命而從已之安故不肯遷二者所當黜之私心也雖臣民咸在此言實為羣臣而發古我先王亦惟圖任舊人共政王播告之修不匿厥指王用丕欽罔有逸言民用丕變修猶易言修辭論語言為命也古先王任舊人共政凡有播告其臣皆承宣而不隱匿其指用能大敬乎王者如此盤庚將責其臣故先舉先王之臣而勸之也今汝聒聒起信險膚豫弗知乃所訟非豫自荒兹德惟汝含德不惕豫一人豫若觀火豫亦拙謀作乃逸聒聒多言亂德也險利口相傾覆膚巧言切中肌膚訟爭辨今汝亦是舊人胡不能如先王之臣乃聒聒然以險膚之言起人之信豫弗知汝所訟言者何故反求內省非我自荒廢其德召汝怨謗乃是汝含容我之德恃我之寬厚而不畏懼我一人故敢浮言以惑衆我不遏絶於始萌之時遂至舉國怨咨無所忌憚如火之方燎不撲之乃坐觀其熾盛是我之拙謀起汝過也若網在綱有條而不紊若農服田力穡乃亦有秋汝克黜乃心施實德于民至于婚友丕乃敢大言汝有積德乃不畏戎毒于逺邇綱網大繩紊絲亂也力勤也秋收成之時有秋有收成也戎大毒害之甚者君如網之綱臣如網之目舉網在提其綱則衆目自有條而不亂喻臣當從君之令不可傲上也農夫服事田畝勤力耕種則必有收成喻今不憚往遷之勞終必安居之利不可從康也汝之不肯遷者以有傲上從康之心也汝能黜去此心承命往遷則小民之家與汝婚姻僚友之家皆有便益是汝施實德於彼也汝之祖父嘗有德於民矣今汝又施德於民是世有積德也乃敢大言於人而無愧既遷去則不復畏水災為大言於逺邇矣惰農自安不昏作勞不服田畝越其罔有黍稷汝不和吉言于百姓惟汝自生毒乃敗禍姦宄以自災于厥身乃既先惡于民乃奉其恫汝悔身何及昏勉也恫痛也惰農自安不勤勉於耕作之勞則必無黍稷之收成汝不以溫和吉善之言言於百姓使之樂遷將後遭水患則是汝自生此害為致敗致禍之姦宄以自災汝之身也夫怨咨不遷民之惡也實由汝倡浮言惑之是汝先其惡也病痛人之所去而今乃奉之是護其疾利其災及有災之時汝雖悔之而身已無及矣此戒其從康也相時憸民猶胥顧于針言其發有逸口矧豫制乃短長之命汝曷弗告朕而胥動以浮言恐沈于衆若火之燎于原不可嚮邇其猶可撲滅則惟汝衆自作弗靖非豫有咎視此小人平日猶且相顧人所針規之言慮已之發言或有過差於口況我為天子生殺在手實制汝短長之命汝苟以遷都為不利何不直以告我而乃倡浮言以恐嚇沈溺于臣民如火燎于原𫝑焰薰灼不可嚮而近之其尚可撲而滅之乎汝之浮言是汝自作不安靖非豫有召怨致謗之咎此戒其傲上也遲任有言曰人惟求舊器非求舊惟新遲任古賢人言人舊則習器舊則敝當用舊人使新器我今與汝舊臣世家同遷新邑也古我先王暨乃祖乃父胥及逸勤豫敢動用非罰我先王與汝祖父同其勞逸汝為功臣之子孫我其敢用非所當罰之罰於汝乎世選爾勞豫不掩爾善兹豫大享于先王爾祖其從與享之作福作災豫亦不敢動用非德大享祫祭爾祖父有功勞於國其子孫當世世選用爾苟有善豫不敢掩蔽而不用汝然爾祖配食於我先王之廟能昭鑒其子孫善惡而為福為禍無所私者是以我亦不敢用非所當德之賞於汝也豫告汝于難若射之有志汝無侮老成人無弱孤有幼各長于厥居勉出乃力聽豫一人之作猷無有逺邇志所射表的也侮玩慢之也弱輕蔑之也無父曰孤十年曰幼有又通言孤與幼作起而遷也猷字或在句首或在句中或在句末皆語辭也我告汝今日遷都之艱難當如射之有表的期於必中必至汝當與老者幼者各謀久長於其所居勉出汝力聽從我起而遷去不問逺邇皆當同遷也用罪伐厥死用德彰厥善邦之臧惟汝衆邦之不臧惟豫一人有佚罰凡爾衆其惟致告今日不遷他日必死用罪罪之所以救其死故曰伐厥死其從令者用德德之所以彰其善也邦之善歟是為汝衆之善邦之不善歟是爾衆有不善而豫一人佚於行罰凡在爾衆當致告於我正為告羣臣而此言汝衆爾衆兼民而言也自今至于後日各恭爾事齊乃位度乃口罰及爾身弗可悔汝自今以往有事者各恭敬有位者各齊同言一心協力也出口之言當有節度勿復以浮言胥動如其不然則罰及汝身不可得而悔也此第二章盤庚作惟涉河以民遷乃話民之弗率誕告用亶其有衆咸造勿褻在王庭盤庚乃登進厥民曰明聽朕言無荒失朕命以猶與也謂能左右之也話說喻之也弗率不循上命誕大亶誠有衆兼臣民而言王庭謂道路次舍之所如周官掌次所職盤庚既起涉河南其民以遷乃說喻其不從令者大告之以誠心其民皆至戒其勿得褻慢凡在王庭聽號令王臣君前庶民居後盤庚已告其臣矣今將告其民故升進其民於前令其明聽我言遵守而行不得廢失我所命也自君言之謂之言自臣言之謂之命嗚呼古我前后罔不惟民之承保后胥戚鮮以不浮于天時殷降大虐先王不懷厥攸作視民利用遷汝曷弗念我古后之聞承汝俾汝惟喜康共非汝有咎比于罰承奉順也保愛護也浮如名浮于實實浮于名之浮過也猶言勝之也降黜去之意大虐謂水災虐害人也我先王無不惟民是承故民亦保愛其君共憂其憂雖有天時之災鮮不以人力勝之也殷家能逺去水災之大害以先王不懷其居之故其所以起而遷者視民所利而用遷也汝民何不思念所聞我先后之事我之奉承汝者蓋欲使汝共享喜樂安康之利非惟汝有罪比附于罰而謫遷汝也豫若籲懷兹新邑亦惟汝故以丕從厥志今豫將試以汝遷安定厥邦民志本欲安其居所以不肯遷者以苟目前之暫安而不圖他日之久安我所以招呼汝遷懷念此新邑者亦惟汝之故將以大從爾民欲安之志不遷則舉國無安定之時以汝遷者所以安定一國也汝不憂朕心之攸困乃咸大不宣乃心欽念以忱動豫一人爾惟自鞠自苦若乘舟汝弗濟臭厥載爾忱不屬惟胥以沈不其或稽自怒曷瘳汝不謀長以思乃災汝誕勸憂今其有今罔後汝何生在上爾民不得安居此我心之憂而至于困者我憂爾民之憂而汝不憂我心之憂乃皆大不宣布其心欽敬思念以誠心感動我爾惟苟安坐待水患之至是自取窮苦譬之乘舟者然汝若遲滯不濟則必臭敗其所載之物濟水之誠心間斷不屬則不復能濟惟相與以及沈溺而已利害若此汝不考察但自怨咨忿怒何能瘳其病乎言無益也汝不為長久之謀以思將至之災是汝大有可憂而自勸其憂也孟子曰安其危利其災樂其所以亡勸憂之謂有今言有今日也罔後言無後日也上天也今日偷生後日必死何能有生命于天乎下文迓續乃命于天蓋相首尾之辭今豫命汝一無起穢以自臭恐人倚乃身迂乃心豫迓續乃命于天豫豈汝威用奉畜汝衆爾既從我涉河矣或尚有二心而遲滯于行今豫命汝專一其心無再起穢惡間其從上之善心以自致臭敗其舟中之載恐人之浮言誑惑偏倚汝之身迂曲汝之心使汝身心顛倒利害昏迷不知不遷則將有沈溺之禍故我今因水患未至之時而遷是迎迓接續汝命于天而使汝更生也豫豈是用威𫝑驅迫汝以遷乎蓋用以奉承畜養汝衆欲汝得全其生矣豫念我先神后之勞爾先豫丕克羞爾用懷爾然先神后先王也羞養也即上文奉畜之意言我思念我先王嘗勞爾之先人我大克羞養爾者用撫安爾故如此失于政陳于兹髙后丕乃崇降罪疾曰曷虐朕民陳久崇大髙后湯也知有水患而不遷政之失也失政而久留于此湯必大降罪疾于我曰何為虐害我民蓋君不能為民圖安俾遭沈溺之患是虐害之也汝萬民乃不生生暨豫一人猷同心先后丕降與汝罪疾曰曷不暨朕幼孫有比故有爽德自上其罰汝汝罔能迪去死地就生地生其生也先后泛言商先王幼孫盤庚自稱比順從也故如刑故之故爽差也言汝民不能求生其生而與我同心以遷我先后大降罪戾於汝曰汝何不與我幼孫順比而故有此失德也先后自上罰汝汝無能迪迪謂開導解說以求免也古我先后既勞乃祖乃父汝共作我畜民汝有戕則在乃心我先后綏乃祖乃父乃祖乃父乃斷棄汝不救乃死既勞乃祖乃父者申言勞爾先也汝共作我畜民者汝皆為我所畜之民也戕害也汝不肯遷非止災及汝身凡我所畜之民皆受其禍是汝實戕害之也則或云當作賊貝右畔戎字也綏撫諭之意汝有戕賊民生之惡在心先后知之以此諭汝祖父汝祖父亦棄絶汝而不救汝之死也兹豫有亂政同位具乃貝玉乃祖乃父丕乃告我髙后曰作丕刑于朕孫迪髙后丕乃崇降弗祥亂治也具者多取而兼之謂貝海介蟲古者以貝為貨以玉為寶此言貝玉貨寶互相備也世臣巨家聚畜貨寶恐因遷散失耗費故搖動百姓使不肯遷迪開導也盤庚言若治政之臣所以共天位者不以民生為念而惟務冨巳之貝玉者其祖父亦告我髙后令作大刑于其子孫開導我髙后崇降之以不祥也丕刑以人事言不祥以神事言皆謂禍也以上四節言君有罪民有罪臣有罪我先后與爾民臣祖父皆降之禍商俗尚鬼因其所畏所信以曉之先儒皆以此一節為責臣然詳其文𫝑則亦對民庶而責其臣之辭蓋此時臣民皆在盤庚登進其民於前則所告皆與民言不應此一節獨為與臣言也嗚呼今豫告汝不易永敬大恤無胥絶逺汝分猷念以相從各設中于乃心告汝不易猶上文告汝于難之意水患大可憂汝當久敬畏與我同心不可相疏逺隔絶也民之所以與君相逺絶者由其偏為已計而不分其念以為國計也故使之分其念以相從而各設中于其心也中則其心公平不偏于為巳計矣乃有不吉不迪顛越不恭暫遇姦宄我乃劓殄滅之無遺育無俾易種于兹新邑不善不道之人顛倒踰越不恭順上令者及暫時所遇為姦為宄劫掠行道者輕則劓之重則殄滅之無有遺留其生育無俾遺其種類于此新邑也遷徙道路恐有姦人乘隙生變故嚴以戒敕之往哉生生今豫將試以汝遷永建乃家往哉生生往新邑以生汝之生也永建乃家為爾子孫立無窮之業也此第三章盤庚既遷奠厥攸居乃正厥位綏爰有衆既遷至亳邑也定其上下所居謂君有寢廟臣有邑宅民有廛里也位朝見羣下之位正其朝位以見臣民而慰勞撫諭之也曰無戲怠懋建大命曰盤庚之言也無戲欲其敬事無怠欲其勤事大命兼民命國命而言建命猶孟子言立命蓋命雖在天立之在我使民有以遂其生國有以永其祚也當時傲上從康習于戲怠未遷則以為憚既遷則以為足謂今日自可永命不復為自勉自力之計故以戒之今豫其敷心腹腎腸厯告爾百姓于朕志罔罪爾衆爾無共怒協比讒言豫一人自此至兹賁告民也敷心腹腎腸謂無一不布露也厯盡也百姓民庶也協合比連也臣民雖既遷盤庚猶慮其強從上令非出本心怨怒未忘故明白洞達以釋其疑而曰爾無共懷前日之怒而合比讒言以謗議我也古我先王將多于前功適于山用降我凶德嘉績于朕邦古我先王湯也多猶增廣也山謂亳邑商都囂相耿等處皆近水惟亳近山鄭氏曰東成臯南轘轅西降谷是也契始居亳其後纍遷莫能安定湯欲增廣前人之功于是復居于亳凶德謂民受水害適亳邑依山以居自此民獲其吉所以降黜其凶德而又成美功于我邦謂湯由亳而興以有天下也今我民用蕩析離居罔有定極爾謂朕曷震動萬民以遷肆上帝將復我髙祖之德亂越我家朕及篤敬恭承民命用永地于新邑肆豫沖人非廢厥謀弔由靈各非敢違卜用宏兹賁蕩漂析分極止震亦動也沖童弔至由用靈善宏大賁飾也舊都墊圯民漂蕩分析離其所居無有定止而爾民猶且安土重遷乃謂我何為震動萬民以遷乎此乃天將俾我興復成湯之德以治我家故我及一二臣之能篤敬以恭承民命者用圖永安居于此新邑也我非廢爾衆謀其至乃用爾謀之善指當時民臣有言當遷者也我與善謀之人各非敢違卜蓋用以宏大此賁飾之事是以不得不遷也賁者猶曰增光于前人也蓋盤庚之遷鬼謀不吉而人謀已决故違卜而遷也嗚呼邦伯師長百執事之人尚皆隱哉豫其懋簡相爾念敬我衆自此至篇終告臣也邦伯邦之長諸侯也師長衆官之長公卿也百執事百官也隱閔痛也簡閲相視也新遷之民生理未復諸臣當惻然憫痛愛護封殖之豫其勉閲視爾爾當思所以敬我衆衆兼臣民而言朕不肩好貨敢恭生生鞠人謀人之保居敘欽肩任也鞠人困窮之人不能自謀者也謀人能自謀之人不困窮者也我不任貪人有能敢于恭承民之生生俾貧冨之各保其居皆敘而敬之者我則任之也曰恭曰欽所謂敬我衆也今我既羞告爾于朕志若否罔有弗欽無總于貨寶生生自庸式敷民德永肩一心若者如我之志恭生生是也否者不如我之志好貨是也總聚也庸用也今既示汝以朕志之向背爾當無所不用其敬毋聚寶貨而以民之生生為已責式用敷布其德于民永久守此一心而不變也始終不二之謂一此第四章髙宗肜日髙宗武丁廟名史記曰武丁崩祖庚立尊其廟為髙宗是也湯十九世盤庚其二十世弟小辛立二十一世弟小乙立二十二世子武丁嗣二十三世子祖庚嗣髙宗肜日越有雊雉肜日祭明日又祭之名殷曰肜周曰繹雊鳴也祖庚于髙宗肜祭之明日有雊雉之異蓋祖庚當時致隆于禰廟故天降災異以警之也祖己曰惟先格王正厥事格正也祖己將告王故先言古先格王或遇災異惟反身自省正其所行之事而已若今王之祀豐于昵事之當正者也乃訓于王曰惟天監下民典厥義降年有永有不永非天夭民民中絶命監視也下民猶曰下人典猶主也義者天理之冝言天監視下人其禍福豫奪惟主于義爾降年有永有不永者義則永不義則不永其不永者非天夭折其民民自以非義而中絶其命也商人尚鬼其瀆祀也必有祈年請命之意如漢武帝五畤之類祖己言永年之道在于所行之義不在于禱祠也泛言人而不言君不敢斥也民有不若德不聽罪天既孚命正厥德乃曰其如台不若德不順于德不聽罪不服其罪謂不改過也孚命者以妖孽為符信而譴告之也言人不順德不服罪天既以妖孽為符信而譴告之欲其恐懼修省以正其德人乃曰孽祥其如何則是不畏天戒也意欲祖庚因雊雉以自省而改黷禰廟之失也嗚呼王司敬民罔非天𦙍典祀無豐于昵嗚呼嘆辭司主也敬民即上文所謂義也猶夫子告樊遲以務民之義胤嗣也昵親也近也謂禰廟也王之所司當敬以盡人事而已徼福鬼神非王之事也況祖宗莫非天之嗣主祀者其可獨豐于昵廟乎西伯戡黎史記文王脫羑里之囚獻洛西之地紂賜弓矢鈇鉞專征伐為西伯戡勝也黎國名舊說以為在上黨壺關之地今潞州有黎城縣吕氏曰西伯武王也史記紂使膠鬲觀周師問曰西伯曷為而來則武王亦繼文王為西伯矣澄謂黎畿內之國文王三分天下有其二以服事殷決不稱兵於紂之畿內武王嗣為西伯其事殷猶文王也其伐殷在於嗣位十有二年之後蓋天命未絶則為君臣一日命絶乃行天罰此事間不容髮今既兵逼王畿祖伊而奔告則振撼甚矣豈得戡黎之後班師而去復就臣位而紂恬不以為意也竊疑戡黎之師當是伐紂之時然黎國若潞州之黎城則山路險僻不當周師經行之道紂都朝歌在今衛州而衛州有黎陽去朝歌甚邇或指當時近畿有小國周師自孟津渡河故先戡黎而遂乘勝以進紂都也西伯既戡黎祖伊恐奔告于王祖伊殷賢臣也篇中無及戡黎之事作書者特標此于篇首以見祖伊告王之因也奔告自邑來奔告紂也曰天子天既訖我殷命格人元龜罔敢知吉非先王不相我後人惟王淫戲用自絶故天棄我不有康食不虞天性不迪率典訖絶也格人猶言至人也康安虞度率循典常法也祖伊特呼天子而言天既絶我殷命格人元龜皆能先知吉凶今無敢知其吉者甚言凶禍之必至非先王在天之靈不佑我後人我後人淫戲用自絶于天故天從而棄絶之使我不有其安享之食謂沈酗暴殄也不知其本然之性謂昏亂厥德也不行其當循之典謂廢壞常法也三者皆紂所自為若天奪其間而使之為之然故曰天棄我今我民罔弗欲喪曰天曷不降威大命不摰今王其如台大命非常之命民苦紂虐無不欲殷之亡曰天何不降威于殷而受大命冝王者何不至乎今王其何如哉上言天棄殷此言民棄殷祖伊之言可謂痛切著明矣王曰嗚呼我生不有命在天紂嘆而言謂民雖欲亡我我之生獨不有命在天乎祖伊反曰嗚呼乃罪多參在上乃能責命于天反還其私邑也乃指紂也既無改過之意祖伊退而言曰爾罪衆多參列在上乃能責其命于天邪吕氏曰責命于天惟與天同德者方可前與紂言故稱王此以下祖伊退而私言之故稱乃殷之即喪指乃功不無戮于爾邦功事也言殷即喪亡也指當時與紂共事之人皆無不同受戮于爾之邦者時周師已逼商亡在旦暮間祖伊危迫之情可見史記載紂使膠鬲觀周師其在祖伊既告之後乎蘇氏曰祖伊之諫直言不諱漢唐中主所不能容紂雖不改而不怒祖伊得全則後世人主有不如紂者多矣愚案此乃殷邦殞滅命在須㬰之時蓋已無暇於怒忠諫而殺忠臣也湯二十四世祖庚弟祖甲立二十五世子廩辛嗣二十六世弟庚丁立二十七世子武乙嗣去亳遷河北二十八世子太丁嗣二十九世子帝乙嗣三十世子受辛嗣而商亡受紂字通用微子微國名子爵也微子名啓帝乙長子紂之庶兄也此篇次序疑在戡黎之前然商書五篇前四篇乃君告其下臣告其上之辭此篇乃臣下自相告之辭故居後云微子若曰父師少師殷其弗或亂正四方我祖砥遂陳于上我用沈酗于酒用亂敗厥德于下父師太師三公箕子也少師孤卿比干也其與或者皆非必然之辭亂治也殷之亡形決矣猶曰其弗或復能治正四方乎猶冀其悔悟不敢必其果不能也我祖湯砥致沈于水不復能出也飲酒成凶曰酗亂敗為酒所亂而壞其德也上謂在前下謂在後也我祖成湯致遂陳列其功在上而子孫沈酗于酒亂敗厥德于下我指紂也不斥紂而言我厚之道也殷罔不小大好草竊姦宄卿士師師非度凡有辜罪乃罔恆獲小民方興相為敵讎今殷其淪喪若涉大水其無津涯殷遂喪越至于今草亂雜意竊盜取也卿士卿也淪沒也津渡處涯水際殷民染紂之惡無小無大皆好草竊姦宄在上者以法禁治之庶其可止今卿士為民師表凡有辜罪之人反容縱之無常法捕獲者是以小民無所畏懼強凌弱衆暴寡方起而爭奪相與為鬭敵之讎匹天下蕩無綱紀殷其淪沒喪亡矣若涉大水茫無畔岸無望其可濟惟有沒于水而亡爾曰父師少師我其發出狂吾家耄遜于荒今爾無指告豫顛隮若之何其曰更端之辭我微子自我也遜逃遁荒野外顚傾覆隮隕墜何其語辭微子言我其發而出外歟則若病狂之人行不知所之留而在家歟則若昏耄之人居不知所為愁悶憂困無所措其身思欲逃遁于荒野不忍此身親見宗國之亡也今爾無所指示以告我國將顚覆隮墜若之何者蓋微子之情危迫之甚故又更端以問救亡之䇿父師若曰王子天毒降災荒殷邦方興沈酗于酒此以下箕子之答也毒甚害之意荒謂迷亂紂之無道乃天甚其害而降之以災使之荒迷于國方且起而沈酗于酒以紂無道歸之天與詩言旻天疾威敷于下土意同此答微子所言酗酒敗德之語乃罔畏畏咈其耇長舊有位人乃罔畏畏者不畏其所當畏也孔子曰君子有三畏畏天命畏大人畏聖人之言咈逆也耇長老成之人紂惟不畏其所當畏故老成舊有位者皆咈逆而棄逐之則在位者新進年少不更事之人爾此答微子所言卿士非度之語今殷民乃攘竊神祇之犧牷牲用以容將食無災毛純曰犧體完曰牷牛羊豕曰牲犧牷牲祀天祭地享宗廟之物商民猶且攘竊有司用相容隱俾將去食之而無災禍此答微子草竊罔獲之語降監殷民用乂讎斂召敵讎不怠降下也監臨視也乂治也斂掊聚也召招至也乂讎猶曰嘉耦怨耦云爾言下臨視者殷民使殷民平日安和之讎匹皆化而為鬬敵之讎匹猶掊斂招召之然日長無已故曰不怠此答微子相為敵讎之語罪合于一多瘠罔詔詔告也夫民之盜竊有司反容之民之鬬敵有司實召之則盜竊鬭敵非專民之罪治民者亦有罪與之相合而為一上下同惡不恤其民民多餓莩捐瘠無所告也此總前兩節意商今其有災我興受其敗商其淪喪我罔為臣僕箕子言我皆自我也臣僕謂國亡俘虜而為人臣僕也言商今其有災我適起而當禍敗人臣之義無可逃避商其淪喪我惟有死之而已不復為他人之臣僕也此箕子為自已謀亦答微子淪喪之語詔王子出迪我舊云刻子王子弗出我乃顚隮出謂去之以避國亡之禍也蓋商祀不可以無人主之微子之身存則商祀不絶刻害也箕子舊以微子長且賢勸帝乙立之帝乙不從卒立紂紂必忌之是我前日所云適以害子微子若不出而國滅身死則我之宗祀遂隕墜而無所托矣夫委質為臣身非我之身國家之身也國家之宗祀泯絶猶我之顚隮也故亦言我箕子紂叔父同出于先王者也此箕子為微子謀亦答微子顚隮之語自靖人自獻于先王我不顧行遁靖安也微子之義不可不去箕子之義不可去各有所當故箕子言自安所安人各有以自獻陳于先王之前我之義則不復却顧而行出逃遁矣此亦總前兩節意論語曰微子去之箕子為奴比干諌而死孔子曰殷有三仁焉蓋微子問箕子箕子答微子之後微子然箕子之言去之以避禍及至商亡之後微子歸周武王封之于宋以奉殷祀微子既去箕子竭誠匡正其國猶冀其不亡紂惡而囚之箕子佯狂而為奴武王克商釋其囚訪洪範箕子不仕周而處于遼東以終其身箕子既囚比干竭誠諫諍其君猶冀其能改紂怒而殺之武王克商封其墓三人者各得其本心之安天理之正故曰殷有三仁案樂記云武王既下車封舜之後于陳封夏之後于杞封殷之後于宋荀子成相篇云武王怒師牧野紂卒易鄉啓乃下武王善之封之于宋立其祖蓋武王既克商即封微子于宋舊說謂封紂子武庚紹殷後武庚叛而誅死微子始得封者非也書纂言卷三
