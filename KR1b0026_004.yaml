body:
  text: 書纂言卷四上元吳澄撰周書周自后稷封邰其後公劉居邠大王始遷于岐山之下曰周武王因以為有天下之號牧誓牧地名在紂都朝歌之南近郊三十里文王為西方諸侯伯三分天下有其二以服事殷武王嗣為西伯亦如之及十有三年紂惡已極遂率西方諸侯伐紂師自孟津渡河諸侯不期而㑹者八百國師進至牧野誓于將戰之時時甲子昧爽王朝至于商郊牧野乃誓王左杖黃鉞右秉白旄以麾曰逖矣西土之人甲子二月四日也昧冥爽眀也昧爽將眀未眀之時也鉞大斧也以黃金飾之杖鉞示誅有罪左手杖之示不必用旄犛牛尾使指麾三軍進退右手秉之以麾則有力逖逺也言自西土至紂都道里遙逺行力勞苦撫慰之之辭也王曰嗟我友邦冢君御事司徒司馬司空亞旅師氏千夫長百夫長及庸蜀羌髳微盧彭濮人稱爾戈比爾干立爾矛豫其誓友邦親之也冢君尊之也御事治事之臣也司徒司馬司空三卿也大國三卿下大夫五人士二十七人亞次也卿之二大夫是也旅衆也卿之屬士是也師氏以兵守門者千夫長千人之帥百夫長百人之帥庸濮在江漢之南蜀西蜀羌西羌髳微在巴蜀盧彭在西北當時諸侯不期而會者八百國友邦冢君諸夏大國也此八國逺方小國也稱舉戈㦸干楯矛㦸之屬長二丈戈短人執以舉之故言稱楯則相並捍敵故言比矛長立之于地故言立王曰古人有言曰牝雞無晨牝雞之晨惟家之索今商王受惟婦言是用昏棄厥肆祀弗答昏棄厥遺王父母弟不迪乃惟四方之多罪逋逃是崇是長是信是使是以為大夫卿士俾暴虐于百姓以姦宄于商邑今豫發惟恭行天之罰晨雞鳴戒曉也索盡也牝雞而晨反常之妖其家必敗婦妲已也婦言是用猶牝雞司晨也國必亡矣昏昧也蓋紂為妲已所蔽惑故凡皆昏昧也肆祭名未詳其義周官以肆獻祼享先王鄭讀為他厯反或曰肆陳也陳設以祀也答猶報也不答廢宗廟之禮不知報本也遺先王之遺𦙍也王父母弟王之諸父諸母諸弟也迪猶道也不迪絶族親之義待之不以道也逋亡也卿士卿也四方多罪之人逃亡而歸紂者乃尊寵而任用之以之居顯位俾毒民為惡也此言紂反人道之常天罰所宜加也今日之事不愆于六步七步乃止齊焉夫子勗哉愆過也步進趨也齊猶整也勗勉也今日之戰不過六步七步乃止而整齊其行列此告之以坐作進退之法以戒其輕進也吳氏曰乃止句絶齊焉者陳法也不愆于四伐五伐六伐七伐乃止齊焉勗哉夫子伐擊刺也少不下四五多不過六七而止又整齊其行列此告之以攻殺擊刺之法以戒其貪殺也上言夫子勗哉此言勗哉夫子反覆成文以致丁寧之意尚桓桓如虎如貔如熊如羆于商郊弗迓克奔以役西土勗哉夫子桓桓威武貌貔執夷也虎屬欲將士如四獸之猛而奮擊于商郊也迓迎也奔謂來降也以役西土與周官以役太師左傳以役諸侯意同紂之衆弗來迎戰而能來降者則受之而俾役使于我西土之人蓋勉其武勇又令其受降也爾所弗勗其于爾躬有戮弗勗謂不勉于前三者洪範洪大也範謂鑄金之模匣禹治水之時洛出神龜龜背有文自一至九禹則之第列三才之道分為九類以配九數其綱九其目五十凡天下之道悉包括而無外故曰洪範惟十有三祀王訪于箕子十有三祀武王克商之年商謂年為祀訪就而問之也箕國名子爵紂諸父也紂囚之為奴武王克商而釋其囚以其素傳洪範之學故下車之初就問之也此篇以箕子所陳録而為書稱祀不稱年見箕子不臣周之意王乃言曰嗚呼箕子惟天陰隲下民相協厥居我不知其彞倫攸敘乃難辭嗚呼歎辭歎而後言重其事也陰默隲定相助也協和也相協厥居謂厚其生利其用正其德也彞倫常道之次序指洪範九疇而言也叙謂各有條理也凡九疇之序皆天所以默定下民而相協其居者也箕子乃言曰我聞在昔鯀陻洪水汨陳其五行帝乃震怒不卑洪範九疇彞倫攸斁鯀則殛死禹乃嗣興天乃錫禹洪範九疇彞倫攸叙陻塞汨亂鯀不順水之性導之就下但為隄防障塞之水失其道泛濫逆流故陰勝火木不能敷榮金不得孕育土不可墾闢五行皆汨亂陳列矣帝即天也以主宰言曰帝震怒謂鯀逆天理得罪於天也卑與也疇如田之界域斁敗也殛死謂放之羽山而死嗣興謂繼鯀而登用錫賜也禹錫洪範九疇謂洛出書也洛書不出於鯀治水之時而出於禹治水之時是天不以卑鯀而以錫禹也洛書不出洪範不作人不得見此常道之次序所謂斁也洛書出洪範作人皆得見此常道之次序所謂叙也然洛之出書不過龜背有一二三四五六七八九之文而已五行至六極皆禹所分配則洪範之書禹所自作也今曰天錫禹何也蓋禹心得此道前此未嘗為書因龜文有九感觸其心遂作洪範九疇雖禹之自為然實因龜文發之若天啓其衷云爾故以為天所錫也此第一章洪範之總序也初一數之初為一一洛書文之在後者曰五行曰五行禹所分配也下八疇倣此五行五氣之運行也不言用者無所待於人而自然也造化萬類無不本於五行故以五行配數之一次二一之次為二二洛書文之在右前者曰敬用五事敬者此心常存而為一身之主凡言用者有所待於人而後然也蓋主於君人者而言人稟五行之氣而成形故以五事配數之二次三二之次為三三洛書文之在左者曰農用八政農厚也所以厚於人也先身而後及於人故以八政配數之三次四三之次為四四洛書文之在左前者曰協用五紀協謂與天合紀如絲之紀先人而後及於天故以五紀配數之四次五四之次為五五洛書文之在中者曰建用皇極建立也皇君也極屋棟之名髙上之至無能過之也尊為天子德為聖人人倫之至四方瞻仰而取則焉是之謂皇極五行順五事敬八政厚五紀協斯可以建極矣皇極居天下之中洛書之五亦居中故以皇極配數之五次六五之次為六六洛書文之在右後者曰乂用三德乂治也德道之得於已者惟皇作極民所視效日遷善而不知無所事乎治也或有未然則治之各有所冝故以三德配數之六次七六之次為七七洛書文之在右者曰明用稽疑明謂决其疑也稽古作卜考也謂考之卜筮也德雖應變無方然有疑事非人謀所能決者必須謀之鬼神故以稽疑配數之七次八七之次為八八洛書文之在左後者曰念用庶徴念謂反身思省也庶衆徴驗也雖聽命於鬼神猶不敢自是也必驗吾之得失於天故以庶徴配數之八次九八之次為九九洛書文之在前者曰嚮用五福威用六極威畏古字通用嚮者慕之而欲其有威者畏之而欲其無極者禍之至極者也五福人心所同嚮慕也君之所嚮在此而常願民之獲此福則凡可以致福者靡不勉矣六極人心所同畏避也君之所畏在此而常恐民之至此極則凡可以致極者靡不戒矣自五行至庶徴皆得其道則協氣成象人蒙休祥而五福應之或失其道則乖氣成象人罹殃咎而六極應之故以五福六極配數之九而為九疇之終此第二章洪範之綱也其下九章洪範之目也一洛書文五行一曰水二曰火三曰木四曰金五曰土天一生水地二生火天三生木地四生金天五生土朱子曰五行質具於地而氣行於天以質而語其生之序則曰水火木金土以氣而語其行之序則曰木火土金水水曰潤下火曰炎上木曰曲直金曰從革土爰稼穡此五行之材水能潤能下火能炎能上木可曲可直金可從可革土冝稼冝穡稼謂耕治穡謂收穫蘇氏曰曰者所以名之也土不曰曰而言爰爰於也土無成名無專氣無定位言於此稼穡而非所以名之也新安王氏曰土非止於稼穡以民生粒食之用言之也潤下用之於灌溉炎上用之於烹飪曲直之斫削從革之鎔範用之於宫室器用也潤下作鹹炎上作苦曲直作酸從革作辛稼穡作甘作猶為也水之鹵味鹹火之焦味苦木之實味酸金之繡味辛土之稼穡味甘五行各有聲色氣味此獨言所作之味以見其餘此第三章二洛書文五事一曰貌二曰言三曰視四曰聽五曰思貌者身所動之容言者口所發之辭視者目所見於外聽者耳所聞於內思者心所處運於中貌曰恭言曰從視曰明聽曰聰思曰睿恭容莊而謹也從辭順而逹也明所見昭徹聰所聞審詳睿通於幽微陳氏曰天生蒸民有物有則貌言視聽思物也恭從明聰睿則也恭作肅從作乂明作哲聰作謀睿作聖貌莊謹則其心齊一而不二故作肅言順逹則其心理治而不亂故作乂視昭徹則其心知識了悟而不眩故作哲聽審詳則其心計慮精當而不苟故作謀思通於幽微則其心可馴至於無所不通故作聖此第四章三洛書文八政一曰食二曰貨三曰祀四曰司空五曰司徒六曰司寇七曰賔八曰師民生所最急者務農重榖以足其食有食則種樹阜通以殖其貨既有以養生必有以事死故祀以報本追遠養生事死在乎安居故司空掌土以定其居居既得安不可無教故司徒掌教以導其善教之不從則齊之以刑故司寇掌禁以懲其惡內治舉而後及外故賔以親邦國往來交際有其禮師以平邦國立武足兵有其備用師非得已故最後八政或言其事或言其官此一疇該周官六官之事食貨天官所總祀春官所掌司空冬官也司徒地官也司寇秋官也賔亦秋官所掌師夏官所掌此第五章四洛書文五紀一曰歲二曰月三曰日四曰星辰五曰厯數歲自冬至至來歲冬至凡三百六十五日四分日之一日行天一周也以分至啓閉定歲之四時是為一歲之紀月自合朔至來月合朔凡二十九日六辰有竒月與日一會也以晦朔弦望定月之大小是為一月之紀日自日出至來日日出厯十二辰日繞地一匝也以晨昏出沒定晝夜長短是為一日之紀星謂二十八宿衆經星辰謂天之壤因日月所會分經星之度為十二次觀象測候以驗天之體也是為星辰之紀厯謂日月五緯所厯之度數謂一二三四五六七八九十百千萬七政行度各有盈縮疾遲立數推算以步天之用也是為厯數之紀曰王省惟歲卿士惟月師尹惟日歲月日時無易百穀用成乂用明俊民用章家用平康日月歲時既易百穀用不成乂用昏不明俊民用微家用不寧五紀雖有專官掌之然王與羣臣亦自加省察恐其測候推算之或差所以欽天也卿士師尹不言省者省文師尹衆尹謂大夫士也尊者所省者大而簡卑者所省者小而繁王省一歲之四時卿士省每月之大小師尹省每日之長短易謂與天不相合而差殊所省一歲一月一日之時皆與天協則物産收熟政治光顯賢人之未用者用羣臣之有家者安其或一日一月一歲之時皆與天殊則其應反是此申言嵗月日之紀庶民惟星星有好風星有好雨庶民之所省者惟觀星而已星有好風者有好雨者觀星則知將有風雨而避就之以耕種穫斂也此申言星辰之紀日月之行則有冬有夏月之從星則以風雨日之行冬至道極南度極盈冬至後漸北漸縮夏至道極北度極縮夏至後漸南漸盈月之行春從青道夏從朱道秋從白道冬從黑道青朱出陽道白黑出隂道月從箕度則風從畢度則雨凡此皆用厯數推算而知之此申言厯數之紀此第六章五洛書文皇極皇建其有極釋皇極二字言皇極者謂人君建立其有極也凡厥庶民無有淫朋人無有比德惟皇作極庶民在下之民淫謂沈浸為惡朋類也人在官之人比謂阿黨徇私民無惡類人無私心皆君之德有以為之標準也凡厥庶民有猷有為有守汝則念之不協于極不罹于咎皇則受之惟時厥庶民于汝極錫汝保極念叶音狃有猷謂工於謀事有為謂敢於作事有守謂操持不變時是也庶民之中其有有謀為操守者固當念之而勿忘其有雖未合於善道而亦未陷於罪戾者亦且容之而勿責則是庶民皆有得於汝之極而使汝長保此極矣人之有能有為使羞其行而邦其昌無虐㷀獨而畏高明時人斯其惟皇之極行叶音杭明叶音芒人之有才能有作為者使進其行務令才德兼全而國可賴之以昌㷀獨孤立無援者高明勢位崇顯者不以其無援而困沮之不以其有勢而尊敬之但論其才行之何如耳是則人亦有得於君之極也曰皇極之敷言是彞是訓于帝其訓凡厥庶民極之敷言是訓是行以近天子之光曰天子作民父母以為天下王言叶干斤切訓叶平聲行音杭敷廣布也人君立極者所敷之言即此常道而教訓之皆以天理而教訓也庶民於立極者所敷之言即此教訓而踐行之斯能親近天子道德之光矣又言天子能使庶民近其光斯可作民之父母而為天下之王矣此一節申言庶民無有淫朋之意無偏無陂遵王之義無有作好遵王之道無有作惡遵王之路無偏無黨王道蕩蕩無黨無偏王道平平無反無側王道正直會其有極歸其有極陂舊作頗義叶音䕏偏謂不正陂謂不平遵循也義天理之宜也好惡有當然之理不容以私意作為考工記千夫有道萬夫有路此言道路互辭取韻叶耳道路即義之可通行者也黨謂阿比偏者私於已黨者私於人也蕩蕩廣大貌平平夷易貌反側皆謂不正正謂不偏直謂不枉其正會如會同之會歸如歸家之歸遵義遵道遵路會其極也蕩蕩平平正直歸於極也此一節申言人無有比德之意此第七章六洛書文三德一曰正直二曰剛克三曰柔克正直不偏於剛不偏於柔剛柔適中徑直行之而無所枉也克勝也剛克剛勝於柔也柔克柔勝於剛也平康正直彊弗友剛克燮友柔克平謂平均不彊不弱也康安而無事也彊弗友謂剛彊不相順助也燮友謂柔和相順助也平康者治之以正直如周官所謂刑平國用中典也彊弗友者治之以剛克如周官所謂刑亂國用重典也燮友者治之以柔克如周官所謂刑新國用輕典也或寬或猛或寬猛適中各隨其時俗而施之有不同焉沈潛剛克高明柔克沈謂沈抑下而不上潛謂潛藏內而不外高謂高亢上而不下明謂明顯外而不內沈潛者易至於卑晦故以剛克治之進之於高明也高明者易至於浮露故以柔克治之退之於沈潛也各因其資質而待之有不同焉此第八章七洛書文稽疑擇建立卜筮人乃命卜筮曰雨曰霽曰䝉曰驛曰克曰貞曰悔凡七卜五占用二鑽龜曰卜揲蓍曰筮選擇知卜筮之人而建立之以為卜筮之官及有疑事之時乃命之使卜命之使筮卜兆有五雨水兆霽火兆蒙土兆驛木兆克金兆筮卦有二貞內卦悔外卦卜筮皆有占此占字專言筮衍忒立時人作卜筮三人占則從二人之言三人句絶衍忒未詳朱子曰衍是多剩忒是差錯或曰卜筮若止一人則或有差錯無從正救故多剩其人數俾之參互推究其或有差錯者立是人為卜筮之官各三人人各一法三卜三筮所占或皆吉或皆不吉若一不吉二吉則作吉用一吉二不吉則作不吉用故曰占則從二人之言汝則有大疑謀及乃心謀及卿士謀及庶人謀及卜筮新安王氏曰大疑謂國有非常之事未能决者周官有大事衆庶得至外朝與羣臣以序進而天子親問焉朱子曰卜筮處末者占法先斷人志後命蓍龜汝則從龜從筮從卿士從庶民從是之謂大同身其康彊子孫其逢吉康彊無疾而壽逢大也朱子曰此條無問尊卑其謀皆配於龜筮故為大同之吉人心之虛靈知覺無異於鬼神雖龜筮之靈不至踰於人也故自此以下必以人謀為首然鬼神無心而人有欲人之慮未必盡能無適莫之私故自此以下皆以龜筮為主人雖不盡從不害其為吉若龜筮兩逆則凶咎必矣汝則從龜從筮從卿士逆庶民逆吉朱子曰此條惟君謀配於龜筮亦吉卿士從龜從筮從汝則逆庶民逆吉朱子曰此條惟卿士謀配於龜筮亦吉庶民從龜從筮從汝則逆卿士逆吉朱子曰此條惟民謀配於龜筮亦吉汝則從龜從筮逆卿士逆庶民逆作內吉作外凶內謂祭祀冠婚外謂出師征伐朱子曰此條龜筮一從一違本不可以舉事但筮短龜長又尊者之謀配合故內事猶可外事則凶龜筮共違于人用靜吉用作凶靜謂外事內事俱不作也朱子曰此條龜筮皆逆於人人謀縱有從者動則凶矣此第九章陳氏曰卜筮者天之所示也人事盡而後可以求之天故必皇極建三德乂至於有疑然後謀及人而斷之以卜筮苟人事不協而惟卜筮之從雖得吉兆而無益也故稽疑必在於皇極三德之後八洛書文庶徴曰雨曰暘曰燠曰寒曰風隂陽之氣交則蒸而為雨氣散則開而為暘隂退陽進則為燠陽退隂進則為寒隂陽旋繞扇播則為風燠熱凉寒四時之氣也雨暘風佐四時之氣而化育不言熱凉止言燠寒者燠為熱之微寒為凉之極長物舉其始成物舉其終也雨與暘對燠與寒對風行於四時之間曰時五者來備各以其叙庶草蕃廡備猶有也是五者之來其有各應期而不亂所謂時雨時暘時燠時寒時風也庶草物之尤微者此茂盛則萬物咸遂可知所謂休也一極備凶一極無凶極備謂過於有極無謂過於無一者過於有謂恆雨恆暘恆燠恆寒恆風也一者過於無謂恆雨則無暘恆暘則無雨恆燠則無寒恆寒則無燠或彌旬彌月無風也凶謂饑饉疫癘由此起所謂咎也曰休徵曰肅時雨若曰乂時暘若曰哲時燠若曰謀時寒若曰聖時風若禎祥曰休皆因五事之敬而有此徴肅有滋潤意時雨似之乂有開豁意時暘似之哲昭融有和暖意時燠似之謀審密有凝結意時寒似之聖無所不通時風似之曰咎徴曰狂恆雨若曰僭恆暘若曰豫恆燠若曰急恆寒若曰蒙恆風若災沴曰咎皆因五事之不敬而有此徴狂者貌之放蕩淫雨似之僭者言之差忒亢暘似之豫則昏惰散緩而不收恆燠似之急則躁率縮栗而不舒恆寒似之蒙則心冥迷而無主猶風之終日飄揚而無定也凡此休咎之徴因其事而各以類應此第十章九洛書文五福一曰壽二曰富三曰康寧四曰攸好德五曰考終命五福以人所尤好者為先生而為人孰不好生而惡死壽者其生之長也故先之以壽有生必有以養故繼之以富雖有以養又必身安而心寧故繼之以康寧身康心寧又必知為善之樂故繼之以攸好德考成也成全以終其命謂盡其天年而不死於戰鬬刑戮也有雖壽而不得善終者故卒之以考終命六極一曰凶短折二曰疾三曰憂四曰貧五曰惡六曰弱六極以人所尤惡者為先不得其死曰凶凶者考之反也疾憂者康寧之反也貧者冨之反也陷於不善者惡也雖欲為善而不能自彊者弱也惡弱者好德之反也斂時五福用敷錫厥庶民言人君當斂聚此五福以廣布與庶民凡厥正人既富方穀而康而色曰豫攸好德汝則錫之福汝弗能使有好于而家時人斯其辜豫其無好德汝雖錫之福其作汝用咎色當作寧字之誤也正人謂為正長之官者穀祿也詩曰佌佌方有穀好如鄉黨自好者之好謂自愛重也言正長之官使之既富足有祿而又身得以康心得以寧其人必能為善而曰豫所好者德則是汝實與之以此福也汝若不能先使之富且康寧則彼在家無所顧藉不自愛重將陷於罪而無好德之心汝雖欲與之以福而彼之所作為無非得罪於汝之事矣上為庶民言斂五福此為在官之人言而不及壽與考終命者蓋以人臣委質致命不敢有全身保生之心然苟真能好德則天自報之以壽考也惟辟作福惟辟作威惟辟玉食辟君也威謂六極之可畏玉食謂珍美之食也此言能為民福禍者惟君一人此其所以獨享天下珍美之奉也臣無有作福作威玉食臣之有作福作威玉食其害于而家凶于而國人用側頗僻民用僭忒臣謂大臣人謂小臣頗不平僻不中也臣佐君治民然無有能自為福禍者故亦不敢享至尊之奉若為臣而有君之權享君之奉則是僭亂之臣君臣必俱傷敗凶於臣之家害於君之國有位之人效之而側僻天下之民效之而僭越差忒矣此第十一章金縢蔡氏曰武王有疾周公以王室未安殷民未服根本易搖故請命三王欲以身代武王之死其冊文藏於金縢之匱編書者序其事之始末因以金縢名篇孔疏曰發首至王季文王敘將告神史乃冊至屏璧與圭記告神之辭乃卜至乃瘳記卜吉及王病瘳之事武王既喪以下記周公流言居東及成王迎歸之事也既克商二年王有疾弗豫克商以後之二年言克商未久也有疾初得疾弗恱豫則疾篤也二公曰我其為王穆卜二公太公召公也穆敬也古者國有大事卜則公卿百執事咸在肅敬以聽命於神故曰穆卜周公曰未可以戚我先王葉氏曰戚者休之反也二公以武王疾為先王不佑而遺之戚如雲漢之詩言父母先祖胡寧忍豫者故周公以為未可因武王之疾而遽戚我先王也公乃自以為功為三壇同墠為壇于南方兆靣周公立焉植璧秉圭乃告太王王季文王功事也自以為功謂以身自任其事築土曰壇除地曰墠同除地一所而築三壇設三王之位皆南向三壇之南别為一壇北向周公所立之地也古禮凡於逺祖之無廟者及宗子去其宗廟而在他國者及支子雖在本國而於禮不得入廟者或有禱告必須墠地為壇以棲祖考之神周公之為子為臣故不敢告於廟而為壇以告也璧圭所以禮神植謂置之於壇秉謂執之以手二公為王穆卜不過欲占其病之安否何如非能轉凶為吉也周公以介弟之親任冢宰之重愛兄憂國其情切至為宗社計其慮深逺有非二公所得與者故却二公之卜而自任其事也史乃冊祝曰惟爾元孫某遘厲虐疾若爾三王是有丕子之責于天以旦代某之身豫仁若考能多材多藝能事鬼神乃元孫不若旦多材多藝不能事鬼神乃命于帝庭敷佑四方用能定爾子孫于下地四方之民罔不祗畏嗚呼無墜天之降寶命我先王亦永有依歸今我即命于元龜爾之許我我其以璧與圭歸俟爾命爾不許我我乃屏璧與圭史掌治文書冊作冊以書告神之辭也祝掌接鬼神祝曰者祝述冊書之辭以告也元孫長孫某武王名遘遇也厲惡虐害丕子太子也責猶責其侍子之責旦周公名武王為文王之丕子若爾三王之靈在天責其來服事左右願以身代之材才智藝技能周公謂我之仁德如父又多材藝從三王在天則能供給服役於鬼神武王之德雖亦能然而材藝不如我之多縱死而從三王於天亦不能供給服役於鬼神但當留下地作民主乃受命於天帝之庭廣佑四方之民而君之矣用能定爾三王之子孫皆有分土在於下地四方之民無不敬畏武王之威德然天命方新人心初服未久未固未可遽死也武王一身宗社所繫三王愛念保護毋令其死而墜失天所已降之命則我先王之祀亦永有所賴以存也寶命即帝庭之命也謂之寶者貴重之也即就也命三王之命也元龜大龜也就受三王之命於元龜謂决之於卜也卜之吉是三王之許我卜之不吉是三王之不許我也許我則王疾瘳而已代死得從三王在天事鬼神故以此璧與圭歸家而俟三王許我之命屏藏也不許我則王疾弗瘳而已不死不得從三王在天事鬼神而此璧與圭無所用故藏之也案周公告三王稱爾稱我無異人子之侍側以語其親可見終身慕父母不死其親之實孝愛忠誠之至也又案武王喪於克商七八年之後天下大勢已定猶有武庚之叛周室幾危設使喪於克商甫二年之時則禍變又將若何周公蓋覩事勢之必至於此所以欲代武王之死也或曰死生有命而周公欲代死理有之乎曰有匹夫匹婦發一誠心可動天地况聖人至誠至公心與天一志一則動氣固有改移造化之理若理之所無則周公豈為之哉乃卜三龜一習吉啓籥見書乃並是吉公曰體王其罔害豫小子新命于三王惟永終是圖兹攸俟能念豫一人卜筮必立三人以相參考洪範所謂立時人作卜筮三人是也三龜者三人所卜之龜一猶齊也習重也並並也謂三龜之兆齊相繼而吉及啓籥見兆書而其占果並吉也體兆之體周官君占體大夫占色史占墨卜人占坼公言視卜兆之體王之疾其可無害豫小子周公自謂豫一人謂武王也公視卜知王疾必瘳而已亦不代死故言我新受命於三王惟當永久克終是圖三王既不令我代死則今此所俟三王之命但俟其能愛念武王而使其疾之瘳矣公歸乃納冊于金縢之匱中王翼日乃瘳公歸周公歸其私家也冊即史所作之冊縢緘也匱藏物之器金縢之匱藏卜書之匱以金緘之也翼日公歸之明日瘳愈也言公既卜而歸卜人乃以周公請命之冊納於匱中與卜書並藏也蔡氏曰金縢之匱藏卜筮書每卜則以告神之辭書於冊既卜則納冊於匱而藏之前後卜皆如此王氏曰卜筮既畢而不敢褻必納其冊書於匱異時將卜則復啓焉乃國家故事非特為此匱藏其冊為後來自解之計也愚謂匱所以藏卜書卜則啓匱此常事也惟周公此時之卜有與常時不同者以先有冊書告三王而後卜也故既卜之後其冊書因得同藏於卜書之匱若常時之卜則史述卜主之命告卜人蓋不書於冊既卜亦無冊可藏也故前此二公欲卜武王之疾後此成王欲卜風雷之變皆不聞有冊王氏蔡氏之說未當而謂非周公藏其冊為後來自解之計則是此第一章武王既喪管叔及其羣弟乃流言于國曰公將不利于孺子武王之疾既瘳數年之後乃喪管叔名鮮武王弟周公兄也羣弟蔡叔度也非長弟故曰羣弟猶儀禮非長子者曰衆子也流言如水流自彼至此也國周國也其言發自紂都而傳至周國也孺子成王也公將不利于孺子謂欲奪其位也蓋商有天下六百年賢聖之君六七作德澤之入人者深紂為無道諸侯離心而雍梁荆豫徐揚六州歸周冀兖青三州猶屬商及武王克商封帝乙元子微子啓于宋以奉湯祀分紂故都為三以母弟三人為三監紂都之北為邶封管叔南為鄘封蔡叔東為衛封康叔紂子武庚居殷墟有司厚給其廩祿而已蓋未嘗與之土地人民也然殷民懷商不忘武王崩成王幼周公攝政武庚煽惑管叔以謂兄亡弟及管叔當立今周公弟也而居內將為天子管叔兄也而居外不過為諸侯管叔及弟蔡叔唱為流言以惑王而閒公將西向奔喪以軍師從而圖不軌周既有釁武庚俟管蔡二叔去國之後收其遺民叛周而復商南有徐戎淮夷等國亦相挺而起所謂管叔監殷以殷叛者其事情之實蓋如此而前史所載失其傳也周公乃告二公曰我之弗辟我無以告我先王辟法也周公自責言今此召謗致亂是我之所為不法也王室將危我何告我先王乎亟能弭變安王室乃可於是大誥諸侯東征叛人周公居東二年則罪人斯得居東謂出征而居東方也二年出征之第二年也罪人謂叛人武庚得謂捕獲也武庚伏誅而管叔亦死殷亂遂平林氏曰自周公居東以下其事跡皆在大誥之後然實與周公請死之事相為始終故於此並載之于後公乃為詩以貽王名之曰鴟梟王亦未敢誚公于後謂罪人斯得之後貽遺也鴟梟詩見今豳風以言責人曰誚管叔流言謂周公將為不利公不俟王疑之釋而自往征之蓋國家安危重於一身聖人之心至公無我豈若小丈夫然避小嫌而妨大計乎以王室至親兼東方諸侯伯而仇讎之人煽惑我兄弟離閒我君臣以傾覆我國家禍變艱大事機迫急拯溺救焚惟恐不及征之其可少緩乎逮叛亂既平周公居東不歸作鴟梟之詩以貽王極言周家創造王業之難而有傾覆之者其情哀痛庶幾成王之悟而王疑終於未釋但亦未敢誚公而已秋大熟未穫天大雷電以風禾盡偃大木斯拔邦人大恐王與大夫盡辨以啓金縢之書乃得周公所自以為功代武王之說二公及王乃問諸史與百執事對曰信噫公命我勿敢言王執書以泣曰其勿穆卜昔公勤勞王家惟豫沖人弗及知今天動威以彰周公之德惟朕小子其親逆我國家禮亦冝之王出郊天乃雨反風禾則盡起二公命邦人凡大木所偃盡起而築之歲則大熟東征之二年罪人斯得而周公尚留居東都此其三年之秋也大雷電以風天之怒而渝也辨皮辨常服𤣥冠端畏天威敬鬼神故王與大夫盡改服皮辨素積啓金縢所藏卜書以卜而於其匱中見周公請命之冊諸史百執事供給卜筮之人昔日從周公以卜者今王將卜故為卜而俱至二公及王得周公代死之說遂以問之則為信有此事噫心不平之聲又慨歎而謂公常有命令勿與人言故我勿敢言爾蓋請命代死出於一時迫切之誠變禮也非常道也故不令宣泄成王初意欲卜天變之為何既得此說始知昔日周公如此用心以勤勞於王家王自悔年幼不及知不免為流言所惑夫周公肯以身代兄死其肯奪兄子之位乎以公之忠聖而被謗蒙疑至今在外公無負於王王有負於公矣天動威譴告以彰顯周公忠聖之德王因此感悟知天變為公故曰其勿穆卜王疑既釋亟欲去歸謂我當親迎而國家所以待公之禮亦當冝稱公自東歸將至王出郊以迎而天乃雨隂陽和也反偃禾之風而禾之偃者盡起天意回也感應之速如此凡大木為風所拔者既顛仆於地矣風所偃者根未拔而幹欹斜則合衆力支拽之起其幹令不偃又築其根令堅固也前言秋大熟後言歲則大熟其辭相始終以見未穫而禾偃既偃而復起雖遭風災而不害也親迎俗本親作新今從馬氏本此第二章大誥誥辭有大誥二字取以名篇武王克商誅紂其子武庚曷嘗一日忘周哉顧周未有隙可乘又在已無土地人民之資耳會武王崩成王幼周公攝政管叔不平此可乘之隙也武庚說管叔聲周公之罪舉兵西向其心豈為管叔計直欲伺管蔡二叔去商則己得收遺民據故都以復商也管蔡庸愚武庚狡黠管叔身行叛事而實為武庚所陷武庚身造叛謀而先藉管叔以發禍機可畏折之於方萌則易遏之於已熾則難所以不得不速出師也此誥蓋作於武王崩之年他書載武王崩在十二月若果爾東征亦當不出是月也成王元年殷亂平二年周公歸三年伐奄遷殷民七年營洛王若曰猷大誥爾多邦越爾御事弗弔天降割于我家不少延洪惟我幼沖人嗣無疆大厯服弗造哲迪民康矧曰其有能格知天命周公以冢宰攝行王事公之東征代王親征也國之號令當自天子出故稱王命以告猷發語辭大誥猶言普遍以告也多邦謂諸侯之君御事謂其治事之臣不弔猶言不幸謂不為天所閔恤也割猶害也遭大喪禍其痛如割也延謂待也不少延謂伐殷未久武王遽崩也無疆謂無有境界窮盡之處言其大也厯天之厯數也服猶事也造猶造道之造格猶格物之格武王受天厯而服王事此至大之任大惟我以幼小沖弱之人而嗣守之弗能造於明哲以導民於安康是人事且有未盡況敢言能格知天命乎巳豫惟小子若涉淵水豫惟往求朕攸濟敷賁敷前人受命兹不忘大功渡水曰涉往猶進也渡訖曰濟敷廣也賁飾也若涉深淵之水進而求所以濟思欲增廣修飾以增廣前人所受之命使其命愈隆愈固此不忘前人創業之大功也豫不敢閉于天降威用寧王遺我大寶龜紹天明即命曰有大艱于西土西土人亦不靜閉謂掩藏諱護降威即降割也寧王武王也紹謂龜能承接天意以傳於人即命就受天之命於龜也曰者龜兆之占如此云也大艱謂大患難也天降喪禍於我未知天意若何不敢諱護不問故用寧王所遺我之大寶龜以繼紹天明卜未來之吉凶而龜兆之占預報以武庚叛亂之事謂將有為大患難於西土者蓋言武庚叛周也雖西土之人亦為不安靜之事蓋言管蔡雖是周人而亦為亂也此武王崩後所卜越茲蠢殷小腆誕敢紀其敘天降威知我國有疵民不康曰豫復反鄙我周邦蠢如蟲之物而無知也殷謂武庚腆厚也紀理絲也敘傳世之次也疵猶隙也國有疵謂二叔謗周公以惑成王也民即人不康即不靜謂動兵也反謂反於常理也鄙逺邑也武王崩後龜兆預告以將有叛亂及此果有蠢然而動者殷餘小小腆厚之武庚大敢理其傳系以已為殷王之子當繼世而王適值天降喪禍於周知二叔與周公有隙而為不安靜之事遂乘比隙而曰此豫殷家興復之時欲亡周而反以周邦之土地為商畿之逺鄙此武庚之叛謀也當時蠢動蓋是管蔡率殷民以來誥辭直歸罪武庚者指出叛謀所起禍根所在而言也今蠢今翼日民獻有十夫豫翼以于敉寧武圖功我有大事休朕卜並吉民獻未仕之賢也于往敉撫安也寧武亦謂武王初喪未諡以其能安天下曰寧王有安天下之武功故曰寧武自嗣子言之則曰寧考槩言之曰寧人自後人言之則曰前寧人大事戎事也並吉三龜皆吉也今殷民蠢動於今日之明日有賢者十人來為我輔翼以往撫安武王所圖之功克殷有天下者武王所圖之功也使殷再復則前功墮矣往平殷亂所以敉其圖功也我之戎事有克捷休祥之徴故卜三龜而皆吉此東征之時所卜聖人雖灼見事理之當為尤必協人謀鬼謀而不自用也肆豫告我友邦君越尹氏庶士御事曰豫得吉卜豫惟以爾庶邦于伐殷逋播臣爾庶邦君越庶士御事罔不反曰艱大民不靜亦惟在王宫邦君室越豫小子考翼不可征王害不違卜尹氏大夫庶士上中下士御事指卿而言也逋播臣謂殷亡而武庚逋逃播蕩也以此見周未嘗封武庚為諸侯而自司馬遷以來皆謂紂誅而以武庚續殷祀者所傳謬誤也越豫小子設為諸侯自稱之辭考謂揆度審察翼即十夫豫翼者周公以十賢來助龜卜協吉決於往伐而邦君御事乃不欲往曰患難之大而人之為不靜者亦惟在王之宫邦君之室蓋謂王惑流言二叔不咸也我衆諸侯揆度審察十夫之謀不可往征王曷不違卜而罷東征之役乎或曰王師以順討逆而諸侯敢不從命何也曰管蔡二叔誣謗周公舉兵內嚮必以奬輔王室為名成王幼沖方且疑惑豈遽目之為逆武庚之叛謀甚深黨附二叔勸之西行實欲二叔去殷亂周而已得以據殷叛周也二叔既墮其術中衆人淺識亦但見二叔有不咸之迹而不知武庚懷叵測之心諸侯不欲東征者以二叔王室至親而武庚叛形未露也惟周公上智洞燭幾先明徴其辭顯斥其罪專指武庚而不及二叔兵法所謂上兵伐謀先人奪人之心者固聖人之餘事邦君御事乃以艱大不靜惟在二叔而不及武庚愚智所見相去懸絶若此儻武庚謀泄迹著人人皆知其叛則諸侯安敢不從征討而自比於逆亂哉肆豫沖人永思艱曰嗚呼允蠢鰥寡哀哉豫造天役遺大投艱于朕身越豫沖人不卬自恤義爾邦君越爾多士尹氏御事綏豫曰無毖于恤不可不成乃寧考圖功永思猶曰深長思也卬我也毖謹慎勤勞之意我深思今日之患難而曰彼之蠢信乎為無知而動矣然少壯被驅以行鰥寡不得其養可哀也哉我嗣受天命興師討罪乃天役也為此天役所謂大艱皆遺之投之於我一身謂我身自當之也但我不暇自憂一身所憂者在前人之基業意謂爾邦君等知義必安我曰無過於憂不可不勇往定亂以成汝寧考所圖之功今爾反曰不可征豈為義乎已豫惟小子不敢替上帝命天休于寧王興我小邦周寧王惟卜用克綏受兹命今天其相民矧亦惟卜用嗚呼天明畏弼我丕丕基我之往征蓋不敢廢上帝之命也天降休命於寧王由百里小邦而興周惟卜之吉而用以伐紂遂能安受此天命而為王今天意其相助我周之人猶寧王時也況我亦惟卜之吉而用以討叛卜吉則天意可知矣故嘆而言曰天之明天之威輔弼我大大之基業其可不順天命以討彼之逆天命者乎王曰爾惟舊人爾丕克逺省爾知寧王若勤哉天閟毖我成功所豫不敢不極卒寧王圖事肆豫大化誘我友邦君天棐忱辭其考我民豫曷其不于前寧人圖功攸終天亦惟用勤毖我民若有疾豫曷敢不于前寧人攸受休畢爾西土邦君御事皆舊事武王之人爾大能逺省前事豈不知武王定天下若是之勤勞哉閟者隱匿不顯之意天實隱匿勤慎與我以成完前人圖功之所我不敢不極盡以卒其所圖之事也化謂化其固滯誘謂誘之順從天非誠有言辭以命我但考我之民民賢來助即天意也豫曷其不於前人所圖之功而思所以終之乎天亦惟用勤謹佑我周之人若有疾病當速攻治豫曷其不於前人所受之休命而思所以畢之乎王曰若昔朕其逝朕言艱日思若考作室既砥法厥子乃弗肯堂矧肯構厥父菑厥子乃弗肯播矧肯穫厥考翼其肯曰豫有後弗棄基肆豫曷敢不越卬敉寧王大命若兄考乃有友伐厥子民養其勸弗救昔昔日也謂初欲東征之時言語辭或曰猶謂說及也如昔日之意則我已往矣我亦於此患難日日思之以至於今譬如作室父既砥定廣狹之度矣其子乃不肯為之築基況肯為之造屋乎譬如耕田父既反土而菑矣其子乃不肯為之播種況肯使之成熟而穫乎其子如此其父之輔翼者其肯曰豫有後嗣能不弃父之基業乎豫者豫其父也蓋武王定天下如作室之砥法如耕田之既菑今不能討平叛亂以終武王之業則是不肯堂不肯播矣況可望其肯構肯穫而保天命於無窮乎故我何敢不以我而撫安武王所已受之天命此自責之辭養如養癰護疽之養勸如盤庚篇汝誕勸憂之勸叛者當懲不往誅之是勸之也坐視其叛而不之懲是養其勸而不救也兄考喻武王友喻武庚子喻成王民謂為兄考家之人喻邦君御事此責諸侯之辭王曰嗚呼肆哉爾庶邦君越爾御事爽邦由哲亦惟十人迪知上帝命越天棐忱爾時罔敢易法矧今天降戾于周邦惟大艱人誕鄰胥伐于厥室爾亦不知天命不易豫永念曰天惟喪殷若穡夫豫曷敢不終朕畝天亦惟休于前寧人豫曷其極卜敢弗于從率寧人有指疆土矧今卜並吉肆朕誕以爾東征天命不僭卜陳惟若兹肆下加哉字亦發語之辭連下至御事句絶明察國事由於哲人十人即民獻十夫迪知者真知非臆度知之十人知天命之眷周故來助東征之役天非可信爾於是無敢改易前人之法奉天命以伐商者武王之成法改其成法是逆天命也則天將不可信而命亦改矣況今天降喪禍之戾於周邦故惟興大患難之人大於鄰近之處自相攻伐於其邦君之室此事不可考疑是康叔不肯從亂而管蔡伐之也今汝不欲東征是不知天命之不易得而輕弃之也降戾猶前章降割降威謂武王崩也蓋亦有周之喪禍故有殷之大艱也天意惟欲亡殷武王既誅紂於始若穡夫然豫曷敢不因武王已墾之田而終其畝乎謂當誅武庚也天亦惟休眷我武王故伐紂之時卜之而吉明周當得天下此極吉之卜也豫曷敢不從此吉卜而率循保守武王已有所指定之疆土乎何況今日將伐武庚卜之又并吉是天意欲誅武庚也天之命不僭差以卜之吉陳說告汝是如此也康誥康地名文王之子名封初食采於康武王克商之後分紂故都朝歌以北為邶管叔居之以南為鄘蔡叔居之以東為衛康叔居之管蔡以長康叔以賢皆以母弟鎮守商地其後紂子武庚誘管叔以畔惟康叔忠賢阻厄亂人如防制水殷亂之平康叔有力焉如漢時吳楚七國反得梁孝王捍其衝七國卒以破亡事勢相類漢書言周公善康叔不從管蔡之亂是也此篇及酒誥乃康叔往衛之時武王告之之辭朱子曰孔氏小序以康誥為成王周公之書而五峯胡氏以為武王嘗考之其曰朕弟寡兄皆武王之自言而其他證亦多小序之言不足信蔡氏曰康叔成王叔父不應以弟稱之說者謂周公以成王命誥故曰弟然謂之王若曰則為成王之言周公何遽自以弟稱之也說者又謂寡兄勗為稱武王尤非寡兄自謙之辭苟語他人猶之可也武王康叔之兄家人相語安得以武王為寡兄而告其弟乎且康誥酒誥言文王者非一而略無一語及武王何耶或又謂武王時康叔尚幼故不得封然康叔武王同母弟武王分封之時年已九十安有九十之兄同母弟尚幼者乎又按汲冢周書克殷篇言王即位於社南羣臣畢從毛叔鄭奉明水衛叔封傅禮召公奭贊采師尚父牽牲史記亦言康叔布兹與汲冢大同小異康叔在武王時非幼明矣特序者不知康誥篇首四十八字為脫簡因誤為成王書也康誥酒誥篇次當在金縢前王若曰孟侯朕其弟小子封惟乃丕顯考文王克明德愼罰不敢侮鰥寡庸庸祗祗威威顯民用肇造我區夏越我一二邦以修我西土惟時怙冒聞于上帝帝休天乃犬命文王殪戎殷誕受厥命越厥邦厥民惟時敘乃寡兄勗肆汝小子封在兹東土孟長也言為諸侯之長丕顯大明也明德生知而猶緝熙也慎罰哀矜而不輕用也侮謂忽慢鰥無妻寡無夫民之窮而無告者且不敢侮則法不輕用於民可知也庸有常祗敬威可畏重言之猶堯典言安安以庸常敬畏之德顯其民謂導民而使之明也肇始造作區謂分畫界域夏謂華夏岐周猶近西戎文王徙豐始作區宇於華夏之地也一二邦謂鄰國也修謂完治怙恃也冒上進也此言文王初年我西土惟文王是怙其德日盛上聞於天天用休嘉之乃大命文王而三分天下有其二也殪殺也戎殷謂殷之虐民猶寇戎也誕大寡兄武王自謂謙辭東土殷都在周東也此言滅商而大受天命為天子及所統之國所有之民無一不得其敘乃汝寡德之兄所勉勗以繼志述事者也故今日汝得以在此東土而為諸侯王曰嗚呼封汝念哉今民將在祗遹乃文考紹聞衣德言往敷求于殷先哲王用保乂民汝丕逺惟商耇成人宅心知訓别求聞由古先哲王用康保民𢎞于天若德裕乃身不廢在王命此以下王曰者二欲康叔明德也念謂不可忽忘將語辭遹述也紹繼也聞衣謂聞而服之於身猶下文言聞由也往之國也敷求廣求也宅心謂居官之心如立政所言克厥宅心也訓古訓也𢎞充廣也裕饒益也言汝今治民在敬述文王所紹所聞所衣之德言蓋文王雖生知安行之聖亦聞而知之故孟子曰由湯至於文王五百有餘歲若文王則聞而知之因文王之所聞又往敷求殷家先哲王所用以保乂其民之道以證文王所聞之德言汝大逺惟商之老成人居官者所知之古訓因商臣之所知又更求知行古昔先哲王所用以康保其民之道以證商臣所知之古訓然未可自足也又當擴充其德與天為一若德足乎已則王之命汝者永不廢矣王曰嗚呼小子封恫瘝乃身敬哉天畏棐忱民情大可見小人難保往盡乃心無康好逸豫乃其乂民我聞曰怨不在大亦不在小惠不惠懋不懋已汝惟小子乃服惟𢎞王應保殷民亦惟助王宅天命作新民恫痛瘝病戒慎恐懼常若病痛之在身則無所不敬矣畏威通棐朱子從顔氏漢書注與匪同後並倣此忱信也天之威非可信其常佑助民之情大可見者小人難保其常懷服也然天之視聽自民民情所向即天所佑民情所背即天所弃汝往就國當盡汝之心毋自安而好逸豫乃可以治民又申言小人難保之意我聞人有言曰凡民不當使之有怨怨無大小皆能為患不在大者大起於小不在小者小至於大汝之德雖已惠愛於人猶自以為不惠雖已懋勉於已猶自以為不懋歉然不自足惟恐失民之心如此庶可使民無怨也應謂順其心宅謂已得天命而居守之也作謂振起而變化之也新民殷民之新附者汝所服行惟𢎞廣王之所以應保殷民者亦惟佐助王之所以守天命而動化其新民者王曰嗚呼封敬明乃罰人有小罪非眚乃惟終自作不典式爾有厥罪小乃不可不殺乃有大罪非終乃惟眚災適爾既道極厥辜時乃不可殺此以下王曰者六欲康叔慎罰也敬則慎重所以能明小大猶言輕重眚謂誤犯終謂故犯典式謂以常法為法式也自作不典式謂自為不法之事眚災謂因過誤而罹災禍適爾適然如此也蘇氏曰此設為死罪之大小以明其情之有輕重非謂小罪為可殺也如甲乙皆百死罪而甲之罪小於乙非謂其罪不至死也今世之法謀殺已傷雖未殺皆死雖未傷而置人於必死之地亦死過失殺雖已殺皆贖與此意略相似王曰嗚呼封有敘時乃大明服惟民其勑懋和若有疾惟民其畢棄咎若保赤子惟民其康乂有敘謂刑罰中倫皆得其宜是汝能大明而有以服民也明不可欺而民畏服其必勑正懋勉不敢乖戾以犯法然此特道之以政而已故民之和者勉强為之若有疾若保赤子道之以德也止民之惡者如去已之疾則調護無所不至民必逺罪而盡棄其咎矣保民之善者如保己之赤子則愛養無所不至民必遷善而砥於康乂矣先言有疾後言赤子蓋民棄咎而後可康乂也非汝封刑人殺人無或刑人殺人非汝封又曰劓刵人無或劓刵人非汝封刑此人殺此人則無或敢有刑人殺人者非汝封又言當劓此人刵此人則無或敢有劓刵人者言用刑之權惟汝得專不可輕用也刑殺刑之重者劓刵刑之輕者刑人之刑輕於殺重於劓刵蓋指剕宫二刑而言也孔疏曰此又曰述康叔之文曰下章倣此王曰外事汝陳時臬司師兹殷罰有倫又曰要囚服念五六日至于旬時丕蔽要囚外事謂都邑之事天子地方千里六鄉六遂在方四百里內者為國中公邑家邑小都大都在方四百里外者為野諸侯大國地方百里方四十里內為國中其外為野次國地方七十里小國地方五十里方三十里內為國中其外為野野之獄訟各有大夫士自治其事不屬國中故曰外事蓋如魯之費郈楚之申息齊之平陸靈邱也臬法也立木為射之的故謂法為臬都邑之事在司之者得其人汝陳列任法之司使之師此殷罰之有倫理者殷法乃殷民所習知故師之以治殷民言罰不言刑舉其輕者言也要謂詰罪之辭囚謂拘繫之人汝又與有司言及罪已詰定明徵其辭而囚繫其人以待決斷者當服著於心而思念之五六日至十日至三月詳察審覆情理無差則上其獄而丕斷此要囚之人也案周官鄉遂之外縣野有縣士都家有方士掌王城二百里以外至五百里之獄訟各辨其罪而要之或二旬或三旬或三月而上其獄於國司寇聽之蓋與此誥之意相似王曰汝陳時臬事罰蔽殷彞用其義刑義殺勿庸以次汝封乃汝盡遜曰時敘惟曰未有遜事此言國中康叔自決之事汝陳列用法之事其輕而當罰則斷以殷家之常法其重而當刑當殺則擇用殷法之合於冝者不可移就汝之意此刑字兼墨劓剕宫次猶次舍之次汝所用之法盡遜順於理曰是有敘矣惟當曰未有遜順之事蓋道民以德刑措不用乃為極治法之當未足言也已汝惟小子未其有若汝封之心朕心朕德惟乃知已者畢前起後之辭汝雖年小他人未有能若汝之心者至於我之心我之德惟期於無刑亦惟汝能知之也王曰封以厥庶民暨厥臣達大家以厥臣達王惟邦君汝若恆越曰我有師師司徒司馬司空尹旅曰豫罔厲殺人亦厥君先敬勞肆徂厥敬勞肆往姦宄殺人厯人宥肆亦見厥君事戕敗人宥達通也惟猶與也越助語辭我我康叔也尹謂大夫旅謂衆士豫豫司徒司馬司空等也厲虐害之也勞慰安之也厯經也過也謂挺刃及其身傷而未死者也戕殺人者也敗厯人者也宥當服重刑而從輕者也前一節武王言我之心欲用德不用刑惟汝能知之此承前節之意而言上下貴賤皆當使其心通達為一而相知以庶人之為民及士之為臣者通達於卿大夫之家欲其皆知大家之心以卿大夫之為臣者通達於王與邦君欲其皆知王與國君之心汝若於恆時而曰我之卿大夫士言曰豫罔或厲人殺人蓋素知其君之心不欲厲人殺人也臣之罔厲殺人者亦其君先敬於慰安其民故其臣所徂往皆敬於慰安其民而不厲之也臣之罔殺人者所往有為姦宄殺人傷人而情理可憫猶或宥而不殺之亦見其君所行之事於殺人傷人者亦或宥之也此一節舊本錯在梓材篇首凡民自得罪寇攘姦宄殺越人于貨暋不畏死罔弗憝凡民句絶言凡人之情皆如此也自得罪猶上言自作不典式太甲自作孽之自謂其得罪皆由已稔惡非因人致災也越人猶顚越人即上文厯人敗人孔疏謂不死而傷是也于貨謂所以殺傷人者于其貨也暋昏愚强暴也憝惡也凡人之情於怙終為惡寇攘之姦宄甚至殺人傷人而取其貨強悍不畏死者無不惡之孟子引此凡民二字在罔弗憝上語意尤明上文言戕殺敗厯之姦宄亦或有時宥之蓋其情理之可憫者耳若此自得罪不畏死之姦宄凡民罔不惡之則必刑必殺而不可宥孟子所謂不待教而誅者也王曰封元惡大憝矧惟不孝不友子弗祗服厥父事大傷厥考心于父不能字厥子乃疾厥子于弟弗念天顯乃弗克恭厥兄兄亦不念鞠子哀大不友于弟惟弔茲不于我政人得罪天惟與我民彞大泯亂曰乃其速由文王作罰刑茲無赦元惡殺越人于貨者也大憝凡民罔不憝也善父母為孝善兄弟為友不孝總言父子失道不友總言兄弟失道下乃分言之也字撫愛也天顯長幼之分乃天之顯道也鞠子幼而未離鞠養之子也哀矜憐也弔至也上文所指元惡人所大惡也況於不孝不友之人父因子之不孝遂不慈其子兄因弟之不恭遂不友其弟其斁倫悖理至此豈不於我為政之人而得罪乎天所與斯民之常理大泯絶紊亂矣然則如之何哉汝其曰速由文王所作之罰刑以罰之刑之而於此無所赦乎蓋不可也不率大戞矧惟外庶子訓人惟厥正人越小臣諸節乃别播敷造民大譽弗念弗庸瘝厥君時乃引惡惟朕憝已汝乃其速由茲義率殺不率不孝不友者也戞擊也大戞謂罰之刑之而不赦也外謂都邑之官也庶子卿大夫士之庶子為士者訓人猶周官土訓誦訓訓方氏之類多見聞能道說古今逺近之事者正人如周官宫正酒正之類為一官之長者諸節如符節璽節旌節之類小臣持以出入者引猶引弓之引言滿盈其惡義謂君臣之義上文所指一家父子兄弟之不率且欲大治之也況於不令之臣哉夫為臣者當承宣君之政教今則别有所播揚敷布以造大譽於民間亂政改作違道干譽弗念弗用其君之命以病其君是乃長惡之人為上之人所惡然則如之何哉汝乃其速用此君臣之義律之而率皆殺之乎蓋不可也亦惟君惟長不能厥家人越厥小臣外正惟威惟虐大放王命乃非德用乂汝亦罔不克敬典乃由裕民惟文王之敬忌乃裕民曰我惟有及則豫一人以懌君長謂康叔也能如柔逺能邇之能謂化誨而和順之意也家人謂父子兄弟一家之人小臣即小臣諸節外正即外庶子訓人正人也舉其長以包其次也威虐謂無赦率殺也放廢棄也典謂五典父子之親兄弟之序君臣之義在乎以身先之有不孝不友之民弗念弗庸之臣者亦是汝為君為長不以德化順彼一家之人與此小臣外正之官乃惟用威虐以刑殺之是大廢棄王命而非以德為治矣王之命欲以德乂汝不用德而用威虐廢棄王命也汝亦無不敬行五典以道其民汝所用以裕其民者惟當用文王敬畏之德汝之裕民曰我惟求有以及於文王則我之所喜也王曰封爽惟民迪吉康我時其惟殷先哲王德用康乂民作求矧今民罔迪不適不迪則罔政在厥邦武王既戒康叔矣又自責於身爽明也明知斯民導迪之則吉康我欲迪民於是惟殷先哲王之德所用以安治其民者起而求也況今殷民無以迪之則不能自適於吉康之地不迪其民則非惟民陷於凶危而我國亦無政矣王曰封豫惟不可不監告汝德之說于罰之行今惟民不靜未戾厥心迪屢未同爽惟天其罰殛我我其不怨惟厥罪無在大亦無在多矧曰其尚顯聞于天我惟不可不監視於古告汝以德之說于罰之行蓋德者本也告汝以罰之行必本於德之說所謂德者即上文求殷先哲王以康乂民之德是也戾定也今殷民不安靜未定其心道迪之屢屢矣猶未齊同此皆我道民之德未至也不能奉天作君師之意天其降罰而殛我我不敢怨天我之罪無在於大亦無在於多雖小寡亦不可矧至於章顯而上聞於天為天所罰殛則罪大且多矣尚何敢怨乎此亦王自責以警康叔王曰嗚呼封敬哉無作怨勿用非謀非彞蔽時忱丕則敏德用康乃心顧乃德逺乃猷裕乃以民寧不汝瑕殄戒康叔敬而無忽無作致怨於民之事非善謀非常道者勿用惟斷以是心之誠大則在於敏修其德誠則揆諸心而安顧謂常目在之敏則不怠是以能顧非謀非彞猷之不逺者能饒益其民民乃砥於寧而我不瑕疵絶汝矣王曰嗚呼肆汝小子封惟命不于常汝念哉無我殄享明乃服命高乃聽用康乂民命謂命為諸侯之命不于常謂不可常保殄享謂失國而絶朝享天子之禮當明汝所服之王命謂不可昏忘也高汝所聽謂當聽我所告文考及先哲王之道不可卑汚也王若曰往哉封勿替敬典聽朕告汝乃以殷民世享五典者率性之道汝敬而行之勿或失墜聽我告汝之言乃以殷民世世為國君而享於天子矣酒誥商紂酗酒其下化之康叔封於紂都就封之時武王有誥之之辭載之康誥之篇矣又特誥之以此俾往妹土教戒其臣民勿湎於酒而别為酒誥之篇王若曰明大命于妹邦命教戒之辭也妹地名紂所都言康叔今既往封當明示大教命於彼妹邦之臣民俾勿湎於酒也乃穆考文王肇國在西土厥誥毖庶邦庶士越少正御事朝夕曰祀兹酒文王廟次為穆故稱穆考告勑之使敬謹故曰誥毖庶邦諸侯之君文王為西伯故告戒庶邦庶士上中下士少正大夫御事治事之卿皆文王之臣也告戒他國衆君本國羣臣於朝夕之間曰惟祭祀得用此酒武王將欲康叔往東土告戒其臣民故先言文王在西土亦如此告戒令康叔法之也惟天降命肇我民惟元祀天降威我民用大亂喪德亦罔非酒惟行越小大邦用喪亦罔非酒惟辜天降命謂天降此教命於人威猶禍也禍之可畏者也武王既述文王昔者之告戒遂自言曰如今我民作酒惟用之於大祭祀是天以此教人也既有此酒之後飲者至於沈縱有身者有酗酒之行則大荒亂而喪失其德有國者有酗酒之罪則非但喪失其德並喪亡其邦凡民之喪德君之喪邦皆因於酒是天以此禍人也文王誥教小子有正有事無彞酒越庶國飲惟祀德將無醉小子者庶民之子孫有正即少正有事即御事不言庶士省文上既總言文王之誥毖此又分言文王誥教本國之民臣無得常飲酒必因事而後飲及誥教他國諸侯之君惟祀乃飲其飲以德將之無至於醉惟曰我民迪小子惟土物愛厥心臧聰聽祖考之彞訓越小大德小子惟一妹土嗣爾股肱純其藝黍稷奔走事厥考厥長肇牽車牛逺服賈用孝養厥父母厥父母慶自洗腆致用酒此武王授康叔以往妹邦誥民之辭今汝之往惟當言曰為我之民者各導迪其子孫務本力農惟土地所生之物是愛不為外慕所誘則其心臧善能聰聽祖考彞常之教及其小大之德小大德謂所行之善或小或大純語辭為民之小子者惟專一其心於妹土之地繼爾民股肱之力其種藝黍稷竭力代父兄之勞農隙之時始逺役賈買貿易貨物用以孝養其父母至父母當慶為子者乃自盥洗以示潔敬極其腆厚致用酒以奉親豳風所謂為此春酒以介眉壽是也庶士有正越庶伯君子其爾典聽朕教爾大克羞耇惟君爾乃飲食醉飽丕惟曰爾克永觀省作稽中德爾尚克羞饋祀爾乃自介用逸茲乃允惟王正事之臣茲亦惟天若元德永不忘在王家此武王授康叔以往妹邦誥臣之辭庶士有正越庶伯君子與篇首所稱庶士少正御事同有正即少正庶伯君子衆官之長即御事也爾康叔與其臣也爾臣常主於聽我之教戒必不以酒廢事凡燕享祭祀之禮皆有俎有羞先進俎後進羞羞者惟國養耆老之時爾大能進羞於老者侍君燕飲之時爾大能進羞於君此時爾乃可因而飲酒以醉食肉以飽若非養老侍燕則不得飲也又有大於典聽朕教者爾能自修其德也惟曰爾能永逺監觀省察動作有稽欲其德無過不及必不以酒喪德惟祭祀之時爾尚能進羞以饋祀祖考此時爾乃可因而飲酒自介景福用以逸樂若非祭祀祖考則不得飲也如此乃真可為王家有正有事之臣如此天亦佑助爾之大德在王家亦永逺不忘爾也非止為一國之賢臣而已王曰封我西土棐徂邦君御事小子尚克用文王教不腆于酒故我至于今克受殷之命徂往也御事之下不言少正庶士以大統小也文王昔為西土之君常教戒其臣民文王既終西土非往日之邦君矣而臣民猶能遵用文王之遺教不敢腆於酒文王德教盛行永久不替天所佑助故我用至於今日遂能受殷之命而有天下也王曰封我聞惟曰在昔殷先哲王迪畏天顯小民經德秉哲自成湯咸至于帝乙成王畏相惟御事厥棐有恭不敢自暇自逸矧曰其敢崇飲殷先哲王謂湯迪畏猶言實畏天顯天道之顯明經常秉持哲者德之明也成王守成之王畏相敬畏之相相謂輔弼師保在王左右者也棐有恭猶內則言不有敬事崇猶崇酒之崇過飲而崇足也言湯畏天畏民明德日新自湯以後之成王畏相及治事之卿大夫雖平居燕息之時非有所恭敬之事猶且憂勤不敢自閒暇逸樂況敢過飲乎越在外服侯甸男衛邦伯越在內服百僚庶尹惟亞惟服宗工越百姓里居罔敢湎于酒不惟不敢亦不暇惟助成王德顯越尹人祗辟外服邦國之諸侯侯甸男衛舉四服以包其餘邦伯邦君及其州牧也內服都鄙之臣百僚庶尹都鄙之庶士周官所謂殷也亞都鄙之大夫周官所謂伍也服都鄙服官政之卿周官所謂兩也宗工王朝公卿大夫及王子弟之食采邑為大宗者都鄙之長也百姓里居民之居於閭里者尹人邦國都鄙之尹其民者辟法也承上文言不止殷王與公卿大夫不敢崇飲外而邦國諸侯內而都鄙羣臣下而閭里百姓皆無敢湎於酒者臣勤其職民勤其業亦無暇於飲也為臣但知助成王之明德為民但知助尹人之祗敬奉法而已我聞亦惟曰在今後嗣王酣身厥命罔顯于民祗保越怨不易誕惟厥縱淫泆于非彞用燕喪威儀民罔不䀌傷心惟荒腆于酒不惟自息乃逸厥心疾狠不克畏死辜在商邑越殷國滅無罹弗惟德馨香祀登聞于天誕惟民怨庶羣自酒腥聞在上故天降喪于殷罔愛于殷惟逸天非虐惟民自速辜亦惟曰繼上文惟曰而言後嗣王紂也酣身酣酒於身也言其命令之出無能明於民之當祗保及民怨之不易弭縱恣意也淫沈溺也泆放失也燕褻慢也衋痛意息止也大惟其縱意以淫泆於非彞用燕喪其威儀民無不䀌然傷心悼其將亡者紂惟荒亂腆厚於酒更不自止息乃肆為逸豫商邑王畿千里之內殷國天下諸侯之國罹憂也其心忿疾狠戾不克畏死其罪積聚在商邑及殷之侯國得罪於畿內之民天下之民雖至於滅亡而不以為憂德馨香祀以德之馨香祀神也民怨庶羣自酒謂民所以怨皆紂與其羣臣自酒而召怨也天不聞其以德感格於神之馨香但聞其與羣臣自酒召怨於民之腥穢天降喪而不愛之者惟以其逸豫故也蓋天非虐惟民自速其罪民猶人指紂而言速召也王曰封豫不惟若兹多誥古人有言曰人無於水監當於民監今惟殷墜厥命我其可不大監撫于時撫猶以手案循而視之也我不惟如此多誥所以詳言湯及紂之事者蓋以古人有言謂人無於水而監水能見形之妍醜而已當於人而監則其得失興亡可知今殷人自速辜既墜命矣我其可不大監視於是乎豫惟曰汝劼毖殷獻臣侯甸男衛矧太史友內史友越獻臣百宗工矧惟爾事服休服采矧惟若疇圻父薄違農父若保宏父定辟矧汝剛制于酒劼毖勤力戒勑而使敬畏也獻臣侯甸男衛之賢臣封為諸侯者當時侯國多承殷之舊也案周官太史掌邦之六典八法八則內史掌王之八柄之法此太史友內史友乃殷時太史內史之官廢居紂都康叔與為賓友者獻臣百宗工皆殷賢臣之不仕者爾事服事於爾者大夫也服休職之優間者服采職之繁劇者若疇汝之疇類三卿也圻父司馬薄迫也司馬掌封圻薄伐愆違農父司徒也司徒掌農事順保萬民宏父司空也宏宫室之宏司空定度地居民之法故曰定辟矧汝句絶先劼毖殷民之為諸侯者次及殷臣之為賓友不仕者然後及康叔之臣自卑而尊然後及康叔之身而總戒之曰凡殷之臣及汝之臣及汝之身皆當剛制於酒厥或誥曰羣飲汝勿佚盡執拘以歸于周豫其殺又惟殷之迪諸臣惟工乃湎于酒勿庸殺之姑惟教之有斯明享乃不用我教辭惟我一人弗恤弗蠲乃事時同于殺誥告字通用飲不羣則不久亦未至於荒敗惟羣飲則酗矣周京師也其者未定之辭諸臣衆臣官之卑者工宗工官之尊者蠲除也其或有人告汝之臣羣聚飲酒汝勿縱失盡執拘以歸於京師豫當詳其罪可殺者殺之若殷家所迪之衆臣及宗工湎酒者豫勿用殺之姑惟教之其有從斯教者則褒顯之使明享其報以示勸乃或不用我教辭不恤我一人不蠲除其湎酒之事是則同於殺前兼戒民臣至此則略於民而獨詳於臣者蓋臣者民之師表臣正則民正矣王曰封汝典聽朕毖勿辨乃司民湎于酒辨使也汝常主聽我誥毖之言勿使爾司民之官湎於酒梓材案召誥言甲子周公乃朝用書命庶殷侯甸男邦伯疑此篇即其命侯甸男邦伯之書也召誥召公率諸侯陳幣而有進戒之辭蓋所以答此篇之意故此篇列於召誥之前若其命庶殷之書則多士是也列於洛誥之後者蓋周公獻卜之事在命庶殷之先也吳氏曰此書設諭者三不於其先其次取之而獨取其後梓材名篇不可考矣惟三月哉生魄周公初基作新大邑于東國洛四方民大和會侯甸男邦采衛百工播民和見士于周周公咸勤乃洪大誥治哉生魄望後也基始營作四方民諸侯各以其國之民來赴役者也營築勞事民之至者乃大和猶文王作靈臺而庶民子來也會五服諸侯以時見之禮相見也周制侯甸男邦采衛蠻夷鎮藩九服獨舉上五服者以蠻夷鎮藩皆夷狄也男下有邦字以男居五服之中舉中則五服皆有邦可知百工周公官屬播鼓動之意見猶論語從者見之之見士諸侯之士率其民者也勤謂勞撫之成王七年三月望後周公新作洛邑而赴役之民皆大恱周公于是以會禮見五服諸侯百工又因民之恱而鼓動之雖士之微亦使得見而周公皆撫勞之因大誥以王居洛邑治民之意也舊本此一節誤在康誥篇首而康誥內一節誤冠此篇之首蓋互錯一簡也蘇氏移此一簡於洛誥篇首者非是蓋與彼文意不相聯貫又詳彼處即無缺簡不待補也惟吳氏說得之今附見篇末王啓監厥亂為民曰無胥戕無胥虐至于敬寡至于屬婦合由以容王其效邦君越御事厥命曷以引養引恬自古王若茲監罔攸辟此以下疑即周公告侯甸男邦采衛之辭然文闕不可復考存者亦顛倒失次今姑據其存者略為叙正而釋其義啓開監侯國也敬當作矜與鰥同屬對長而言謂其子弟婦對夫而言謂長與屬之妻辟偏邪也謂王之所以開置監國為治民也其命監之意蓋曰無相與戕殺虐害其民雖至於鰥寡窮民及其家之屬與婦皆合聚由是以容蓄之王之所以責效侯國之君及其御事之臣者其命何以哉惟欲引長斯民生養安恬之道而已自古王者皆如此故其所立之監皆能遵上意而無有偏邪也皇天既付中國民越厥疆土于先王今王惟曰先王既勤用明德懷為夾庶邦享作兄弟方來亦既用明德后式典集庶邦丕享先王文王武王也皇天既付與中國之民及其疆土於先王今王之意惟曰先王既勤於用其明德以懷撫為已夾輔之諸侯俾庶方之來享者皆作而起兄弟之國方方而來矣亦既用其明德能使羣后之式用典章者皆聚集而庶邦無不來享者矣享言同姓之國丕享並言異姓之國肆王惟德用和懌先後迷民用懌先王受命惟曰若稽田既勤敷菑惟其陳修為厥疆畎若作室家既勤垣墉惟其塗墍茨若作梓材既勤朴斫惟其塗丹雘迷民商之頑民也先謂紂之民後謂紂之遺民復與武庚為亂者故曰先後迷民先王受命謂先王受天所命之民也言今王但當如先王之用其明德以和恱商家先後之迷民又用以慰恱周家先王之受命民也迷民專指殷民遷洛者而言受命泛指四方諸國之民而言稽治敷廣菑芟去草棘陳列修治疆畔畎通水渠也塈仰泥茨蓋也梓良材可為器朴粗治之也斫精治之也丹赤石雘采色之名言先王用德以懷諸侯已如稽田之敷菑作室家之垣墉作梓材之朴斫矣今惟當用德以成其終如陳修而為疆畎塗之以塈而茨之塗之以丹而雘之也故宅洛邑土中以賔四方諸侯者蓋為此耳己若茲監惟曰欲至于萬年惟王子子孫孫永保民若茲言如上文所云也諸侯之君自今以往咸願周之王業至於萬年之久俾王之子子孫孫長保其民而已吳氏曰此篇庶邦享作兄弟方來庶邦丕享之類與四方民大和會侯甸男邦采衛百工播民和見士於周之意若相始終王啓監以後若洛邑初成諸侯畢至之時周公進戒之辭曰中國民亦謂徙居於洛在天地之中也其曰若稽田作室家作梓材皆為作洛而言欲其克終也召誥春秋左氏傳曰武王克商遷九鼎於洛邑史記載武王之言曰我南望三途北望嶽鄙顧瞻有河粵瞻洛伊毋逺天室營周居於洛邑然則武王固欲宅洛矣周公相成王成武王之志此時召公先至經始周公繼至成終庶殷之民舊遷在洛者諸侯之民新來赴役者同力輸作營洛功畢周公歸鎬而召公率諸侯作書致誥以答周公甲子誥治之辭並以告庶殷御事俾與聞之所謂公事公言之也而因周公之歸以達於王召公所誥故曰召誥蔡氏曰其書拳拳於厯年之久近反復乎夏商之廢興以諴小民為祈天命之本疾敬德為諴小民之本一篇之中屢致意焉古之大臣其為國家長逺慮蓋如此惟二月既望越六日乙未王朝步自周則至于豐惟太保先周公相宅二月成王十七年之二月日月相望謂之望或十五日或十六日或十四日既望望後一日也若十六日既望則乙未二十一日也周鎬京也豐去鎬二十五里文武廟在焉王至豐以宅洛之事告廟也太保召公也告廟召公乃先周公往洛以相宅越若來三月惟丙午朏越三日戊申太保朝至于洛卜宅厥既得卜則經營越若發語辭來猶來年來日之來承上二月而言故云來三月丙午三月三日也月三日明生始出西方謂之朏戊申五日也卜宅用龜卜宅都之地也得卜卜而吉也經營規度城郭塗巷廟社朝市寢室之位也越三日庚戌太保乃以庶殷攻位于洛汭越五日甲寅位成庚戌七日也庶殷殷之衆紂都之民遷在洛者就役之也攻治也甲寅十一日也位成左祖右社前朝後市等位置已定也召公之攻位但用殷民不用周民何也蓋洛邑畿內之民不征其力諸侯四方之民又未至洛惟殷民遷在洛者可役而攻位之攻力亦省且易故也若翼日乙卯周公朝至于洛則達觀于新邑營越三日丁巳用牲于郊牛二越翼日戊午乃社于新邑牛一羊一豕一若發語辭翼在身旁故在旁之日謂之翼甲寅之次日乙卯也達觀遍觀也召公已成位周公至則遍觀新邑所營之位丁巳十四日用牲於郊祭告天也郊用特牲配以后稷故牛二戊午十五日社於新邑祭告地也祭社用太牢故牛羊豕各一此蓋就洛邑新立之郊社為成王告作洛於天地而周公攝行其事告畢然後興功也不告先王者王已在豐告廟矣於時洛邑宗廟未成故至十二月始蒸祭宗廟也遣使告卜於王疑在祭告天地之後越七日甲子周公乃朝用書命庶殷侯甸男邦伯厥既命殷庶庶殷丕作甲子二十一日也用書命庶殷者多士之書是也命侯甸男邦伯者梓材之書是也梓材言五服此言三服者省文互見也伯州牧也庶邦冢君咸在而統於伯也丕作言皆趨事赴功也殷之冢民且樂於效力周之友民可知矣恱以使民民忘其勞其斯之謂與或問至此始言庶殷丕作何也曰周公未至洛之前召公以庶殷攻位用其力者五日矣及周公至洛而諸侯之民皆至考之前篇自哉生魄而基作凡治城郭宫室蓋四方太和之民少休殷民之力至此亦已五日故於其朝用書命殷庶既命而遂丕作自是之後在洛之民與四方之民同輸力役以至於畢功其勞逸之均也如此太保乃以庶邦冢君出取幣乃復入錫周公作洛功成周公將歸宗周召公與庶邦君咸在公所出謂自公所出外復入謂自外入至公所也錫與也召公率諸侯出而取幣復入而與周公因公歸以獻於王蓋以慶洛邑之成也曰拜手稽首旅王若公此召公與庶邦冢君言也旅陳也猶庭實旅百之旅蓋贊之拜送幣而陳獻於王與公也誥告庶殷越自乃御事此召公與殷之長民者言也御事商之舊臣長其民而同遷於洛者此篇召公陳戒之辭蓋與庶邦君同辭以答前日周公命書之意因公歸以達於王而俾遷洛之殷人與聞之故曰誥告庶殷越自乃御事謂告殷民而又自其長以達於民也嗚呼皇天上帝改厥元子兹大國殷之命惟王受命無疆惟休亦無疆惟恤嗚呼曷其奈何弗敬此下皆召公與周公言而以告王也殷紂嗣天位為元子殷大國也元子非可廢大國未易亡而天改其命矣我周王今受其命此莫大之美亦莫大之憂也故嘆而言曰曷其奈何弗敬乎甚言不可以不敬也此篇專主敬字而言敬則此心常存動循乎理我不違天而天亦不違我矣所以能保有天命也天既遐終大邦殷之命茲殷多先哲王在天越厥後王後民兹服厥命厥終智藏瘝在夫知保抱攜持厥婦子以哀籲天徂厥亡出執嗚呼天亦哀于四方民其眷命用懋王其疾敬德遐逺也終絶也後王謂紂後民紂之民也後王服天命以有其民後民服天命以戴其君厥終紂之末年也疾猶速也殷亡十有餘年天既久絶其命矣殷先世多有哲王殁而精神在天子孫宜若可恃其佑助而紂之末年賢智隱藏惟病民者在位民困虐政保抱扶持其妻子哀號呼天逃亡而出則又往其亡出之地拘執之無地可容故天亦哀此民而眷命其用懋德者以代殷此周文武所以興也天命惟歸於德今王其可以不疾敬德乎相古先民有夏天迪從子保面稽天若今時既墜厥命今相有殷天迪格保面稽天若今時既墜厥命夏去周之時已逺故曰相古先民天迪從子保謂夏為天所開導從其傳與子而保佑之面稽天若謂所向能考知天意之如此也殷去周之時為近故曰今相天迪格保謂殷為天所開導使之格正夏罪而保佑之禹湯受天眷命不違天意而其後皆墜厥命見天命之無常也今冲子嗣則無遺壽耇曰其稽我古人之德矧曰其有能稽謀自天遺棄壽耇有年壽之老人古人之德如禹湯之敬德稽謀自天謂所謀能考天意如禹湯之面稽天若蓋老成之人既能知古又能知天所當親信也嗚呼有王雖小元子哉其丕能諴于小民今休王不敢後用顧畏于民碞其者期之之辭諴和也後猶後獲後義之後顧回視也碞險也言王雖幼沖乃天之元子年雖幼任則大也其大能和於小民在今可以為休美乎王於今時有不敢後者民心無常有如碞險所當回顧而惕畏也王來紹上帝自服于土中旦曰其作大邑其自時配皇天毖祀于上下其自時中乂王厥有成命治民今休王先服殷御事比介于我有周御事節性惟日其邁來來洛邑也周公歸告洛邑之成王將自來行祭祀朝會之禮也紹上帝代天而繼其志也服行事也土中洛邑居四方之中也旦者君前臣名召公告王故稱周公名也成命天命定而不改也先猶先難後獲之先服化服之也比親也介猶賔介之介節裁抑之也性氣質之性邁行而進也王來洛邑將繼天而自行事於土中周公曰其作大邑於洛其可自是對乎天以主上下之百神而毖祀其可自是宅乎地中以臨四方之諸侯而為治洛邑既成王其有天之成命於此治民在今可以為休美乎王於今時尤有所當先者商之舊臣已遷於洛正欲化服其心使之親近我周之臣薰染變化以矯揉其性之偏而日進於善也王敬作所不可不敬德此一句起下三節謂王當以敬而為其所不可不敬其德我不可不監于有夏亦不可不監于有殷我不敢知曰有夏服天命惟有厯年我不敢知曰不其延惟不敬厥德乃早墜厥命我不敢知曰有殷受天命惟有厯年我不敢知曰不其延惟不敬厥德乃早墜厥命在我不可不監視夏殷之興亡厯年長短在乎天者也我皆不敢知敬德在乎人者也惟不敬德乃早墜命我所知者此耳夏商厯年不為不久召公以為早墜命蓋欲王永命於無窮也今王嗣受厥命我亦惟茲二國命嗣若功今王繼夏殷而受其命在此亦惟以此二國之命而繼其功功謂能敬德而有厯年者不可如其後王之不敬而墜命者也王乃初服嗚呼若生子罔不在厥初生自貽哲命今天其命哲命吉凶命厯年知今我初服宅新邑肆惟王其疾敬德貽遺也哲命以哲而為天所命也王今日來宅新邑乃行事之初譬如生子者在其初生之時服習正事則膺受福祿是命雖在天而以哲獲命則此命乃自己所貽也今日天之所命其亦命其哲者敬德哲也不敬德非哲也故所命或吉或凶厯年或長或短知皆在今我初來行事於宅新邑之時敬德則命以吉而年永不敬德則命以凶而年不永故王惟當疾敬德也肆惟王其疾敬德一語通結上三節與王敬作所不可不敬德一語相終始王其德之用祈天永命此一句起下三節祈求也天命視人心而為去留王用德不用刑則民懷其德而天命永矣雖非有所祈於天然以用德而永命有若祈而得之也其惟王勿以小民淫用非彞亦敢殄戮用乂民若有功非彞猶曰非法勿以小民犯法之故我亦敢於用嚴刑以治之而有功有功謂能勝奸宄也其惟王位在德元小民乃惟刑用于天下越王顯上下勤恤元首也衆體之長也顯明德也上下羣臣有上有下也勤謂勞心恤謂恤刑王之位居民上如元首之於身然不以位長民惟在以德長民故言其惟王之位在於德之元小民而己王德之元小民猶天德之首庶物也乃惟刑用見先德後刑有不得已而用之意刑之不得已而用於天下及王之惟務明德不欲用刑者羣臣奉承此意故若上若下皆勤意於恤刑而不輕用也勤恤猶帝典言欽哉欽哉惟刑之恤其曰我受天命丕若有夏厯年式勿替有殷厯年欲王以小民受天永命其曰者所期如此夏厯年踰四百丕若者期於過之殷厯年踰六百式勿替者期於及之也欲王以小民受天永命一語通結上三節與王其德之用祈天永命一語相始終拜手稽首此四字召公又贊庶邦君同拜也曰豫小臣敢以王之讎民百君子越友民保受王威命明德既拜復更端而言豫小臣召公暨庶邦君也讎民殷民也百君子殷之御事也友民周民也保猶五家為比使之相保之保威命猶言嚴命即命庶殷侯甸男邦伯之命也明德謂王敬德以愛民而祈天者也王末有成命王亦顯我非敢勤惟恭奉幣用供王能祈天永命王於終有成命之時亦顯其德蓋謹始如終不以命既有成而怠於德也我召公庶邦君自我也若我衆臣則非敢曰能勤也惟恭敬奉進幣帛用以供給王期王之能祈天永命而已王末有成命因上文王厥有成命而言顯字勤字因上文越王顯上下勤恤而言恭奉幣因上文取幣旅王若公而言能祈天永命亦因上文而言以結一篇之意洛誥成王在洛蒸祭命周公留後治洛作冊以誥周公故名洛誥而篇首先記周公在洛遣使告卜之事次記成王在洛與周公問答之辭所以具事之始終也周公拜手稽首曰朕復子明辟拜手稽首者記周公遣使之禮曰者周公授使者以告王之辭復猶復逆之復反也報也王命周公營洛遣使反報于王也子親之之辭明辟尊之之辭周公于成王親則兄之子尊則君也故稱之曰子明辟王如弗敢及天基命定命豫乃𦙍保大相東土其基作民明辟豫惟乙卯朝至于洛師及猶言與也基謂創始定謂成終于此新作都邑為基命從此久安長治為定命宅洛所以基命定命也王冝親行而王以幼沖執謙退讓若不敢與知大事然于是周公乃繼召公而往相視洛邑庶幾為王肇始作民明辟之地而周公以二月十二日乙卯之朝至于洛也洛邑在鎬東故曰東土洛師猶曰京師師衆也言可以居衆也我卜河朔黎水我乃卜澗水東瀍水西惟洛食我又卜瀍水東亦惟洛食伻來以圖及獻卜我者謂國家也卜宅乃國家之事非己所敢專故曰我卜召公以二月五日戊申至洛卜宅是也召公既卜宅定位位成周公始至遍觀畢然後遣使以復于王也河朔黎水漢時河北黎陽也澗水東瀍水西東都王城也漢時河南縣瀍水東下都成周也漢時洛陽縣食者龜兆食墨占之吉也薛氏曰食者墨與龜相茹入今卜兆先揚火而後致墨既坼而墨加之則大小微明可知吉凶自此辨澄案龜卜占法今不傳據褚少孫所録在史記龜䇿傳者每一事有一占法各不同疑卜宅之占以兆食墨而明為吉不食則其兆曖昧非吉兆也先卜黎陽不吉乃卜洛邑二處而龜兆皆食其墨也伻使也使來將至所卜地圖及獻所卜吉兆也王拜手稽首曰公不敢不敬天之休來相宅其作周匹休公既定宅伻來來視豫卜休恆吉我二人共貞公其以豫萬億年敬天之休王拜手稽首者成王受周公獻卜之禮也曰者王授使者以答周公之辭匹配也視示同貞猶主也天將休我國家欲俾宅土中而定命周公承天意來相宅于洛所以敬天之休也相洛邑可定宅其休可與宗周鎬京之地相配使來示豫以卜觀卜兆則宅洛之休非但一時之吉乃永久之吉豫與公共當之公既敬天休矣又當以豫敬天休于萬億年之久也所責望于公者逺矣拜手稽首誨言此亦王之辭並受之使者王自謂拜手稽首以答公之誨言也所謂拜手稽首即上文所記受獻卜之禮誨言即謂周公獻卜之辭拜手稽首誨言與後拜手稽首休享文同皆王行此禮又授此辭而使者以達于公也此第一章周公在洛使于王王若曰公明保豫沖子公稱丕顯德以豫小子揚文武烈奉答天命和恆四方民居師惇宗將禮稱秩元祀咸秩無文惟公德明光于上下勤施于四方旁作穆穆迓衡不迷文武勤教豫沖子夙夜毖祀公明保豫公以其明而保我也保猶保傅之保稱丕顯德所謂明也以豫小子揚文武烈奉答天命和恆四方民居師所謂保也和恆非止和于今和于久也居師居洛師也惇敦同猶敦匠之敦宗禮官將猶行也稱秩謂舉行而秩序有功之臣也旁無方所也迓迎也衡平也穆穆迓衡篤恭而天下平也不迷文武所知所行不失文武之道也宅洛者所以發揚先烈順承天眷輯睦民心也公舉其大明之德護衛我以我如此而居于洛此王以宅洛之事功歸于公也今當敦篤禮官舉行大祀雖祀典所無者咸秩敘之而不遺惟公之德其明則光于上下其勤則施于四方有功于天下而無愧于前人既以其明而保豫矣又以其勤而教豫俾豫夙興夜寐毖謹于祀事也此王以毖祀之事求教于公也周公曰王肇稱殷禮祀于新邑咸秩無文豫齊百工伻從王于周豫惟曰庶有事今王即命曰記功宗以功作元祀惟命曰汝受命篤弼丕視功載乃汝其悉自教工孺子其朋孺子其朋其往無若火始焰焰厥攸灼敘弗其絶厥若彞及撫事如豫惟以在周工往新邑伻嚮即有僚明作有功惇大成裕汝永有辭此周公答王請教之辭殷盛也與五年殷祭之殷同齊謂整一之惟命之惟又也汝受命之汝王汝公也乃汝之汝公汝王也朋謂比昵之私彞謂故常之事撫如以手撫循之撫嚮謂心所專嚮明謂精明不眩大謂功業盛大裕謂民生饒裕王始舉盛禮于新邑豫統率百官使從王于宗周豫之心惟曰王將往洛邑行祭禮庶幾各有所事今王即有命曰記録功臣之禮官以有功者與此大祭又有命曰汝周公受我之命篤輔之我大視記功之典籍勿俾有所遺周公既述成王所命而曰汝之命如此悉以自教令羣臣矣案周官有功書于太常祭于大蒸盤庚曰兹豫大享于先王爾祖其從與享之成王將蒸祭故命禮官録有功者而祭之又命周公丕視功載也毖祀之事王既自紹羣臣故周公惟務格王之心王新蒞政于洛其心不可有比昵之私故曰孺子其朋乎孺子其朋乎其往新邑也當杜私心私心之發始雖甚微終必熾盛而不斷絶有如火然當遏之于微也王心既正所謂一正君而國定其如故常之事及新至之事則豫之責也如豫但以在周之百官往新邑使之專邑就職精心作事百官各勝其任以敦其所已大以成其所已裕則汝之休聞永世有辭矣此第二章成王在鎬將往洛邑蒸祭與周公問答之辭王曰公豫小子其退即辟于周命公後四方迪亂未定于宗禮亦未克敉公功迪將其後監我士師工誕保文武受民亂為四輔此成王在洛命公留洛之辭遣使致此辭于公也敉慰撫綏安之意猶下文言寧禮記言康皆謂尊崇賞賚也迪將語辭未詳其義士師工洛邑百工有士者有師者師為大夫文武受民謂洛之民皆文武所受于天之民輔如車輔之輔謂夾輔于其旁漢三輔蓋本諸此成王言我其退歸就君位于周今四方開治之初未定宗人之禮亦未能崇奬公之功公其留後于洛監臨我之士師工大保護文武所受之民治此洛邑以為宗周之四輔周公拜手稽首曰王命豫來承保乃文祖受命民越乃光烈考武王𢎞朕恭此周公拜受王命而許之留洛亦以此文授使者以答王也來者來洛邑承保汝文祖之受命民及汝光烈考武王之受命民此答王誕保文武受命民之言也武王之下不再言受命民者省文恪恭臣事君之職也今又命我治洛是欲𢎞大我事君之恭也孺子來相宅其大惇典殷獻民亂為四方新辟作周恭先曰其自時中乂萬邦咸休惟王有成績前此王未至洛惟召公先相之周公𦙍相之今王初來至洛故言相宅典猶主掌也獻民猶曰良民王來相此洛邑之宅其大敦督主掌在洛之殷民致治而為四方之新君作周家人君恭以禮下者之倡曰者人所期望之言其自是居土中而治非但治殷民兼治四方使萬邦無一不寧是惟王治功之成豫旦以多子越御事篤前人成烈答其師作周孚先考朕昭子刑乃單文祖德多子衆士也豫統率羣士大夫增廣前人已成之烈副答民衆之望為周家人臣信以事上者之倡成我所以昭明乎子之儀刑乃能使王殫盡文祖之德昭猶前篇昭文王昭武王之昭殫謂率而行之無不盡也伻來毖殷乃命寧豫以秬鬯二卣曰明禋拜手稽首休享豫不敢宿則禋于文王武王寧猶敉也秬黍為酒芬香條暢謂之秬鬯所以祼神也以賜公者敬公如神也卣中尊也明潔也精意以享曰禋王使我來洛邑化誨殷民乃有命綏寧我賚以秬鬯二卣命曰此潔而可禋今拜手稽首以賚于公其承此休而享受之周公不敢留以經宿即以禋于文王武王敬之至也惠篤敘無有遘自疾萬年厭于乃德遘遇自周公自己厭飽也言行之無已時也乃文武也周公禋于文武且為自己祝曰願篤敘文武所行庶獲助佑身其康强無有遇己身之疾至于萬年之久飽于文武之德殷乃引考王伻殷乃承敘萬年其永觀朕子懷德又為殷人祝曰願殷人以長壽考王能使之順從即敘至于萬年之久永永觀瞻我王所以懷之之德蓋公既許留洛治殷民故為己與殷民致祝也此第三章後章所謂王命周公後作冊逸誥者冊之所書蓋即此章王曰之辭而逸傳王命以誥周公也或謂此章問答疑在蒸祭之前者非是蓋周公既拜手稽首以受王命矣豈公既受命而始告文武也哉王曰公定豫往已公功肅將祗歡公無困哉我惟無斁其康事公勿替刑四方其世享此周公既許王留洛王遂歸周而與公别也定止也已語辭肅將未詳困猶倦也斁厭也公其止留于此豫往歸宗周已公之功人皆愛敬之王願公留治洛故曰公無倦哉我歸周當無斁其安天下之事公更久留洛無替其儀刑則四方其世世來朝享于周矣公曰已汝惟沖子惟終此周公于王歸宗周之時進教戒之辭也汝年尚幼沖初政今如此矣惟當其終欲王有初有終也汝其敬識百辟享亦識其有不享享多儀儀不及物惟曰不享惟不役志于享凡民惟曰不享惟事其爽侮成王有四方世享之語周公因言當識享上者之誠僞多猶重也儀禮物幣也享之所重者重其禮也禮不足而物有餘雖享猶不享也謂其不用志于享故爾凡民見其如此亦曰雖享猶不享也諸侯無享上之誠則其于事上之事必有差爽侮慢者矣其可不辨之于早察之于微也乃惟孺子頒朕不暇聽朕教汝于棐民彞汝乃是不蘉乃時惟不永哉頒謂頒賜也棐民彞非人之常道所不當為之事也蘉勉也言王若但能頒賜我而不暇聽我教汝不為所不當為之事則是汝不自勉而天命將不永矣篤敘乃正父罔不若豫不敢廢乃命汝往敬哉兹豫其明農哉彼裕我民無逺用戾正父武王也彼謂宗周戾定也篤敘汝父武王之道無或有不如者汝命我治洛我不敢廢棄汝所命今留洛矣汝往歸宗周其敬之哉我留于此其務審知耕農之事以不奪民時汝在彼宗周而饒裕我民則無問遐逺之地皆安定矣蓋邇安則逺安自然而然也王曰公功棐迪篤罔不若時周公教王篤敘乃正父王謂公之功非但開道我以篤敘而已蓋平日無一事不如是教我也此第四章王與周公問答之言蓋在蒸祭之後王將歸鎬之時戊辰王在新邑蒸祭歲文王騂牛一武王騂牛一此以下記成王在洛之事考漢書律厯志成王七年正月乙巳朔大二月乙亥朔小三月甲辰朔大四月甲戌朔小五月癸卯朔大六月癸酉朔小七月壬寅朔大八月壬申朔小九月辛丑朔大十月辛未朔小十有一月庚子朔大閏月庚午朔小十有二月己亥朔大戊辰晦日也蒸冬祭之名歲者適當歲終也騂赤色周尚赤故用騂宗廟禮太牢此用特牛者命周公留後于洛故舉盛禮也王命作冊逸祝冊惟告周公其後作冊者作為冊書也逸史逸也祝讀冊以告神也作冊在祭前讀冊在祭之日冊惟告周公其後謂冊書之辭惟是誥文武以周公留後于洛之事王賔殺禋咸格王入太室祼王賔猶虞賔二王之後來助祭者或曰凡諸侯之君皆曰賔殺殺牲之時禋初祭之時祼酌鬯以享也殺牲初禋之時助祭諸侯咸至及祼獻則王獨入太室之中也王命周公後作冊逸誥王命周公留後亦作冊書載命之之辭逸誥者讀冊以告周公也作冊在祭前祭畢而逸就公所授冊也在十有二月以上事皆在十有二月明戊辰之為十二月之日也書之常法當以日繫月以事繫日此先記日記事後乃記月變例也大戴記公冠篇先載祝辭後乃曰維某年某月上日亦此例惟周公誕保文武受命題上事也此篇自豫小子其退即辟于周以後皆載王命周公留後于洛誕保文武受命民之辭此九字猶禮記文王世子篇文王之為世子章周公踐祚章教世子章並題上事于章後惟七年題上年也雖已題其事未表其年故又記此言此篇所載事辭皆在成王之七年也洪範惟十有三祀表年于篇端也此篇惟七年表年于篇終也此第五章前四章記言此一章記事也書纂言卷四上欽定四庫全書書纂言卷四下元吳澄撰多士士殷之諸臣有位者惟三月周公初于新邑洛用告商王士召誥所謂甲子周公朝用書命庶殷即此篇也王若曰爾殷遺多士弗弔旻天大降喪于殷我有周佑命將天明威致王罰敕殷命終于帝肆爾多士非我小國敢弋殷命惟天不畀允罔固亂弼我我其敢求位惟帝不畀惟我下民秉為惟天明畏周公稱王命以誥謂王之意若曰爾乃殷所遺之多士不幸旻天大降下喪亡之禍于殷我有周為天佑助而命之將奉天之明天之威致王者之罰以督促殷命使終絶于天射取禽鳥曰弋爾衆士當知所以王非我小國之周敢弋取殷之天命乃紂不為天所與天信不堅固保護為亂之人所以弼我而使我受殷命也我豈敢求殷天位而有之哉乃紂不為帝所與而我下民皆秉心以為我民心所歸即天命所歸也或言天或言帝綜錯成文爾非有異也殷命非我敢弋乃天不畀紂而我得之天位非我敢求乃帝不畀紂而我有之畀我者天之明不畀紂者天之威也故總之曰惟天明畏畏與威通我聞曰上帝引逸有夏不適逸則惟帝降格嚮于時夏弗克庸帝大淫泆有辭惟時天罔念聞厥惟廢元命降致罰乃命爾先祖成湯革夏俊民甸四方自成湯至于帝乙罔不明德恤祀亦惟天丕建保乂有殷殷王亦罔敢失帝罔不配天其澤在今後嗣王誕罔顯于天矧曰其有聼念于先王勤家誕淫厥泆罔顧于天顯民祗惟時上帝不保降若兹大喪惟天不畀不明厥德凡四方小大邦喪罔非有辭于罰上既言殷所以亡周所以興此又言夏亡殷興之事以見昔殷之代夏亦如今周之代殷也我聞人言上帝於人君之好逸樂者引而去之有夏之君若禹若啓若少康皆以憂勤合天意而不適於逸則上帝降格眷佑之嚮猶趨向之向謂趨而至也向至於是夏桀不能用上帝之意天不好逸樂而桀乃適逸大淫溺於逸樂而有可罪之辭惟是之故天無復愛念聽聞之遂廢絶其大命降致以罰謂夏亡而桀放也天乃命爾殷士之先祖成湯改革夏之俊民為殷之俊民而甸四方諸國之土地不言改夏民而言改夏俊民蓋謂俊民且歸殷則凡民可知猶孟子言天下之父歸之其子焉往也殷自成湯至帝乙皆能合天之意無不克明其德勤恤祀事蓋人君為神天之主承上下神祗與社稷宗廟然黍稷非馨明德惟馨故祀事以明德為本殷之諸賢君知此故天大建立之為王而保治有殷之國殷王為天所建立亦無敢失帝之意無不益廣其德澤以配合乎天蓋言帝乙以上諸王能順天意以保天下而紂不能然也在今後嗣王謂紂也天意引勉而紂乃適逸是大不明於天之意也況能耳聽心念先王克勤于家之事乎大淫於其逸樂之事泆逸通無能顧視天之顯道與民之當敬惟是之故上帝不保殷而降如此大喪亡之禍天之所不與紂者以紂不明其德故耳因言凡四方小大之國至于喪亡者無非皆有可罪之辭然則紂之亡也亦以有辭于罰而天罰之也王若曰爾殷多士今惟我周王丕靈承帝事有命曰割殷告勑于帝惟我事不二適惟爾王家我適豫其曰惟爾洪無度我不爾動自乃邑豫亦念天即于殷大戾肆不正又呼殷士而與之言謂周所以王以我周王大善承奉上帝之事故上帝有命命之割絶殷命遂告勑殷之事于帝如湯將伐桀用𤣥牡昭告于帝也我于割殷之事應天順人一舉而定不待再適殷都爾乃不明天命所歸既亡復叛使我之用兵遂至于再乃惟爾商王之家召我適爾殷都也其曰者審度之辭武庚之叛乃惟爾大為非度我不先起兵端于爾擾動自爾邑作亂有以招致我之罰前既誅紂後又殺武庚我亦惻然念及天就降于殷以此大災戾故使汝以不正而取諸滅亡之禍也王曰猷告爾多士豫惟時其遷居西爾非我一人奉德不康寧時惟天命無違朕不敢有後無我怨惟爾知惟殷先人有冊有典殷革夏命今爾其曰夏迪簡在王庭有服在百僚豫一人惟聽用德肆豫敢求爾于天邑商豫惟率肆矜爾非豫罪時惟天命承上而言我惟是之故所以遷爾之居而西爾也紂都在洛東自東遷而適西故曰西爾所以遷爾者非我一人奉持其德好勞動爾不安寧爾也是惟天命如此不可違逆我順天命不敢有後後猶緩也爾無怨我爾殷王先世改革夏命為殷有冊書典籍記載其事爾所知也今爾又言殷革夏之後簡拔其人使在王庭有職于百僚今我一人惟有德者聽采而用之爾若有德亦用爾也天邑商言商地舊為天子之都我豈是敢以私意求索爾於天邑之商而遷爾於洛乎豫惟皆矜憫爾欲俾爾習於遜順不為叛亂以保爾之生也遷爾非我之罪是惟天命當如此王曰多士昔朕來自奄豫大降爾四國民命我乃明致天罰移爾遐逖比事臣我宗多遜昔我伐奄而歸之時大降下爾四國民以教命多方之書是也其時殷民未遷既告多方之後見殷民未化遂乃明致天罰移爾於遐逺之地謂遷洛也叛亂之人得免誅戮罪當流徙遷之者乃致天之罰也紂都距洛非甚逺而曰遐逖者以殷民安土之情則為遐逖也遷爾者欲俾爾親比服事臣順于我周多遜之宗薰染以成習也宗謂士大夫之家各有宗以相統王曰告爾殷多士今豫惟不爾殺于惟時命有申今朕作大邑于兹洛豫惟四方罔攸賔亦惟爾多士攸服奔走臣我多遜爾乃尚有爾土爾乃尚寧幹止爾克敬天惟畀矜爾爾不克敬爾不啻不有爾土豫亦致天之罰于爾躬今爾惟時宅爾邑繼爾居爾厥有幹有年于兹洛爾小子乃興從爾遷承上而言今我惟不欲殺汝故惟以是昔日誥多方之命又重言以告爾殷士欲使爾臣順我周而不致殺身也今我所以作大邑于此洛者一則為四方諸侯無所賔貢之地以洛是中土四方來者道里均故營洛以為朝㑹之所二則為爾殷多士遷徙在此就此朝㑹爾習見我周羣臣濟濟相遜爾所服事奔走臣順者皆多遜之人而爾亦化為多遜也蓋洛有二都一以賔諸侯者名東都又名王城所卜澗東瀍西之地是也一以居殷民者名下都又名成周所卜澗水東之地是也殷士化為多遜庶幾於此保有爾之土田庶幾於此安寧如木之幹有所定止而枝葉得以生長也敬者一心謹畏不敢怠忽之謂克敬則循理而致福天所與而矜憐者也不克敬則悖理而取禍是天所罰也不但不能保有爾土亦將不能保有爾身此戒之之辭今爾惟於是立家而安處爾邑於是傳世而繼續爾居有幹謂宅爾邑而基業植立有年謂繼爾居而子孫永久爾後世子孫之興從爾遷洛始此勸之之辭王曰嗚呼猷告爾有方多士暨殷多士今爾奔走臣我監五祀越惟有胥伯小大多正爾罔不克臬自作不和爾惟和哉爾室不睦爾惟和哉爾邑克明爾惟克勤乃事爾尚不忌于凶德亦則以穆穆在乃位克閲于乃邑謀介爾乃自時洛邑尚永力畋爾田天惟畀矜爾我有周惟其大介賚爾迪簡在王庭尚爾事有服在大僚此篇為誥殷多士而作此又普告四方諸國衆士來赴營洛之役者而及殷士之遷在洛者蓋欲諸國之士共聞誥殷士之言也今爾之爾專指殷士殷士之遷洛蓋在成王之三年此時為成王之七年故謂爾奔走臣服於我所立之監已五年矣汝等多士其間亦有衆胥之長與小官之正大官之正各為官長無或不能守法也爾自身所為或猶有怨恨不和之心繼今以後爾惟自變化而和哉非特爾身爾室家之內猶或有陵犯不睦之人繼今以後爾惟變化而和之哉不和不睦謂不肯臣順于周也居爾之邑而能至於光顯由爾能勤其事之所致庶幾無有凶惡之德可忌諱也亦且肅敬在爾之位能臨視於爾之邑而所謀者大矣庶幾自此洛邑可以長保其祿天亦將畀矜於爾我周家亦將大有賜賚於爾簡拔而置之王庭庶幾爾之所事有服其事而至大官者非特保有爾邑土田而已此所謂大介賚也王曰嗚呼多士爾不克勸忱我命爾亦則惟不克享凡民惟曰不享爾若不能勸勉以信奉我之教命是不能奉上而凡為民者亦惟曰汝不奉上矣通前一節王曰嗚呼猷告爾有方多士至此百五十一字舊本錯簡在多方篇今從吳氏胡氏說釐正在此不享之下疑又闕文又曰時豫乃或言爾攸居又曰上舊有王曰二字新安王氏曰王曰之上必有脫簡又曰之下必有脫文不可强釋今案王氏說是也王曰之下脫簡即是誤在多方篇內者既取彼之文補之於此則此王曰二字宜衍今删去又曰蓋承上文惟曰而言述凡民之又曰也豫自民言之豫周王也爾爾殷士也洛邑殷士所居此篇叮嚀告教欲殷士永久安居於洛所謂言爾攸居也凡民又曰是我周王乃或能言爾所居諄切懇至如此非愛爾之深其能然乎爾殷士在下者不能敬上我周王在上者乃能愛下不為必然之辭故曰或無逸成王漸長周公慮其嗜欲萌動故作此書教戒以篇首無逸二字名篇吳氏曰考於君奭立政洛誥諸篇周公於成王皆有沖孺幼小之稱而無逸獨無故知其為最後也周公曰嗚呼君子所其無逸先知稼穡之艱難乃逸則知小人之依相小人厥父母勤勞稼穡厥子乃不知稼穡之艱難乃逸乃諺既誕否則侮厥父母曰昔之人無聞知此篇七更端皆以嗚呼發之重嗟永嘆所以深感動成王也君子小人以位言所語辭也古人盟誓之辭發端皆曰所其者有所指而言無逸者勤勞而無休息也勤勞之事非一而惟小人之於稼穡最為艱難君子於人所勤勞之事首先能知乎此身體盡瘁濕暍備嘗耕種耘穫終歲無有逸時此小人勞逸者之為也君子雖不為之而能知之故乃暇逸之時則能知小人之所倚賴以為生者在此而不敢厚斂多取以困其力也視彼小人其父母勤勞於稼穡而為農家之子乃不服田畝反不知稼穡之艱難故乃暇逸之時猥習俚言既恣為夸誕矣不然則又侮訕其父母曰古老之人無所聞知徒爾自苦也夫勞心以治下者君子也勞力以奉上者小人也周公教戒成王亦欲其勤勞於心耳豈欲其勤勞於力哉然不知小人勞力之事者必不能為君子勞心之事蓋勞心者治人而食於人勞力者食人而治於人居人上者當思我之崇髙富貴凡宮室衣服飲食之奉無一不出於民力彼之勞力以奉我者如此其至也我其可不勞心以治之而使之得遂其生乎故此篇七節自第二節以下皆以勤勞於心者勉成王而篇首獨舉勤勞於力者為先俾王知小人勤勞稼穡之事其善於格君心哉周公曰嗚呼我聞曰昔在殷王中宗嚴恭寅畏天命自度治民祗懼不敢荒寧肆中宗之享國七十有五年中宗大戊廟號嚴恭敬之形于外寅畏敬之主于中自度猶言自律自檢天命在躬易失難保故反躬自省謹循法則惟恐不能永保天命也天人相關知敬天命故亦敬民事以嚴恭治民為祗以寅畏治民為懼平日存心處事皆不敢迷亂怠弛中宗能如此所以能永年也其在髙宗時舊勞于外爰暨小人作其即位乃或亮隂三年不言其惟不言言乃雍不敢荒寧嘉靖殷邦至于小大無時或怨肆髙宗之享國五十有九年髙宗武丁廟號亮隂居喪之名鄭氏讀為梁暗雍和也發言和順當於理也嘉者美之至靖者治安之謂髙宗舊時勞苦於外及與小人逰處起自民間即天子位蓋嘗親歷民事艱難故發言不敢輕易居喪不言禮也然三年之久不出一言聖賢之君未必盡然髙宗獨能如此故謂乃或猶言是或一道也惟不輕言故言發而當前此殷國中衰不可言靖況可言嘉乎髙宗存心處事亦如中宗不敢荒寧遂能中興嘉靖殷國至于或小或大之人咸得其安無于是時而或有怨者髙宗能如此所以能永年也其在祖甲不義惟王舊為小人作其即位爰知小人之依能保惠于庶民不敢侮鰥寡肆祖甲之享國三十有三年鄭氏曰祖甲武丁子有兄祖庚武丁欲廢兄立弟祖甲甲以此為不義逃於民間故曰舊為小人澄案史記武丁崩祖庚立七年而崩祖甲起承帝位以其久在民間于是能知小人之所依用能愛護利澤于衆民雖窮民亦不敢慢忽祖甲能如此所以能永年也自時厥後立王生則逸生則逸不知稼穡之艱難不聞小人之勞惟耽樂之從自時厥後亦罔或克壽或十年或七八年或五六年或四三年自時厥後夏氏以為或自中宗之後或自髙宗之後或自祖甲之後是也耽貪欲自侈之謂言自是三君之後立而為王者生則好耽樂不知農事之艱難是以不聞細民用力之勞而惟一已耽樂之欲是從以此伐性戕生自是以後亦無或能壽者澄案史記中宗之後仲丁十三年仲壬十五年所謂十年者也河亶甲九年陽甲七年所謂或七八年者也髙宗祖甲之後廩辛六年所謂或五六年者也武乙四年大丁三年所謂或四三年者也時成王稍長疑或有狥欲促年之漸故周公丁寧戒之林氏曰此言商賢君止于三酒誥多方多士言自成湯至帝乙罔非賢君蓋與成王言則責其難不如三君之享國則不足稱與商民言則樂道前王之善苟能紹湯之基業而不墜則皆可稱不以辭害意可也周公曰嗚呼厥亦惟我周太王王季克自抑畏不特殷之三王如此周之三王亦然抑者貶損謙下之意將言文王之事故原其家法之所自文王卑服即康功田功徽柔懿恭懷保小民惠鮮鰥寡自朝至于日中昃不遑暇食用咸和萬民文王不敢盤于遊田以庶邦惟正之供文王受命惟中身厥享國五十年卑服猶禹之惡衣服也蓋舉一端而言凡宮室飲食自奉之薄在其中矣康功安民之事田功養民之事徽懿皆美也而徽有糾緊之意懿有淑善之意柔易至于懦徽柔則非不斷之柔恭易至于拘懿恭則非不安之恭惠鮮謂惠利而蘇鮮之使有生意也遑亦暇也重言文王之薄于奉已而厚于養民斯有柔恭之美德平易近民于民之微者則懷保之于民之窮者則惠鮮之然此特一國之民爾紂毒痡四海文王為方伯勤勞政事自早朝不食至于日中或至于日昃猶不暇于食者蓋將用以咸和庶邦之萬民視民如傷望道如未見其勤勞自不能已豈若後世量書傳餐代有司之任者哉盤謂盤旋不已耽其樂也遊謂巡行田謂圍獵遊田有常制文王不敢過也以遊田之簡可知百用之約故庶邦之供貢者惟正數而已于外無一毫之多取方伯長諸侯所統庶邦皆有常供春秋時齊晉稱伯諸侯各有貢物至唐猶有送使之制其所從來舊矣受命謂嗣為諸侯內受命于先君上受命于天子也中身文王九十七而終即位時年四十七中身舉全數也周公曰嗚呼繼自今嗣王則其無淫于觀于逸于遊于田以萬民惟正之供無皇曰今日耽樂乃非民攸訓非天攸若時人丕則有愆無若殷王受之迷亂酗于酒德哉無毋通禁止辭觀謂覽視逸謂宴安或觀以舒目或逸以休身或遊以省方或田以習武四者人君所不能無特不可淫溺于此耳淫於四者則侈費無度必致橫斂四者不淫用有常經而以萬民惟正賦之供萬民畿內之民也正謂九貢九賦什一之制也無暇言曰今日姑且耽樂人始耽樂者曰吾于今日為一日之樂而已是心一流今日而明日或至終身忘返者焉民生在勤天生不息但一日耽樂則非所以訓民非所以若天是人大有愆矣非小失也酒德以酒為德也耽樂之事非一酒德為首故又專以此為戒周公曰嗚呼我聞曰古之人猶胥訓告胥保惠胥教誨民無或胥譸張為幻訓告道說告詔之也有朋友之道焉保惠保護惠愛之也有保傅之道焉教誨模範開曉之也有師道焉譸譎誑也張夸誕也變名易實以眩觀者曰幻古人德業已盛其臣猶且相訓告相保惠相教誨夫如此則視聽聰明是非不惑故民無或敢以誑誕之言而為欺罔也此厥不聽人乃訓之乃變亂先王之正刑至于小大民否則厥心違怨否則厥口詛祝正刑正法也心違怨者怨蓄于中也口詛祝者怨形于外也言成王於此古人胥訓告保惠教誨之事而不聽信則人乃道說之以變亂先王之正法先王之法甚便于民一變亂之則至于或小或大或有違怨於心者矣或有詛祝於口者矣周公曰嗚呼自殷王中宗及髙宗及祖甲及我周文王兹四人迪哲厥或告之曰小人怨汝詈汝則皇自敬德厥愆曰朕之愆允若時不啻不敢含怒知小人之依而或忿戾者不能迪知也殷周四王允蹈所知其或有人告曰小人心怨口詈則皇皇然自敬其德反求諸己不尤其人其所誣毁之愆則安受之曰我之愆信乎若是不但不敢藏怒而已此厥不聽人乃或譸張為幻曰小人怨汝詈汝則信之則若時不永念厥辟不寬綽厥心亂罰無罪殺無辜怨有同是叢于厥身綽大也亂謂不當殺罰而殺罰之罰者不至于殺殺者不止于罰叢聚也言成王于此殷周四王迪哲之事而不聽信人乃或以誑誕無實之言相欺罔而曰小人怨汝詈汝則信之則以為果若是蓋君道尚寬大不長永思念其為君之道不寬綽其心信譸張無實之人不知實無怨詈之事于是羅織疑事刑戮妄亂及于無辜罪之人罪辜互文也向之怨詈設或有之亦不過一二人耳至此則人同怨之是衆人之怨叢于一身也周公曰嗚呼嗣王其監于兹其者期望之意兹者如此以上所陳也君奭召公封於燕留王朝為太保有國故稱君奭其名也武王時太公為太師周公以太傅行冢宰事武王崩武庚叛周公東征三年而歸蓋周公既歸而太公薨周公以太師與召公太保奭左右成王召公欲去周公留之而作此篇周公若曰君奭弗弔天降喪于殷殷既墜厥命我有周既受我不敢知曰厥基永孚于休若天棐忱我亦不敢知曰其終出于不祥不幸天降喪亡之禍于殷殷既墜其命而我有周既受之矣然天命難諶有德則常留無德則旋去孚者以實感以實應也永孚于休命之留也不祥者休之反出于不祥命之去也雖曰我周既受天命然謂其基必可久長我所不敢知也雖曰天非可信然謂其終必至失墜我亦不敢知也呂氏曰自後世之私言之殷之喪周之福也而亦曰弗弔蓋聖賢以天下為心不幸遇喪亂而任此責豈所樂哉嗚呼君已曰時我我亦不敢寧于上帝命弗永逺念天威越我民罔尤違惟人嗚呼君奭歎而呼召公以告之也君已皆一字為句已字義見康誥大誥曰時我承上文言天命去留國祚修短我皆不敢知則臣之事君惟當竭人力以保天命是我之責也然我亦不敢安于上帝之命而不永逺思念天威及我民之無尤無違者惟在於得人也在我後嗣子孫大弗克恭上下遏佚前人光在家不知天命不易天難諶乃其墜命弗克經厯嗣前人恭明德遏絶佚失也先王既受天命為後嗣子孫者若大不能恭承天地之祀事遏佚前人盛德之輝光居深宮之中不知天命之不易保則天命難信乃或至墜失其命不復能經厯久逺而繼嗣前人之恭德明德矣恭上下者前人之恭德光者前人之明德也在今豫小子旦非克有正迪惟前人光施于我冲子又曰天不可信我道惟寧王德延天不庸釋于文王受命施延及也釋解去也在今我小子旦之身非能自有所正於王迪惟前人盛德之輝光可以延及于我冲子又言天命不可信我之道惟以寧王之德必可延長此命故周自文王始受天命傳于至今子孫天不庸釋去之也公曰君奭我聞在昔成湯既受命時則有若伊尹格于皇天在太甲時則有若保衡在太戊時則有若伊陟臣扈格于上帝巫咸乂王家在祖乙時則有若巫賢在武丁時則有若甘盤率惟兹有陳保乂有殷故殷禮陟配天多厯年所又舉商家所以能創業守成中興者皆得大臣為之輔相以見召公未可去也成湯之時其臣有如伊尹能相湯以格于皇天湯雖聖亦賴伊尹之助也湯孫太甲之時其臣有如保衡保衡即伊尹以其保護王躬而天下之事皆取平焉故曰保衡蓋太甲始立是號以尊伊尹而不名太甲孫太戊之時則有如伊尹之子陟與臣扈能相太戊以格于上帝巫咸不及伊陟臣扈亦能治王家之事巫賢巫咸子保衡巫賢甘盤之下不言其事蓋無可指定而言者也陳如陳力之陳陟猶言升遐也禮陟以禮而終謂善終也總言商五君所用此六臣皆有所陳以保乂有殷之國故殷王各保其位以禮善終得配天為王者六百餘年呂氏曰伊尹佐湯以聖輔聖與天無間故曰格于皇天伊陟臣扈佐太戊以賢輔賢克厭帝心故曰格于上帝自其遍覆包含言之謂之天自其主宰言之謂之帝凡書或稱天或稱帝各隨所指此對言之則見聖賢之分天惟純佑命則商實百姓王人罔不秉德明恤小臣屏侯甸矧咸奔走惟兹惟德稱用乂厥辟故一人有事于四方若卜筮罔不是孚百姓王畿之民王人王朝之士也承上文言天惟于商純篤佑助而命之者非特大臣得人而已則以商家實是內而百姓之賤王人之微無不秉執其德明於其所當憂勤之事外而侯國之小臣為藩屏在侯服甸服者與其一切奔走任事之人惟此諸臣惟德是舉用以治其國君之事以此之故凡天子苟有所為于四方辟如卜筮之占無不以實應者公曰君奭天壽平格保乂有殷有殷嗣天滅威今汝永念則有固命厥亂明我新造邦平格謂無一事不與天通也心通乎天必得其壽伊尹而下六臣能相其君以平格于天故能保乂有殷多厯年所至于殷紂亦嗣天位乃驟罹滅亡之威天不壽之者何哉蓋無賢臣輔之以格于天故爾今汝永逺念及此則我周可有堅固不墜之命其能常治而顯明我新造之周邦矣公曰君奭在昔上帝割申勸寧王之德其集大命于厥躬惟文王尚克修和我有夏亦惟有若虢叔有若閎夭有若散宜生有若泰顛有若南宮括又曰無能往來兹迪彝教文王蔑德降于國人亦惟純佑秉德迪知天威乃惟時昭文王迪見冒聞于上帝惟時受有殷命哉呂氏曰割裁也澄案禮記緇衣篇引此割申勸寧王作周田觀文王今詳割字無義周字疑當作用田觀當從書作申勸寧王當從禮記作文王申重也再三丁寧之意勸猶褒賞之也言天意用以厚報文王之德所以集大命于其躬修謂完備無所虧缺修和猶曰咸和虢國叔字文王弟閎散泰南宮皆氏夭宜生顚括皆名蔑無也文王之心求賢如不及視民如傷雖有五臣為助而其心歉然又言無能往來於此而導迪常教者德已及民而自視猶若無德及於國人聖人之不敢自足者如此亦惟天篤佑我周家秉德迪知天威之臣乃能於是而顯其君使其德著見上聞于上帝故能于是而受有殷命也武王惟兹四人尚迪有祿後暨武王誕將天威咸劉厥敵惟兹四人昭武王惟冒丕單稱德武王時虢叔已死死者曰不祿四人猶及武王之世故曰尚迪有祿劉殺也謂誅紂及其黨單盡也四臣能顯其君使遍覆包含大盡其所稱舉之德林氏曰文武佐命元功多矣獨稱虢叔等五人者豈其逮事王季遂及文武耶伊尹事湯又事太甲伊陟乃尹子臣扈非湯舊臣即殷世臣巫咸巫賢世為大臣甘盤小乙舊臣以遺武丁周公所舉皆世臣舊德故武丁世不及傅說文武世不及太公今周公與召公正如殷之六臣文武之五臣豈可去乎在今豫小子旦若遊大川豫往暨汝奭其濟小子同未在位誕無我責收罔勗不及耉造德不降我則鳴鳥不聞矧曰其有能格游浮水也當此重任若游大川豫之往也與汝共游其思所以濟我而至于岸周公居東時召公專任國事今周公雖已歸而在位然謂召公今日任事當同于昔日我未在位之時大無諉責于我而欲去造猶修為也鳴鳥鳯也時周方隆盛鳴鳯在郊召公若收斂而去無以勗我之所不及耆老退處自修其德而德不降下于民則我不能保今日之盛在郊之鳯將不復鳴況曰能格于天乎公曰嗚呼君肆其監于兹我受命無疆惟休亦大惟艱告君乃猷裕我不以後人迷周公厯述殷周世臣又歎而言令召公監視于此者以我家受命為天子固有無窮之休祥然天命未易保亦有至大之艱難我告汝以豫心所謀汝當有以禆益我使我不以文武之後人昏迷于永保天命之道也公曰前人敷乃心乃悉命汝作汝民極曰汝明勗偶王在亶乘兹大命惟文王德丕承無疆之恤此前人指武王偶猶配也夫與妻為偶君與臣為偶乘載也猶負荷也承猶當也周公與召公同受武王顧命輔成王故言前人宣布其心悉以命汝俾汝位三公作汝民之極其意曰汝當明勉輔所偶之王在今誠宜負荷此武王當日之大命惟率循文王之德以當此無窮之憂責其可求去乎公曰君告汝朕允保奭其汝克敬以豫監于殷喪大否肆念我天威豫不允惟若兹誥豫惟曰襄我二人汝有合哉言曰在時二人天休滋至惟時二人弗戡其汝克敬德明我俊民在讓後人于丕時嗚呼篤棐時二人我式克至于今日休我咸成文王功于不怠丕冒海隅出日罔不率俾告汝以豫中心之誠實汝克敬謂不敢怠忽也以我監視于殷之喪亡大否者我念天威之可畏不但是中心如此多誥而已豫惟曰勤力輔治者我二人也襄字義如臯陶謨襄哉之襄汝之見有合于此則亦當曰在是二人也若曰今日天之休命滋至功業日隆福祿日增惟是二人將弗能勝其在汝惟能不怠忽于德益加抑畏明揚賢俊之人布列于位若他日治功大成之時汝乃可告于嗣王辭遜而去今則未可也又嘆而言若非是二人則我周用能至于今日之休美乎我等皆當同心協力終始不怠以完成文王治天下之功大所覆冒雖海隅出日之地亦無不屬吾之使令者如此方為丕時公曰君豫不惠若兹多誥豫惟用閔于天越民言豫不但惠順于汝而若此多誥豫惟用憂天命人心之不常所以拳拳留汝輔治也公曰嗚呼君惟乃知民德亦罔不能厥初惟其終祗若兹往敬用治惟汝諳歷之久能知民之德人亦無不能于其初者惟當于其終而如其初汝其敬順此所誥之言往而敬用以治事上章言天命民心民心又天命之本故卒章專言民德篇內後嗣子孫冲子後人皆謂成王小子皆周公自稱多方孟子曰周公相武王誅紂伐奄討其君驅飛廉於海隅而戮之滅國者五十書序曰成王東伐淮夷遂踐奄奄東方之國蓋與淮夷相近武王崩奄及淮夷徐戎與武庚同叛周公東征之二年誅武庚其時伯禽在魯征徐伐奄及淮夷雖為魯所遏不得猖獗然未及聲罪致伐吳氏曰周公東征三年而歸明年奉王東伐淮夷遂踐奄還歸於豐而作多方及營洛邑成周而作多士澄案吳氏說與胡氏皇王大紀同今書多士在多方之前者失其次也多方之書蓋以伐奄而還有俘囚之民與東方諸侯偕至宗周者既不誅戮俾教告之而復遣之歸仁之至也孟子所謂伐奄戮飛廉滅國五十疑皆此時之事不與相武王誅紂同時也惟五月丁亥王來自奄至于宗周五月蓋成王三年之五月宗周鎬京也周公曰王若曰猷告爾四國多方惟爾殷侯尹民我惟大降爾命爾罔不知洪惟圖天之命弗永寅念于祀此時王與周公同在鎬京止稱王若曰恐疑為王之自誥故先稱周公曰而後稱王若曰以見王不親臨而周公傳王命以告也大誥亦是周公以王命誥而直稱王若曰者以其時王居憂周公攝政出征非王自誥可知故不稱周公曰也四國謂四方諸國多方謂諸國之民非一處也惟猶及也殷侯尹民殷諸侯之尹其民者正謂誥民而因及其君也降下命誥命也圖計度也天命已去商知大度乎此則必不徼覬以謀興復恭順事上可保祭祀長敬念乎此則必不叛亂以取誅滅惟帝降格于夏有夏誕厥逸不肯戚言于民乃大淫昏不克終日勸于帝之迪乃爾攸聞厥圖帝之命不克開于民之麗乃大降罰崇亂有夏因甲于內亂不克靈承于旅罔丕惟進之恭洪舒于民亦惟有夏之民叨懫日欽劓割夏邑天惟時求民主乃大降顯休命于成湯刑殄有夏惟天不畀純乃惟以爾多方之義民不克永于多享惟夏之恭多士大不克明保享于民乃胥惟虐于民至于百為大不克開乃惟成湯克以爾多方簡代夏作民主愼厥麗乃勸厥民刑用勸以至于帝乙罔不明德慎罰亦克用勸要囚殄戮多罪亦克用勸開釋無辜亦克用勸今至于爾辟弗克以爾多方享天之命周之代殷猶殷之代夏也故先舉夏亡殷興之事次及殷亡周興之事以喻殷民使之知天命也戚憂言語辭淫昏謂沈溺迷惑勸勤勉之意帝之迪謂天道開通悟也麗民所依也甲始也旅祭名周官有大故則旅上帝靈承于旅猶曰靈承帝事也進之恭猶曰日躋之敬也舒緩叨貪懫忿日欽謂孜孜為惡猶孜孜為善者之敬也劓割謂傷害之夏邑畿內之民也享饗通謂歆受而有之也恭多士桀以為恭而任之者也簡者閲視選擇之意夏之盛時帝降格于夏而眷佑之有道桀大其縱逸不肯憂民之憂大為淫昏而不能一日勸勉于帝之迪此乃爾所素聞善圖帝命者惟得民心則天命固矣桀則不然其圖帝之命也不能通悟民之所依故天降罰而增崇其亂于有夏國之治者天福之也國之亂者天罰之也桀之亡因始于其家國之亂遂至失天下而不克靈承上帝之祀事蓋以桀無能日躋其敬以寬裕其民乃惟日務貪虐以傷害其民桀既不君天惟于是求其可以為民主者而大降光顯休美之命于成湯俾伐夏而絶其命惟天不與桀故不能以爾多方之義民永久多年享而有之民之於君以義合天與之則能有其民天不與則不能有其民矣故曰義民非特桀一人為虐夏之多士亦大不能明而保享其民乃相與共虐其民至于凡百所為皆不能通悟于保享其民之事惟湯能以爾多方之民為臣所簡選以代夏而為之主蓋湯心謹慎惟恐民失其依故乃勸勉加意於其民尤於刑而加意由湯至于帝乙三十一君無不明其德以導民慎其罰而不輕亦能加意于獄訟要囚之人要囚之中又有分别其多罪者殄戮之亦能加意而非失入其無辜者開釋之亦能加意而非失出湯後諸王皆能如此今至于爾君紂乃不如此所以亡國而不能以爾多方享有天命也嗚呼王若曰誥告爾多方非天庸釋有夏非天庸釋有殷乃惟爾辟以爾多方大淫圖天之命屑有辭乃惟有夏圖厥政不集于享天降時喪有邦間之乃惟爾商後王逸厥逸圖厥政不蠲蒸天惟降時喪惟聖罔念作狂惟狂克念作聖天惟五年須暇之子孫誕作民主罔可念聽天惟求爾多方大動以威開厥顧天惟爾多方罔堪顧之惟我周王靈承于旅克堪用德惟典神天天惟式教我用休簡畀殷命尹爾多方周公又更端而言先自歎而後稱王命以告爾辟承有夏有殷之文兼言桀紂屑輕小之意不集于享謂諸侯離心不能合聚之使來朝享也有邦謂商問猶伐也蠲潔也詩曰吉蠲為饎蒸冬祭名不蠲蒸若所謂昏棄厥祀弗答也聖謂明智狂謂昏惑五年當時蓋有所指今不可考須待也暇寬暇也之子孫猶之子于歸之之念聽謂有善可愛念而徹天之聽也動謂警發之顧乃眷顧之顧堪可勝也教謂若天啓其衷也夏殷之亡非天釋去之皆其自取惟桀紂有爾多方而大淫于惡以圖天之命一一皆有可罪之辭既總言之以下又分言桀紂然于夏則降時喪之下惟有邦間之一句于商則降時喪之下自惟聖罔念至尹爾多方纍十餘句蓋前一節言夏已詳而言殷猶略故于此一節略于夏而詳于殷也明智之人一不念則即為昏惑昏惑之人一克念則即為明智故紂雖極惡未嘗不可改而善也自武王克商之年追數五年之前紂惡已極商已當亡然天以其為商先王子孫故須待寬暇未遽亡之猶冀其能改可作民主及五年之久紂卒無一善之可念聽天于是求民主于四方諸侯大動以譴告商紂之威開悟爾多方之國顧有可勝天之眷顧者而爾多方又無可勝眷顧之人惟我周王善奉皇天之祀克用其德遂令為神天之主天實教我而用休美之命以休之簡選而畀之以殷命使尹爾之多方也今我曷敢多誥我惟大降爾四國民命爾曷不忱裕之于爾多方爾曷不夾介乂我周王享天之命爾曷不惠王熙天之命爾乃迪屢不靜爾心未愛爾乃不大宅天命爾乃屑播天命爾乃自作不典圖忱于正爾乃惟逸惟頗大逺王命則惟爾多方探天之威我則致天之罰離逖爾土今爾尚宅爾宅畋爾田我惟時其教告之我惟時其戰要囚之至于再至于三乃有不用我降爾命我乃其大罰殛之非我有周秉德不康寧乃惟爾自速辜夾左右輔之也介相助也乂猶用乂厥辟之乂惠順也熙光顯也播棄也不典逆理亂常也圖忱于正謂圖復商也大逺猶曰大逆也逺者違去也離逖爾土謂離去所居逺徙它處也上文言商之亡周之興皆天命謀復商者不知天命也所以不容不以言解惑今我曷敢多言以告我惟大降下爾四國之民以教命也爾多方何不誠心以利益于爾乎何不輔助我周王享有天命乎何不惠順我王光顯天命乎爾乃導迪至屢而尚不安靖爾心未能自愛乃大不安天命乃輕棄天命乃自為逆亂圖欲使已亡之國誠得再居天下之正乃惟縱逸頗僻大逆王命則惟爾多方探取天之禍我則當致天之罰徙逺爾所居之土我周仁厚未忍遽流放爾今爾庶幾得以如舊保有爾之田宅我惟於是而教告汝我惟於是而戰汝之國訊汝之罪俘汝之身以至于此略示懲戒既不殺汝而復使汝歸宅汝之宅田汝之田若至再至三又不用我所降之教命我乃大罰殛汝罰即上文天罰之罰殛猶殛鯀之殛謂遷徙流放也至此之時非我有周所秉之德不能安寧乃汝自召此罪多方蓋是徐奄淮夷及所滅五十國之人從殷以叛者罪當流放今但告之曰離逖曰罰殛而未忍刑之其後多方之民卒免遷徙惟紂都之民懷商之念深慮其不靜故于是年遷洛所遷者紂都之民非多方之民也王曰我不惟多誥我惟祗告爾命又曰時惟爾初不克敬于和則無我怨我非是多誥惟敬告爾以教命而已又言是惟爾之一初乃爾去惡從善改舊為新之時若自今以後不能敬行和睦之道猶復乖戾則自砥于罰無我怨也立政立政謂建立政事之人猶曰知政執政也唐虞之百揆周之冢宰後世之丞相是也篇內官職非一而獨取此二字名篇以其為衆職之首也成王歸自伐奄周公教以用人之道官制猶因殷夏之舊蓋其時制作未定未有周官六典也周公若曰拜手稽首告嗣天子王矣用咸戒于王曰王左右常伯常任凖人綴衣虎賁周公曰嗚呼休兹知恤鮮哉常以有常德之人居此官也伯長民者也文武時召公為伯而宣化于外蓋其職也任任事者也文武時周公為宰而秉政于中蓋其職也凖人掌法之官刑法當如凖之平故曰凖人綴衣幄帳也如幕人掌次之類虎賁衛王者如虎賁氏旅賁氏之類周公率羣臣進戒于王而贊之曰拜手稽首告嗣天子王矣羣臣用皆進戒而曰王左右之臣有長民者有任事者有平法者有居而張設者有行而護衛者皆不可不謹選其人周公不待其辭之畢於王前嘆美羣臣所戒謂美哉斯言也然能以五官不得其人為憂者鮮哉前周公若曰公與羣臣言也後周公曰公與王言也古之人迪惟有夏乃有室大競籲俊尊上帝迪知忱恂于九德之行乃敢告教厥后曰拜手稽首后矣曰宅乃事宅乃牧宅乃凖兹惟后矣謀面用丕訓德則乃宅人競强也迪知忱恂真實知之信之也九德之行見臯陶謨面猶向也訓順也古之人惟有夏之君乃當王室大强之時而求賢以事天有真知實能九德之行者乃敢告戒其君先致其尊敬而曰拜手稽首后矣復盡其忠愛而曰得人以居是三者之官斯可以為后也然謀度其人而向之者必其大順于德乃可以為居是官之人兹乃三宅無義民桀德惟乃弗作往任是惟暴德罔後承上文言此夏桀之時居三官者皆無善人蓋由桀于有德之人弗以為往昔所任而棄之所任者惟暴德之人所以喪國而無繼嗣也亦越成湯陟丕釐上帝之耿命乃用三有宅克即宅曰三有俊克即俊嚴惟丕式克用三宅三俊其在商邑用協于厥邑其在四方用丕式見德嚴惟猶曰恭惟嚴惟丕式四字並發語辭湯自七十里升為天子大能理上帝之明命用以居是官之人無不稱其位未居其官而言其有才者無不稱其人所任得人故王畿千里之民皆和睦四方諸侯之國皆見其所任之為有德嗚呼其在受德暋惟羞刑暴德之人同于厥邦乃惟庶習逸德之人同于厥政帝欽罰之乃伻我有夏式商受命奄甸萬姓羞刑進任刑戮者同厥邦謂共涖侯國庶習逸德羣衆相習為縱逸者同厥政謂共治王事奄謂包覆而有之甸謂井牧其地以授民紂於有德之人泯昏而不能明惟與羞刑暴德之人共國庶習逸德之人共政上帝敬致其罰乃使我周有此諸夏用商所受之命而奄甸其萬姓萬姓者商之受命民而今為周所有也亦越文王武王克知三有宅心灼見三有俊心以敬事上帝立民長伯立政任人凖夫牧作三事虎賁綴衣趣馬小尹左右攜僕百司庶府大都小伯藝人表臣百司太史尹伯庶常吉士司徒司馬司空亞旅夷微盧蒸三亳阪尹三宅居其位克知其心者知其能官也三俊有其才灼見其心者見其可用也得人以治天職可當天心矣所以敬事上帝也立民如立之斯立之立謂植民之生也立民之長伯常伯也即夏之宅乃牧在帝朝則四嶽統十二牧是也立政之任人常任也即夏之宅乃事在帝朝則百揆統九官是也凖夫凖人也即夏之宅乃凖在帝朝則臯陶作士是也夫下牧字衍夏氏曰凖夫牧謂凖夫不專任法以仁政牧民為事也今詳立民立政二官大臣也職位相等凖夫掌刑之一職耳以民命為重故與二官並而曰作三事趣為掌養馬左車左右車右攜持也攜僕執轡御車者也官之所居曰府庶府衆官府也大都都鄙之逺者除食邑采地外為公邑王使大夫治之庶府非一其賤者又有藝人焉藝伎也醫卜之類大都最逺其近者又有表臣焉表外也郊外治公邑之臣也虎賁綴衣趣馬之下言小尹庶府大都之下言小伯皆其屬也左右攜僕藝人表臣之下言百司該其餘也太史掌六典八則八法不可雜于衆職之中故特出於後而其下文繼之以尹伯該其屬總之以庶常吉士該其餘司徒司馬司空諸侯之三卿亞者大夫旅者衆士三卿王所命大夫士亦以名達于王者歟夷微盧蒸夷蠻之國蒙北亳穀熟南亳偃師西亳阪險也夷蠻小國前代故都及險要之地皆以王官為之尹此言文武之時大小內外之官皆得人也文王惟克厥宅心乃克立兹常事司牧人以克俊有德文王罔攸兼于庶言庶獄庶愼惟有司之牧夫是訓用違庶獄庶愼文王罔敢知于兹克厥宅心能以宅官者之心為心也立兹常事謂立事之官即任人也司即凖夫也牧即長伯也能於立事司牧之官以能得俊有德者居之惟能心其心故能於其官而能得其人也三克字皆謂文王能之兼猶言參預也庶言諸多是非淆亂之言庶獄諸多鞫辨爭訟之事庶愼諸多禁戒儲備之事陳氏曰之猶及也澄案有司之牧夫其立文猶月令言參保介之御兼文王不下侵臣職惟信任凖人及牧夫違逆也是訓用違謂庶言之順逆及庶獄庶愼文王皆不敢自知知猶知政之知得人而信任之篤文王所以盡君道也亦越武王率惟敉功不敢替厥義德率惟謀從容德以並受此丕丕基率循敉功安天下之功義德處事合宜者容德其心有容者武王率循文王之功其于義德之人用之而不敢替率循文王之謀其于容德之人從之而不敢違蓋拯民危急必資剸裁之能貽謀宏逺必資寬大之度此武王述事繼志而不改父之臣故父子並受此大大之基業也嗚呼孺子王矣繼自今我其立政立事凖人牧夫我其克灼知厥若丕乃俾亂相我受民和我庶獄庶愼時則勿有間之自一話一言我則末惟成德之彥以乂我受民繼自今言繼續自今以往也此一節六我字皆我成王也立政立事之人即常任也若謂如此也相佑助之也受民王之民受之于天受之于祖宗也和不乖戾也自一話一言即所謂庶言也末終成德之彥即三宅之俊有德者也自今以往王於三事之官當灼然知其如此乃使之為治謂知之貴乎明也使之相我所受之民和我庶獄庶愼之事勿有以間之而不得專意為治至于庶言則自始至終一惟成德之美士是咨獻可替否以乂我所受之民謂任之貴乎專也嗚呼豫旦已受人之徽言咸告孺子王矣繼自今文子文孫其勿誤于庶獄庶愼惟正是乂之成王武王之文子文王之文孫周公謂我已受人言之美者皆告之于王則所謂庶言不勞王之自擇其美惡矣惟有庶獄庶慎之事其勿自用而至于誤但當付之于人以治之正者官之長即常任常伯凖人之官也蓋言之當擇獄之當决事之當謹皆不易能人君苟恃已自用一或至誤雖悔何及惟當求賢審官委任責成則自收得人之效此周公所以拳拳于成王也自古商人亦越我周文王立政立事牧夫凖人則克宅之克由繹之兹乃俾乂克宅之謂能以可居是官者居之繹如繹絲謂又從而由繹之審度之詳也商人與文王于三事之官詳察其可而後使之治國則罔有立政用憸人不訓于德是罔顯在厥世繼自今立政其勿以憸人其惟吉士用勱相我國家憸人小人也小人不順于德使其君無能光顯以在世故戒以勿用憸人而惟用吉士也勱勉力也此申言上文之意言立政之官當擇其人今文子文孫孺子王矣其勿誤于庶獄惟有司之牧夫不云庶言庶慎舉其中以該之省文也此申上文之意言凖牧之官當專其任也三官皆當擇人而專任兩節之文互相備其克詰爾戎兵以陟禹之迹方行天下至于海表罔有不服以覲文王之耿光以揚武王之大烈詰治也詰戎兵謂農隙講武事田獵選車徒之類陟猶行也禹迹禹治水所行之舊迹也方行遍行也覲顯見也耿光德之輝也揚振發也大烈業之盛也文王以方伯專征伐武王一戎衣有天下其光烈如此成王伐奄而歸兵威逺被周公欲其繼今毋忘武備以顯揚文武之德業故言及此或疑此一節與前後文意不接恐有脫簡嗚呼繼自今後王立政其惟克用常人承上文王武王而言故稱成王為後王常人有常德之人三事常任為重故獨舉此一官以結一篇之意此第一章周公若曰太史司冦蘇公式敬爾由獄以長我王國兹式有慎以列用中罰司冦刑官蘇國公爵名忿生武王時為司冦敬不敢慢忽也爾今蘇公也由用長我王國謂延國祚也列者前後相比猶今言例也蘇公能敬其所用之獄今亦於此而有慎以例比並權輕重之中而用其罰也周公呼太史而告以蘇公敬獄之事太史書之簡䇿因此篇周公戒成王以勿誤庶獄而附記于其後非一時之言也此第二章顧命顧還視也成王將崩命羣臣立康王臨死回顧而發命故曰顧命惟四月哉生魄王不懌成王崩年之四月不懌疾甚也天子之疾曰不懌曰不豫崩曰登遐曰宴駕皆臣子不忍斥言之也甲子王乃洮頮水相被冕服慿玉几乃同召太保奭芮伯彤伯畢公衛侯毛公師氏虎臣百尹御事洮盥手也頮沃面也水以水洮頮之也發大命臨羣臣必齊戒沐浴今疾病故但洮頮也相相禮者被冕服以衮冕服被王身也几所慿以為安玉几以玉飾几也凡大朝覲王位設黼扆前設左右玉几同召同時俱召也太保奭召公以太保領冢宰也特名以其尊異之芮伯司徒彤伯宗伯畢公太師領司馬衛侯司冦毛公太傅領司空師氏中大夫虎臣虎賁氏下大夫二官宿衛之臣也百尹謂諸大夫衆士也御事總言上自六卿下至百尹皆治事者也平時則召六卿使率其屬此時發顧命故自尊及卑同以王命召異於平時也王曰嗚呼疾大漸惟幾病日臻既彌留恐不獲誓言嗣兹豫審訓命汝此以下王之顧命也漸進幾危疾甚曰病日臻日加劇也彌甚留久也誓以信言相要約也病既不瘳恐至大故不得誓言繼嗣之事今此我所以詳審道說而命汝昔君文王武王宣重光奠麗陳教則肄肄不違用克達殷集大命昔君猶先君也宣昭布也重光明德之輝光相繼也奠定麗依肄習重言者習之不已也達由此而通于彼也集猶鳥之來于木也定民所依陳列教條民皆服習而不違民心從故天命至也在後之侗敬迓天威嗣守文武大訓無敢昏逾侗幼而未有知也成王以幼沖即位故稱侗迓逢迎之也天威大誥所謂天降威也成王升遐敬迎此天威而嗣守文武之大訓無敢昏迷逾越也今天降疾殆弗興弗悟爾尚明時朕言用敬保元子釗𢎞濟于艱難柔逺能邇安勸小大庶邦思夫人自亂于威儀爾無以釗冒貢于非幾殆違也弗興弗能起弗悟不蘇醒明是朕言者不昧我所命而遵用之也宗社之重基業之大付之一人可謂艱難言當敬保護康王大渡脫艱難和夑畿內逺邇之民安勸畿內大小之國然為政有本必先修身當思如夫人之能自治于威儀者修身有要必先治心毋使冒進于不善之幾幾者動之微幾有善惡審擇于此時進于善不進于惡非幾者動而之惡者也冒所以韜尸進於不善猶尸之入於冒故曰冒進兹既受命還出綴衣于庭綴衣幄帳羣臣于此既受顧命畢而各還其位徹出幄帳于路寢之庭越翼日乙丑王崩太保命仲桓南宮毛俾爰齊侯呂伋以二干戈虎賁百人逆子釗于南門之外延入翼室恤宅宗仲南宮氏桓毛名齊侯氏呂名伋太公望之子為天子虎賁氏延引也翼室路寢旁左右翼室也太保以冢宰攝政命桓毛二臣使齊侯以兵衛迎太子以入發命者冢宰傳命者兩朝臣承命者勳戚顯諸侯延入翼室為憂居之宗主或曰恤宅宗蓋喪次之名宗者宮廟室屋之通稱初喪未成服未居梁暗故於路寢之翼室為憂居之室也丁卯命作冊度丁卯王崩之第三日也命亦太保命也成王有遺命將傳之于康王故作冊以紀其言而授之也既作冊因作受冊之度如下文升階即位受同祭咤等禮節是也凡喪禮厥明而小斂又厥明而大斂尊卑皆同命作冊度者既大斂之後也越七日癸酉伯相命士須材癸酉王崩之第九日天子七日而殯自死之明日數此既殯之後也殯畢則送死之事略具矣故于此時傳顧命于嗣君也召公以西伯為冢宰故曰伯相士山虞匠人之屬須索取也命士取材木以供喪用士喪禮獻材于殯門外檀弓旬而布材與明器狄設黼扆綴衣牖間南嚮敷重篾席黼純華玉仍几西序東嚮敷重底席綴純文貝仍几東序西嚮敷重豐席畫純雕玉仍几西夾南嚮敷重筍席𤣥紛純漆仍几狄下士喪大記狄人設階蓋供喪役而典設張之事者也黼扆屏風為斧文設黼扆幄帳如成王生存之時牖間牖東户西此平時見羣臣覲諸侯之坐也敷猶鋪也重天子之席三重篾席桃竹枝席也此舉其上席而言其下更有二席黼以絳帛為質白黑線刺為斧文純緣也即周官次席黼純也華玉有彩色之玉以之飾几周官吉事變几凶事仍几變几謂飾之漆之盡變其質彌文也仍几謂雖飾之漆之尚仍其質其文不皆滅質也吉事尚文凶事尚質故爾西序東嚮此旦夕聽事之坐也成王殯在西階之上此座堂在殯之西南底席蒲席綴雜彩文貝有文之貝以飾几也東序西嚮此養國老饗羣臣之坐也豐席筍席畫彩色雕刻鏤西夾南饗此親屬私燕之坐也筍席竹席紛雜以𤣥黑之色雜為之緣漆漆几牖間兩序西夾其席有四牖户之間謂之扆天子負扆朝諸侯則牖間南嚮之席坐之正也其三席各隨事以時設將傳顧命知神之在此乎在彼乎故兼設平生之坐也越玉五重陳寶赤刀大訓𢎞璧琬琰在西序大玉夷玉天球河圖在東序𦙍之舞衣大貝鼖鼓在西房兌之戈和之弓垂之竹矢在東房於東西序坐北列玉五重及陳先王所寶器物赤刀赤削也大訓三皇五帝之書訓誥亦在焉文武之訓亦曰大訓𢎞璧大璧也琬琰圭名夷常也球鳴球也河圖伏羲時龍馬負圖出於河一六位北二七位南三八位東四九位西五十居中者易大傳所謂河出圖是也𦙍國名𦙍國所制舞衣大貝如車渠鼖鼓長八尺兌和皆古之巧工垂舜時共工舞衣鼖鼓戈弓竹矢皆制作精巧中度故厯代相傳寶之此陳寶器也楊氏曰宗器于祭陳之示能守也于顧命陳之示能傳也大輅在賔階面綴輅在阼階面先輅在左孰之前次輅在右孰之前大輅玉輅綴輅金輅面皆南向先輅象輅次輅木輅門側之堂曰孰左孰門內之西右孰門內之東前皆北面此陳車乘也象輅對玉輅木輅對金輅不陳戎輅者戎事非常故不陳也二人雀辨執惠立于畢門之內四人綦辨執戈上刃夾兩階戺一人冕執劉立于東堂一人冕執鉞立于西堂一人冕執戣立于東垂一人冕執瞿立于西垂一人冕執鋭立于側階雀辨赤色韋辨也惠三隅矛畢門路寢門綦辨以文鹿子皮為之上刃刃外向堂廉曰戺兩階戺阼階賔階之稜也士皆立堂下冕大夫服劉鉞屬東堂西堂路寢東西廂之前堂也戣瞿皆㦸屬東垂西垂東西序之階上也鋭矛屬說文作鈗側階蓋東廂之側階上以恤宅宗在東夾翼室故此陳兵衛也上文陳座席寶器車乘皆象成王生存時儀物成王殯在西故以西為上陳兵衛者衛嗣君也嗣君在東故以東為上王麻冕黼裳由賔階隮卿士邦君麻冕蟻裳入即位王康王釗也儀物既備然後受顧命嗣王位自是始稱王麻冕績麻三十升布為冕蓋袞冕也是時成王在殯尚未成服君臣皆吉服然皆有變袞冕之衣五章其裳四章此用黼裳惟二章示變也由賔階升猶以子道自居不敢自為主也卿士王朝之卿也邦君諸侯也蓋自此始至卿士王臣故先于邦君蟻裳色𤣥如蟻正服當𤣥衣纁裳此變其裳色也卿士邦君及太保等蓋各從其命服卿士邦君但陪位無所執事故入路門即堂下之位不升堂也卿西向諸侯北面若有公亦北面孤則東面太保太史太宗皆麻冕彤裳太保承介圭上宗奉同瑁由阼階隮太史秉書由賔階隮御王冊命太宗上宗大宗伯也彤赤色纁赤色之淺者下纁裳而彤裳亦變也介大也大圭鎮圭也長尺二寸天子所執同爵名瑁方四寸太保攝王事故承介圭太宗掌禮故奉同瑁太史太宗之屬以其秉冊故先之太保宗伯奉先王之命以傳嗣王故升自阼階書即書顧命之冊太史將以命王故從王而升自西階御猶御車者之御言與王相近也王于此時立賔階上少東太史東面于殯西南秉冊書而命王以嗣位之事也曰皇后慿玉几道揚末命命汝嗣訓臨君周邦率循大卞夑和天下用答揚文武之光訓皇后大君也末命臨終之命成王顧命自言其嗣守文武大訓故曰命汝嗣訓卞法也夑亦和也蓋成王顧命命羣臣也此辭則述成王顧命之意書之于冊以命康王者也王再拜興答曰眇眇豫末小子其能而亂四方以敬忌天威眇小而如亂治也天威與前敬迓天威同謂喪禍也太史讀冊畢王再拜受命起而答曰眇然豫末小子其能如前人之治四方以敬畏此可畏之威乎乃受同瑁王三宿三祭三咤上宗曰饗天子之禮無可考證今以士禮推之父之命子必醮以酒醮者有獻無酢太保攝王事傳顧命命嗣王亦用酒者如成王生存親命其子也然太保臣也不敢純如父醮子之禮故略如臣獻君之禮有獻有酢其時太保執天子之圭為攝主太保以同酌酒承以瑁獻嗣王王受同瑁三宿而後三祭三祭而後三咤宿與肅通肅者肅拜也案儀禮燕禮臣獻君君拜而後受爵此天子禮或異于諸侯或一時變禮不當比于常禮故先受爵而就執爵以肅拜三肅致敬也春秋傳晋郤至三肅使者或曰儀禮鄉飲酒主人三拜衆賔疏云衆賔各得主人一拜蓋衆賔升階拜受爵者三人主人各為一拜故三拜此蓋以太保太宗太史三臣傳顧命故各一肅拜以禮之也祭者飲食必祭先代始為飲食之人示不忘本也三祭儀禮冠禮皆以四祭醴三注云禮成于三故三祭也咤者以酒至口而不飲居喪故也三咤肅祭皆以三成禮故咤亦三也饗者勸飲食之辭欲王受此酒而饗之也如成王錫周公鬯酒而曰休享享饗通士特牲饋食禮尸執奠祝饗注云饗謂勸强之也太保受同降盥以異同秉璋以酢授宗人同拜王答拜太保受同祭嚌宅授宗人同拜王答拜王三咤畢太保受同于王降盥升以異同酌酒秉璋以酢蓋臣為獻主不敢勞君酢己故自酌以酢又不敢襲君爵故易異同又不敢以圭瓚故用璋禮凶事設洗西階西南吉事設洗阼階東南此時喪未成服而行吉事盥洗在東宗人小宗伯佐大宗者大宗供王小宗人供太保既自酌酒于同將拜故受宗人同而拜受爵王答拜以送爵太保乃于宗人受同而祭嚌咤嚌者各嘗其味宅與咤同以嚌為咤嘗至口異于王也既嚌咤以同授宗人又拜者拜酢禮也王又答拜亦如平時燕飲之禮太保降收獻酢禮畢太保降則王及羣臣亦皆降收者有司收徹器用諸侯出廟門俟廟門路寢之正門成王殯在焉故曰廟蓋自廟門出而俟于路門之外非俟于路寢門外也王出在應門之內天子五門臯庫雉應畢畢門即路寢門以諸門至此而畢也應門之內內朝也天子三朝外朝在雉門內朝士掌之內朝在應門內司士掌之燕朝在路寢太僕掌之時殯在路寢故王于內朝見諸侯太保率西方諸侯入應門左畢公率東方諸侯入應門右皆布乘黃朱賔稱奉圭兼幣曰一二臣衛敢執壤奠皆再拜稽首王義嗣德答拜周中分天下諸侯以二伯自陜以東周公主之自陝以西召公主之召公率西方諸侯蓋西伯舊職畢公率東方諸侯者繼周公為東伯也諸侯各隨其方而入分左右班皆北面以東為右以西為左布陳也乘四馬也黃朱黃馬而朱其鬛以為庭實其時諸侯必衆衆國皆陳四馬非王庭所容必少陳之餘者在外賔諸侯也或曰當作擯案周官小行人合六幣圭以馬璋以皮璧以帛琮以錦琥以繡璜以黼謂以馬為幣則以圭合之兼幣即合幣也布乘黃朱是馬為幣也故賔舉所奉之圭以兼其所陳之幣而致辭于王云云一二見非一也為王藩衛故曰臣衛敢執壤地所出之贄奠之再拜稽首臣拜君之禮也義嗣德史氏之辭義宜也王義嗣前人之德故答拜也吳氏曰穆公使人弔公子重耳重耳稽顙而不拜穆公曰仁夫公子稽顙而不拜則未為後也喪禮弔者含者襚者升堂致命主孤拜稽顙成為後者也康王見諸侯若以為不當拜則疑未為後且純乎吉也答拜既正其為後且知其以喪見也呂氏曰此非常禮也太保暨芮伯咸進相揖皆再拜稽首諸侯朝王而召畢為二伯故召畢率之以入羣臣見王而冢宰司徒最尊故太保與芮伯咸進相擯相之人太保司徒率羣臣而相者舉手揖之使拜遂皆再拜稽首也前之拜諸侯拜羣臣不拜此之拜羣臣拜諸侯不拜也王答諸侯拜而不答羣臣拜蓋諸侯自外初見羣臣在內日見也曰敢敬告天子皇天改大邦殷之命惟周文武誕受羑若克恤西土惟新陟王畢協賞罰戡定厥功用敷遺後人休今王敬之哉張皇六師無壞我髙祖寡命曰者太保言也太保為外諸侯之伯內羣臣之長故率諸侯羣臣進戒于王也羑若未詳或曰若順也羑里之囚逆境也而文王以順處之因此遂受天命或曰文王自出羑里之囚而天命始順或曰羑善也天所善天所若謂眷佑之也或曰羑若即下文厥若或字有訛澄案四說俱未安西土文武所興之地言文武所以誕受天命以其能恤西土之民也陟升遐也成王未諡故稱新陟王畢盡協合賞當功罰當罪盡合其宜克勝其任安定文武之功用能延及于今後人有此休美今王嗣位其敬之哉張猶張弓之張言無弛也皇大也六師六軍也天子六軍髙祖謂文武寡命言周之受命世所寡有今王當不忘戎備無或弛怠而墮壞我文武不易得之天命也王若曰庶邦侯甸男衛惟豫一人釗報誥禮天子自稱豫一人不稱名王在喪故稱名春秋嗣王未踰年亦書名也報誥報其進戒之辭而告之也報誥不及羣臣者以外見內昔君文武丕平富不務咎砥至齊信用昭明于天下則亦有熊羆之士不二心之臣保乂王家用端命于上帝皇天用訓厥道付畀四方乃命建侯樹屏在我後之人丕平富謂無一人不富也平者各得其分願富者家給人足也不務咎不以咎人之咎為務慎刑罰也砥至致于極也齊信謂皆信也文武之心致之至極而民丕齊其信用能顯著于天下文武既聖則亦有勇猛如熊羆之士忠一不二心之臣共保乂王家用能受正命于上帝君仁于民臣忠于君兩盡其道天用順之而付畀以四方謂得天下也既得天下之後乃封建諸侯樹立以藩屏在我後之人言先王之有臣以保乂王家所以勵羣臣也言先王之建侯以藩屏後人所以勵諸侯也今豫一二伯父尚胥暨顧綏爾先公之臣服于先王雖爾身在外乃心罔不在王室用奉恤厥若無遺鞠子羞天子稱同姓大國曰伯父小國曰叔父異姓大國曰伯舅小國曰叔舅今獨舉同姓大國以包其餘也顧綏回視而安行之也王室若此汝則奉承而同恤之言以王室之憂為憂也鞠子王自謂諸侯不能盡職豈不貽我羞乎羣公既皆聽命相揖趨出羣公謂大國諸公與王之三公諸臣亦在焉既皆聽新天子誥命相者推手揖之使出遂皆趨而出也王釋冕反喪服脫去冕服反喪次成服自是常服斬衰居倚廬朝臣反就其次諸侯反歸其國亦服喪服喪禮喪服篇臣為君諸侯為天子皆斬衰蘇氏曰成王崩未葬君臣皆冕服禮歟曰非禮也謂之變禮可乎曰不可禮變于不得已三年之喪而即吉無時而可者曰成王顧命不可以不傳既傳不可以喪服受也曰何為其不可孔子有曰將冠子未及期日而有齊衰大功之喪則因喪服而冠冠嘉禮也猶可以喪服行之受顧命見諸侯獨不可以喪服乎太保使太史奉冊授王于次諸侯入哭于路寢而見王于次王喪服受教戒哭踊答拜聖人復起不易斯言矣春秋傳鄭子皮如晉葬晉平公將以幣行子産曰喪安用幣子皮固請以行既葬諸侯之大夫欲因見新君叔向辭之曰大夫之事畢矣而又命孤孤斬焉在衰絰之中其以嘉服見則喪服未畢其以喪服見是重受弔也大夫將若之何皆無辭以退今康王既以嘉服見諸侯而又受乘黃玉帛之幣使周公在必不為此然則孔子何取于此書也曰父子君臣之間教戒深切著明猶以為後世法然其失禮則不可不辨或問蘇氏以此為失禮如何朱子曰天子諸侯之禮與士庶人不同故孟子有吾未之學語漢唐新主即位皆行冊禮君臣亦皆吉服追述先帝之意以告嗣君韓文外集順宗實録此事可考蓋易世傳受國之大事當嚴其禮而王侯以國為家雖先君之喪猶以為己私服也五代以來此禮不講則始終之際殊草草矣或問蘇朱二說孰當澄曰蘇說據禮之經朱說逹事之權舉一而廢一皆不可古者天子崩世子聽于冢宰雖未正名嗣位而羣臣尊之為君下無所覬覦上無所疑忌禮明而分定故也武王喪成王幼周公以叔父位冢宰攝王事致流言之謗成王或因風雷之異得周公代武死之說而王之疑始釋及其將終以此為監欲嗣子正名定分于初喪之時故有顧命召畢奉承其意制為權宜之禮蓋前此所未嘗有後此亦不常行也朱子見後世有繼嗣不定而致禍亂者當宋氏光寧授受之際又嘗身親其事一時困心衡慮故其言如此然先王之禮萬世可行或值事變不同隨時度宜而行變禮亦聖人所許所謂禮變于不得已也若遂以後世冊立新主君臣吉服為是改先王之禮則恐未為通論呂刑呂國名刑刑書也禮記孝經作甫刑宣王時詩云生甫及申平王時詩云不與我戍甫蓋呂侯子孫或因呂為甫或别封為甫穆王時未有甫名後人曰甫刑者猶叔虞封唐子孫稱晉詩從初所封曰唐國風史記從後所稱曰晉世家也或曰呂甫聲協猶受紂二字不同其初蓋一名也惟呂命呂侯為王司冦更定贖刑新制具載刑書因諸侯來朝王使呂侯以書之意告命諸侯也王享國百年耄荒度作刑以詰四方穆王嗣位時年已五十享國百年蓋在位五十年之後耄老而昏忘也荒大度揆猶禹言荒度土功詰治也大加揆度作為刑書以詰治四方也王曰若古有訓蚩尤惟始作亂延及于平民罔不寇賊鴟義姦宄奪攘矯䖍若發語辭訓遺書也古有遺書所載之事如下所云蚩尤炎帝時諸侯黃帝興兵誅之鴟貪殘之鳥橫取非已之有曰奪矯强䖍殺上古風淳俗厚蚩尤始行凶暴以開亂原惡勢熾盛驅扇薰染延及平民皆習于惡無不為冦為賊以貪殘為義肆行不忌外姦內宄為冦而劫奪取貨為賊而强矯殺人也苗民弗用靈制以刑惟作五虐之刑曰法殺戮無辜爰始淫為劓刵㭬黥越兹麗刑并制罔差有辭民興胥漸泯泯棼棼罔中于信以覆詛盟虐威庶戮方告無辜于上上帝監民罔有馨香德刑發聞惟腥皇帝哀矜庶戮之不辜報虐以威遏絶苗民無世在下苗民三苗之君也蠻獠之處擅自長雄雖君其國非受天子命而為諸侯也其實一民而已五虐之刑比舊五刑更加酷虐也曰法非法而為之法也殺戮大辟也劓刵皆劓辟不言剕辟者包于劓宮或曰刖字誤為則椓宮辟黥墨辟并制一并制之不分輕重也有辭無罪者也凡對獄有罪者無辭無罪者有辭苗民承蚩尤之暴不用善而制以刑改作五虐之刑為法大辟既施于無罪而又過為四者深刻之刑凡麗于刑不分輕重而并其制無復簡别其無罪而有辭者興猶生也民生斯時相與漸浸于淫刑之中泯泯然沈昏棼棼然殽亂信實也刑之輕重允當情理之實是之謂中并制之刑其實民無所取中顯明之地莫可告訴則告訴幽冥之間以求直于鬼神而已覆反也彼此互相詛盟也衆庶被虐威之戮各以無罪告訴于天天視苗民無有馨香之德其刑威之虐發而上聞惟有腥穢之氣皇帝堯也庶戮以無辜告天而帝堯哀矜之堯之心即天之心也遏絶謂竄之于三危遏止其惡而絶其世使其子孫無復得傳世為君也此篇言在下者五皆謂為諸侯也對天子而言天子在上諸侯在下者也乃命重黎絶地天通罔有降格重少昊之後黎顓頊之後重即羲黎即和在地者人也在天者神也三苗貪虐民罹凶害無所控訴而聽于神夫妖由人興民不諂瀆求神則神之妖怪自息堯命羲和欽天授時禮秩有經職方無越民不得以非禮上交於神神不可以非類下接於人自是無復有妖怪降至人間者國語曰古者民神不雜少昊之衰也九黎亂德天人作享家為巫史民神同位顓頊受之乃命南正重司天以屬神北正黎司地以屬民使復舊常無相侵瀆是謂絶地天通其後三苗復九黎之德堯復育重黎之後世敘天地而别其分至羣后之逮在下明明棐常鰥寡無蓋皇帝清問下民鰥寡有辭于苗德威惟畏德明惟明羣后諸侯也逮及也及此時在下為諸侯者皆有非常之明故鰥寡之情無所掩蔽時苗民已寬矣堯清心訪問下民鰥寡遂言苗民既往之惡其情即得上逹堯知苗之毒民在於昏虐今諸侯一反其道以德之威為威則不虐以德之明為明則不昏也案苗民之竄考之傳記在舜賔于四門之後受終攝位之前時帝堯在上為君所謂皇帝哀矜庶戮清問下民孔傳皆以為堯蔡氏以為舜者非是乃命三后恤功于民伯夷降典折民惟刑禹平水土主名山川稷降播種農殖嘉穀三后成功惟殷于民士制百姓于刑之中以教祗德穆穆在上明明在下灼于四方罔不惟德之勤故乃明于刑之中率乂于民棐彞典獄非訖于威惟訖于富敬忌罔有擇言在身惟克天德自作元命配享在下三后皆以諸侯入為帝朝之臣伯爵夷名猶崇伯名禹稱伯禹也稷封于邰以有邰之君入為稷官故稱后稷恤功以民事為憂也自上教下曰降內則曰降德于衆兆民伯夷教民以禮民入于禮而不入于刑折絶斯民入刑之路也禹為司空治水水由地中行而土可居九州各主有名之山川以表疆域稷降下播種之法三農得豐殖其嘉穀三后各成其事惟務繁盛其民之生聚降典教之也平水土安之也降播種養之也所謂德明惟明者如此臯陶為士官為百姓制得中之刑使之畏威寡罪而敬其德當是之時穆穆者在上為天子明明者在下為諸侯封國在東在西在南在北其明各章灼于其方無一不勤于德棐彞猶召誥言非彞四方諸侯皆惟德之勤故能明于臯陶制刑之中導民為善禁民為惡民之棐彞者率皆順治而刑不用典獄諸侯之君主四方之獄者非反辭惟正辭下章非時伯夷惟時苗民是其例也訖絶也富貪賄賂也堯時萬國咸寧比屋可封刑措不用或不得已而用刑則盡絶貪虐一是公正敬謹畏忌表裏無愧身之所為皆可言之于人無所揀擇去取治獄如此是能合乎天德而天之元命不待外求乃其自作也故得上配天子享國在下所謂德威惟畏者如此案此篇皆是誥諸侯之辭此章首言蚩尤之亂遂言堯時苗民淫刑之惡羣后祥刑之美以示戒示勸也王曰嗟四方司政典獄非爾惟作天牧今爾何監非時伯夷播刑之迪其今爾何懲惟時苗民匪察于獄之麗罔擇吉人觀于五刑之中惟時庶威奪貨斷制五刑以亂無辜上帝不蠲降咎于苗苗民無辭于罰乃絶厥世嗟歎辭四方司政典獄謂諸侯也非爾諸侯為天之牧民者乎今爾何所監視何所懲創乎所當監者非伯夷乎所當懲者惟是苗民也伯夷以禮教民使不犯刑此其布政之迪也奪貨劫取賄賂也蠲貸也苗民不察獄辭之所麗蓋以不擇用吉人審觀于五刑之中惟是一衆虐者貪者斷制五刑妄亂加罪于無罪之人上帝不貸其惡而降之殃咎苗民無所辭于帝之罰乃至滅亡絶其子孫之傳世不復得為君也王曰嗚呼念之哉伯父伯兄仲叔季弟幼子童孫皆聽朕言庶有格命今爾罔不由慰日勤爾罔或戒不勤天齊于民俾我一日非終惟終在人爾尚敬逆天命以奉我一人雖畏勿畏雖休勿休惟敬五刑以成三德一人有慶兆民賴之其寧惟永伯父等即司正典獄之諸侯王享國百年矣諸侯之老者猶父兄弟少者猶子孫父兄之列以伯稱弟之列以仲叔季稱子孫之列以童幼稱舉同姓諸侯以包異姓也刑合天心則天降格而眷命之爾皆聽我言而謹于刑庶乎天有格命也由用也刑之中者用以慰民也爾無于此而不日勤刑之失者宜以為戒也爾無于此而戒不勤勤于由慰為其所當為也不勤于所戒不為其不當為也刑者天之所以齊乎民也淫刑為天所譴則必不終于位祥刑為天所福則必克終于位使我在位一日或不克終或克終皆在爾司刑之人爾能謹于用刑庶可敬逆天命而使我克終所以奉我一人也畏與威同畏謂刑罰之也休謂赦宥之也雖有所刑罰苟不當則勿刑罰之雖有所赦宥苟不當則勿赦宥之惟當敬謹于五刑使輕重寬嚴各得其當以成剛柔正直之三德當寬而從輕柔克也當嚴而從重剛克也寬嚴輕重適其平正直也天有格命而克終于位一人有慶也惡無所容而善有所恃兆民賴之也上下同享其安永求無窮矣穆王惕然以己之克終不克終係于諸侯用刑之當不當諸侯承王之命其可不謹于刑乎王曰吁來有邦有土告爾祥刑在今爾安百姓何擇非人何敬非刑何度非及邦言其國土言其境內之地祥吉善也刑者凶器而曰祥刑蓋慈良惻怛詳審輕重主之以不忍行之以不得已所以謂之祥也在今日爾諸侯欲安百姓何者當擇非人乎何者當敬非刑乎何者當揆度非及乎人謂用刑之人及謂刑之所加猶罰及爾身之及兩造具備師聽五辭五辭簡孚正于五刑五刑不簡正于五罰五罰不服正于五過五過之疵惟官惟反惟內惟貨惟來其罪惟均其審克之兩辭證也造至也具備俱完也師衆也獄辭不一麗于刑者不過五故曰五辭辭證俱完則與衆有司共聽其辭當麗何刑簡分别之也孚實信無疑也辭既分辨而無疑則定其罪而正之于五刑五辭所麗之刑分辨不明是謂不簡不簡則正之于五罰五刑所宥之罰審責不合是謂不服不服則正之于五過刑罰過皆曰正者謂斷以公定以理各得其正也然古之所謂罰者以五流之法宥之而已今五罰皆以金贖則與古不同矣周官所謂過者桎梏而坐諸嘉石役諸司空今五過輕于金贖則與周官又或不同矣夫自刑輕之而為罰自罰輕之而為過過則幾于免矣法固欲其輕也以私而故縱之則非天討之公所以嚴責五過之疵官挾勢也反報恩也內女謁也貨賄賂也來請求也為是五者而徇私所犯非過而以為過此故縱之罪與犯人同所宜審克之審克謂審之而能得其審也五刑之疑有赦五罰之疑有赦其審克之五刑不簡正于五罰者雖不刑之而猶入于罰也若五刑有疑則直赦之而不復入于罰矣五罰不服正于五過者雖不罰之而猶治其過也若五罰有疑則直赦之而不復治其過矣有疑而當赦者所宜審克之簡孚有衆惟貌有稽無簡不聽具嚴天威墨辟疑赦其罰百鍰閲實其罪劓辟疑赦其罰惟倍閲實其罪剕辟疑赦其罰倍差閲實其罪宮辟疑赦其罰六百鍰閲實其罪大辟疑赦其罰千鍰閲實其罪墨罰之屬千劓罰之屬千剕罰之屬五百宮罰之屬三百大辟之罰其屬二百五刑之屬三千上下比罪無僭亂辭勿用不行惟察惟法其審克之推究得實者罪之當刑者也雖有衆人同聽惟當更于其容貌有所考察周官所謂色聽是也衆皆曰然而猶必察焉慎之至也無可推究者疑而當赦者也疑獄難明不復再聽蓋過于尋求或至誤入必受天譴天威俱所當畏故疑者不問而赦之也刑施于人曰辟五辟之疑皆赦其罰謂或有不赦而罰贖者也六兩曰鍰鍰黃鐵也倍謂倍百為二百鍰倍差謂倍二百為四百而差之少進為五百鍰閲察也察數而得其實曰閲實五罰之金多寡不同皆必閲實其罪果當其罰而後罰也屬類也三千總計之也别言罰屬合言刑屬者刑罰同屬互見之也周官司刑所掌五刑之屬二千五百今此雖增其舊然輕罪比舊為多重罪比舊為少三千屬者法之正條若罪無正條則取上下條比附其罪但比附之例有不可誤者有不可用者僭差誤也謂當比此一例乃比彼一例所比不當則與辭不相應是亂其辭也雖有比附之例其法不可行者勿用之漢長安賈人坐與渾邪王市者五百餘人當死汲黯曰愚民安知所市賈長安中而文吏以為出財物如邊關乎若此之類是以不可行者比附也法無正條尤當詳謹內致其察外比以法所宜審克也上刑適輕下服下刑適重上服輕重諸罰有權刑罰世輕世重惟齊非齊有倫有要罰懲非死人極于病非佞折獄惟良折獄罔非在中察辭于差非從惟從哀敬折獄明啓刑書胥占咸庶中正其刑其罰其審克之刑在上而情適輕則減一等而下服刑在下而情適重則加一等而上服用刑之權也諸罰亦然或減輕一等或加重一等輕之重之如衡之有權然此特隨一事而輕重耳亦有隨一世而輕重者若刑新國用輕典刑亂國用重典刑平國用中典之類是也刑罰之權或同或不同然有其倫叙則不可紊有其要歸則不可易惟齊非齊者權也有倫有要者經也罰贖聊以懲之雖非至死然殫其資財人已極于病矣輸財者猶憫之况刑加其身乎此穆王哀矜之甚也佞口才也獄者欲盡人之情實以口辨折人使人無所措其辭易至誣枉良者慈祥豈弟之人治獄之法雖不可過亦不可不及無非在于得其中而已察獄之辭參差不齊有不從順者有從順者從謂得其情理也當以哀敬之心折獄哀謂矜憐其人敬謂謹重于己獄辭既定當得何罪則明白開讀律法之書與衆有司共相推度如卜筮之旅占咸欲庶幾乎中正其刑必如是其罰亦必如是所宜審克也獄成而孚輸而孚其刑上備有并兩刑獄既成于下而無疑輸于上而無疑治獄有司于其刑達上之時必備載其情節有可輕可重者并載兩刑聽君國者之自裁不敢專决也王曰嗚呼敬之哉官伯族姓朕言多懼朕敬于刑有德惟刑今天相民作配在下明清于單辭民之亂罔不中聽獄之兩辭無或私家于獄之兩辭獄貨非寶惟府辜功報以庶尤永畏惟罰非天不中惟人在命天罰不極庶民罔有令政在于天下卿大夫從諸侯而來朝故又呼其大官大姓而戒之穆王惟恐用刑之或誤故言之而多懼惟其敬于刑故欲有德者司刑今天相佑斯民有四方司政典獄之諸侯為天牧民作天子之配而在下單辭無佐證者聽之尤難其明之所照當如清水之照影表裏洞徹無毫髮之不見故曰明清于單辭民之所以治由典獄者之無偏私中聽聽之不偏也家者人之所私私家謂私之如家然府主案牘者辜功以入人之罪為功也報如報虐以威之報庶衆言之也尤殃咎也不中聽獄者所見之偏爾私家于獄者必受貨賂也然獄之所以私亦有非以財寶為貨者惟主吏欲以人之罪為己之功則故以陷人治獄而私天必報之以庶尤今雖未報終久可畏者惟天罰也非天不中而偏罰之蓋以人之為人在于有生之命陷人命以至于死天豈容之哉若天之罰不如此其極則獄吏將無所畏恣為深刻而施之庶民者皆酷虐之政無復有令善之政在于天下矣王曰嗚呼嗣孫今往何監非德于民之中尚明聽之哉哲人惟刑無疆之辭屬于五極咸中有慶受王嘉師監于兹祥刑嗣孫諸侯嗣世之子孫蓋諸侯或有世子代君來朝者自今以往將何所監視豈非德于民之中乎謂以德用刑于民而得其中也我之言如此汝尚明聽之哉屬猶附著也哲人明理審法其于用刑也雖兩造之辭紛紛無有窮盡皆使附著于五刑之極處極謂得其至當故刑咸適中而已亦有福慶也凡受王之良民而治之者不可虐之以不祥之刑當監視于此之祥刑祥刑者以德為刑也文侯之命文侯晉君姬姓武王子唐叔虞之後史記幽王娶于申生太子宜臼後幽王嬖褒姒廢申后逐太子宜臼宜臼奔申申侯與犬戎殺幽王晉文侯與鄭武公及申侯共立宜臼是為平王東遷于洛平王賜文侯秬鬯弓矢命為侯伯此其命書也王若曰父義和丕顯文武克慎明德昭升于上敷聞在下惟時上帝集厥命于文王亦惟先正克左右昭事厥辟越小大謀猷罔不率從肆先祖懷在位同姓故稱父文侯名仇義和其字不名尊之也文武之德昭明而上升于天廣布而下聞于民惟以是之故天集其命于文王之身周家之命集于文王定于武王故集命則以文王言明德則兼文武言先正文武之臣也能于左右昭事其君及小大謀猷之事皆率循從順以此貽後故文武而下諸君為平王之祖者得以安于其位嗚呼閔豫小子嗣造天丕愆殄資澤于下民侵戎我國家純即我御事罔或耆壽俊在厥服豫則罔克曰惟祖惟父其伊恤朕躬嗚呼有績豫一人永綏在位嘆而自傷言己嗣位父死國敗為天下之大罪戾夫犬戎之禍幽王實致之平王過則稱己故以天丕愆為己所造也戎猶寇也純語辭俊大也王室中圯資用惠澤及于下民者殄絶詩所謂喪亂蔑資曾莫惠我師是也資澤殄則民心去故夷狄乘間侵寇我國家即我治事之臣無或有耆宿壽考之人尚在其所服之官既無可以付托而內顧己才則不能勝其任惟曰四方諸侯在祖行父行者其誰能憂恤朕躬乎又嘆而言諸侯若有功于我一人則我可以永安在位矣蓋悲無人如先正之能使先祖得以安于位者也父義和汝克昭乃顯祖汝肇刑文武用㑹紹乃辟追孝于前文人汝多修扞我于艱若汝豫嘉乃汝也顯祖唐叔也乃辟平王自謂唐叔有功周室今汝有功于我是汝能光昭其祖也幽王失信諸侯莫有至者文侯始以身為天下倡取法文武之道以勤王室用以㑹合諸侯繼紹汝君使不絶其世追孝于前時文德之人謂使己不失天下以祀其先王也汝多所修完捍衛我于艱難如汝之功我所嘉也王曰父義和其歸視爾師寧爾邦用賚爾秬鬯一卣彤弓一彤矢百盧弓一盧矢百馬四匹父往哉柔逺能邇惠康小民無荒寧簡恤爾都用成爾顯德師衆也彤赤盧黑也諸侯受賜命當告其始祖故賜鬯有大功賜弓矢然後得專征伐馬供武用四匹曰乘往者往歸晉國簡者簡閲其士恤者惠恤其民都者國之都鄙蘇氏曰宗周傾覆禍敗極矣平王宜若衛文公越勾踐然今其書乃旋旋焉與平康之世無異春秋傳曰厲王之禍諸侯釋位以間王室宣王有志而後效官讀文侯之命知平王之無志也呂氏曰東遷之初大讎未報王略未復正卧薪嘗膽之時奔亡之餘僅得苟安釋然遽以為足嗚呼此周之所以終于東乎費誓費地名後為季氏邑魯侯伯禽征徐戎之時誓師于費也案史記周本紀魯世家武王克殷封周公旦于曲阜曰魯公不就封留佐王王崩管叔及羣弟流言公相成王而使子伯禽代就封于魯管蔡武庚反公奉王命東伐淮夷徐戎亦反伯禽率師伐之作肹誓遂平徐戎定魯肹即費字傳寫不同爾公曰嗟人無譁聽命戒敕之使無喧譁欲其靜聽誓命也徂兹淮夷徐戎並興善敹乃甲胄敿乃干無敢不弔備乃弓矢煆乃戈矛礪乃鋒刃無敢不善徂兹猶曰往者敹整治之也敿施楯紛也紛如組而小繫於楯以持之弔精至也備具也每弓百矢又有重弓以防損折煆鍊礪磨也鋒刃刀劒之屬甲衛身胄衛首干楯以捍敵皆自衛者戰伐所用長兵則弓矢短兵則戈矛與凡可以擊刺之鋒刃皆攻人者先自衛之器後攻人之器言之序也魯侯謂往者至國之初已有淮夷徐戎並起叛亂其時已嘗俾汝修戎備無敢有不精好者矣今往征徐戎且築壘壁有當教戒之事如下文所云故又誓衆也今惟淫舍牿牛馬杜乃擭敜乃穽無敢傷牿牿之傷汝則有常刑今謂今出征之時也淫大舍放牿牢言放牧杜塞擭捕獸機檻敜塞穽穿地陷獸傷牿謂傷牿之牛馬牛馬在牿遂以牿為牛馬之名馬牛其風臣妾逋逃勿敢越逐祗復之我商賚汝乃越逐不復汝則有常刑風牡牝相奔逸役人賤者男曰臣女曰妾逐追求也復還之也失者無得踰越壘伍而追求得者惟當歸還之則我當商度多寡以賞賚汝如或失者越伍追逐得者藏匿不還則皆有常刑也無敢寇攘踰垣墻竊馬牛誘臣妾汝則有常刑上文既言馬牛臣妾之去失者此又言不因去失而敢盜取他隊之馬牛臣妾者先戒之以無敢寇攘而或有踰垣墻而竊其馬牛誘其臣妾者當服寇攘之罪故亦有常刑也甲戌我惟征徐戎峙乃糗糧無敢不逮汝則有大刑甲戌用兵之期也峙儲也糗糧食也不逮不及數也大刑死刑也淮夷徐戎並起今獨征徐戎蓋徐戎近魯先攻近者魯人三郊三遂峙乃楨幹甲戌我惟築無敢不供汝則有無餘刑非殺國外曰郊郊外曰遂天子六軍則六鄉六遂大國三軍故魯三郊三遂也楨幹板築之木題曰楨墻端之木也旁曰幹墻兩邊障土者也上文峙糗糧不言魯人蓋伯禽為侯伯監七百里內諸侯率以同征糧食當自賫持蓋統告諸侯在㑹之人也此下楨幹芻茭非逺國所能自賫故責之魯人也無餘刑謂刑之至重其上更無餘特降死一等而已魯人三郊三遂峙乃芻茭無敢不多汝則有大刑芻茭所以供牛馬若不繼則牛馬飢疲故亦服死刑也魯侯作費誓之時蓋在周公作大誥之後其篇次文侯之命者以侯國之書附帝王之書故居周書之末秦誓秦穆公遣兵襲鄭而為晉所敗作誓以悔過此其辭也案春秋左氏傳僖公三十年九月晉秦圍鄭鄭使燭之武見秦君秦與鄭盟使杞子逢孫楊孫戍之而還三十二年杞子自鄭使告于秦曰鄭人使我掌其北門之管若潛師以來國可得也穆公訪諸蹇叔蹇叔曰勞師以襲逺非所聞也且行千里其誰不知使孟明西乞白乙出師蹇叔曰吾見師之出而不見其入也公使謂之曰爾何知爾墓之木拱矣秦師遂東三十三年春過周北門左右免胄而下超乘者三百乘王孫滿觀之曰秦師輕而無禮必敗及滑鄭商人弦髙遇之以乘韋先牛十二犒師使遽告于鄭鄭視客館則束載厲兵秣馬矣使皇武子辭焉杞子奔齊逢孫楊孫奔宋孟明曰鄭有備矣不可冀也滅滑而還晉原軫曰敵不可縱夏四月晉敗秦師于殽獲百里孟明視西乞術白乙丙晉文公夫人文嬴秦穆公女也請舍秦囚晉人歸三帥秦伯素服郊次鄉師而哭曰孤違蹇叔以辱二三子孤之罪也作誓悔過蓋在此時然文公二年春秦又伐晉戰彭衙三年夏秦又伐晉封殽尸既作秦誓之後荐興報復之師烏在其為能悔過也但其行事雖不踐言而其立言則可垂訓故夫子取之聖人不以人廢言也如是邵子曰夫子定書終于秦誓知周之必為秦也公曰嗟我士聽無譁豫誓告汝羣言之首羣言之首猶曰第一等言語云爾即下文所引古人之言是也古人有言曰民訖自若是多盤責人斯無難惟受責俾如流是惟艱哉訖盡盤樂無逸所謂盤于遊田孟子所謂般樂怠敖是也言人盡如此多荒于盤樂己責人之不善此甚無難惟受人責己之不善能如水之流有順而無逆者是為難也盤艱難三字協韻我心之憂日月逾邁若弗云來思欲遷善改過惟恐弗及故憂日月之逝若弗復有來日也惟古之謀人則曰未就豫忌惟今之謀人姑將以為親雖則云然尚猷詢兹黃髮則罔所愆惟如古先謀國之人則今未能即有其人使來就已忌語辭如詩抑鬯弓忌惟今之謀人姑且將以為可親而與之謀雖則曰如此然于今之謀人之中庶幾求問老成之人則無所過也此蓋悔其違蹇叔之謀也番番良士旅力既愆我尚有之仡仡勇夫射御不違我尚不欲惟截截善諞言俾君子易辭我皇多有之昧昧我思之番番良貌仡仡勇貌截截辨給貌諞巧也皇大也昧昧深潛之意旅力既愆之良士前日所詆墓木既拱者我庶幾有其人射御不違之勇夫前日所誇過門超乘者我庶幾不願有其人此二者人品易明前日之失今日復踐矣惟有捷給善巧諞言之人以非為是以是為非俾君子變易其言辭我大多有其人故昧昧深潛而思之惟恐一日不察復為所惑也良士謂蹇叔勇夫謂三帥諞言謂杞子此蓋悔其用杞子之言也如有一介臣斷斷猗無他技其心休休焉其如有容人之有技若已有之人之彥聖其心好之不啻如自其口出是能容之以保我子孫黎民亦職有利哉人之有技冒疾以惡之人之彥聖而違之俾不達是不能容以不能保我子孫黎民亦曰殆哉介猶個也斷斷誠一之貌猗語辭休休易直好善之意容有受也技有才者彥聖有德者彥美士也聖通明也不啻謂心之所好甚于口之所言也子孫黎民言子孫所有之黎民職主也冒忌也違背也俾不達謂在下困窮不使之達也殆危也穆公前既悔用人聽言之非矣故又及此言能容之人進賢利國不能容之人妨賢病國邦之杌陧曰由一人邦之榮懷亦尚一人之慶杌陧不安也懷安也結上文言國之危殆繫于所任一人之非國之榮安繫于所任一人之是書纂言卷四下
