front:
  text: 欽定四庫全書經部二
  hash: sha256:0cc932f81e16f40609470aaa0474e8369dec60a220254d8de2f21651552b055d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1b0026_WYG_000-1a, image: WYG0061/WYG0061-0001a.png}
body:
  text: 書纂言書𩔖提要臣等謹案書纂言四卷元吳澄撰澄有易纂言已著録是編其書解也古文尚書自貞觀勅作正義以後終唐世無異説宋吳棫作書埤傳始稍稍掊擊朱子語録亦疑其偽然言性言心言學之語宋人據以立教者其端皆𤼵自古文故亦無肯輕議者其考定今文古文自陳振孫尚書説始其分編今文古文自趙孟頫書古今文集注始其專釋今文則自澄此書始自序謂晉世晚出之書别見於後然此四卷以外實未釋古文一篇朱􅂜尊經義考以為權詞其説是也考漢代治尚書者伏生今文傳為大小夏侯歐陽三家孔安國古文别傳都尉朝庸生胡常自為一派是今文古文本各為師説澄專釋今文尚為有合於古義非王柏詩疑舉歴代相傳之古經肆意刊削者比惟其顛倒錯簡皆以意自為且不明言所以改竄之故與所作易纂言體例迥殊是則不可以為訓讀者取所長而無效所短可矣乾隆四十二年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀書今文虞書堯典臯陶謨夏書禹貢甘誓商書湯誓盤庚髙宗肜日西伯戡黎微子周書牧誓洪範康誥酒誥金縢大誥君奭多方立政梓材召誥洛誥多士無逸顧命吕刑文侯之命費誓秦誓右書二十八篇漢伏生所口授者所謂今文書也伏生故為秦博士焚書時生壁藏之其後兵起流亡漢定生求其書亡􅁆十篇獨得二十八篇以教授于齊魯之間孝文時求能治尚書者天下無有欲召生時年九十餘矣不能行詔太常遣掌故鼂錯往受之生老言不可曉使其女傳言教錯齊人語多與潁川異錯所不知凡十二三略以其意屬讀而已夫此二十八篇伏生口授而鼂錯以意屬讀者也其間闕誤顛倒固多然不害其為古書也漢魏四百年間諸儒所治不過此耳當時以應二十八宿蓋不知二十八篇之外猶有書也至晉梅賾始増多伏生書二十五篇稱為孔子壁中古文鄭沖授之蘇愉愉授梁栁栁之内兄皇甫謐從栁得之而栁又以授臧曹曹授賾賾遂奏上其書今攷傳記所引古書見於二十五篇之内者如鄭𤣥趙岐韋昭王肅杜預皆􅃌為逸書則是此二十五篇漢魏晉初諸儒曽未之見也故今特出伏氏二十八篇如舊為漢儒所傳􅃀然可信而晉世晚出之書則別見于後以俟後之君子擇焉書古文虞書堯典第一舜典第二同今文堯典慎徽五典以下孔疏曰東晉梅賾上孔傳時以慎徽五典為舜典之初隋開皇初購求遺書有人言蕭齊建武四年姚方興於大航頭得孔氏傳言古文舜典有曰若稽古帝舜曰重華協于帝濬哲文明温恭允塞𤣥徳升聞乃命以位在慎徽五典之上方興上之未及施行而以罪僇隋旣購得此本遂増入二十八字臯陶謨第四同今文篇首増曰若稽古益稷第五分今文臯陶謨帝曰來禹以下大禹謨第三夏書禹貢第一同今文甘誓第二五子之歌第三𦙍征第四商書湯誓第一同今文盤庚上第九盤庚中第十分今文盤庚作以下盤庚下第十一分今文盤庚旣遷以下髙宗肜日第十五同今文西伯戡黎第十六微子第十七仲虺之誥第二湯誥第三伊訓第四太甲上第五太甲中第六太甲下第七咸有一徳第八說命上第十二說命中第十三說命下第十四周書牧誓第四洪範第六金縢第八大誥第九康誥第十一酒誥第十二梓材第十三召誥第十四洛誥第十五多士第十六無逸第十七君奭第十八多方第二十立政第二十一顧命第二十四康王之誥第二十五分今文顧命王出在應門之内以下吕刑第二十九同今文文侯之命第三十費誓第三十一秦誓第三十二泰誓上第一泰誓中第二泰誓下第三武成第五旅􅋙第七微子之命第十蔡仲之命第十九周官第二十二君陳第二十三畢命第二十六君牙第二十七冏命第二十八右書二十五篇晉梅賾所奏上者所謂古文書也書有今文古文之異何哉鼂錯所受伏生書以隷寫之隷者當世通行之字也故曰今文魯共王壞孔子宅得壁中所藏皆科斗書科斗者蒼頡所制之字也故曰古文然孔壁真古文書不傳後有張霸偽作舜典汨作九共九篇大禹謨益稷五子之歌𦙍征湯誥咸有一徳典寳伊訓肆命原命武成旅獒冏命二十四篇目為古文書漢藝文志云尚書經二十九篇古經十六卷二十九篇者即伏生今文書二十八篇及武帝時増偽泰誓一篇也古經十六卷者即張霸偽古文書二十四篇也漢儒所治不過伏生書及偽泰誓共二十九篇爾張霸偽古文雖在而辭義蕪鄙不足取重於世以售其欺及梅賾二十五篇之書出則凡傳記所引書語諸家􅃌為逸書者收拾無遺旣有證驗而其言率依於理比張霸偽書遼絶矣析伏氏書二十八篇為三十三雜以新出之書通為五十八篇并書序一篇凡五十九篇有孔安國傳及序世遂以為真孔壁所藏也唐初諸儒從而為之疏義自是漢世大小夏侯歐陽氏所傳尚書止有二十九篇者廢不復行惟此孔傳五十八篇孤行於世伏氏書既與梅賾所増混淆誰復能辯竊嘗讀之伏氏書雖難盡通然辭義古奥其為上古之書無疑梅賾所増二十五篇體製如出一手采集補掇雖無一字無所本而平緩卑弱殊不𩔖先漢以前之文夫千年古書最晚乃出而字畫略無脱誤文勢略無齟齬不亦大可疑乎吳才老曰増多之書皆文從字順非若伏生之書詰曲聱牙夫四代之書作者不一乃至一人之手而定為二體其亦難言矣朱仲晦曰書凡易讀者皆古文豈有􅁆百年壁中之物不訛損一字者又曰伏生所傳皆難讀如何伏生偏記其所難而易者全不能記也又曰孔書至東晉方出前此諸儒皆未見可疑之甚又曰書序伏生時無之其文甚弱亦不是前漢人文字只似後漢末人又曰小序決非孔門之舊安國序亦非西漢文章又曰先漢文字重厚今大序格致極輕又曰尚書孔安國是魏晉間人作托孔安國為名耳又曰孔傳幷序皆不𩔖西漢文字氣象與孔叢子同是一手偽書蓋其言多相表裏而訓詁亦多出小爾雅也夫以吳氏及朱子之所疑者如此顧澄何敢質斯疑而斷斷然不敢信此二十五篇之為古書則是非之心不可得而昧也故今以此二十五篇自為卷袠以別於伏氏之書而小序各冠篇首者復合為一以寘諸後孔氏序并附焉而因及其所可疑非澄之私言也聞之先儒云耳
